id: T1595.003_wordlist_scanning
name: "Active Scanning — Wordlist Scanning"
mitre_technique: "T1595.003"
mitre_tactic: "reconnaissance"
description: >
  Simulates wordlist/directory brute-force scanning by generating a burst of HTTP
  requests to common paths against loopback. Mimics tools like gobuster, dirsearch,
  or ffuf. Tests whether SIEM detects high-frequency HTTP requests with
  enumeration-pattern URIs originating from a single host.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1595/003/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1595.003 — Wordlist scanning simulation (loopback only)"

  - step: 2
    type: exec_powershell
    description: "Simulate directory wordlist scan with common enumeration paths against loopback HTTP"
    command: |
      $paths = @(
          "/admin", "/login", "/wp-admin", "/phpmyadmin", "/backup",
          "/.git", "/config", "/api", "/v1", "/swagger",
          "/robots.txt", "/sitemap.xml", "/.env", "/web.config",
          "/uploads", "/shell.php", "/cmd.php", "/manager/html"
      )
      foreach ($path in $paths) {
          try {
              Invoke-WebRequest -Uri "http://127.0.0.1$path" `
                  -TimeoutSec 1 -ErrorAction SilentlyContinue | Out-Null
          } catch {}
          Write-Host "[PAS] Probed: $path"
          Start-Sleep -Milliseconds 100
      }

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — high-frequency HTTP requests to enumeration-pattern URIs from powershell.exe should be visible"

cleanup:
  - step: 1
    type: marker
    description: "No cleanup required"
    message: "T1595.003 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Network event: burst of HTTP GET requests to sequential enumeration-pattern paths from single host"
  - "Process event: powershell.exe running Invoke-WebRequest in a loop against loopback"
  - "Script block logging (Event ID 4104): wordlist array and Invoke-WebRequest loop visible"
  - "Sentinel: DeviceNetworkEvents | where InitiatingProcessFileName == 'powershell.exe' and RemoteUrl contains '127.0.0.1' — look for path enumeration pattern"
  - "MDE alert: 'Web enumeration' or 'Suspicious HTTP scanning behavior'"
