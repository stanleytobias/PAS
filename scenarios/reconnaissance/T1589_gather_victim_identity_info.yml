id: T1589_gather_victim_identity_info
name: "Gather Victim Identity Information"
mitre_technique: "T1589"
mitre_tactic: "reconnaissance"
description: >
  Adversaries gather victim identity information (credentials, email addresses, employee names)
  from public sources prior to compromise. Sources include LinkedIn, data breach dumps,
  and HaveIBeenPwned. This is a passive pre-compromise external technique — no host
  simulation is possible. This scenario validates identity exposure controls and
  credential monitoring coverage.
  Sub-techniques: T1589.001 Credentials | T1589.002 Email Addresses | T1589.003 Employee Names
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1589/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1589 — Gather Victim Identity Information is a pre-compromise passive recon technique"

  - step: 2
    type: marker
    description: "Sub-technique coverage"
    message: "Covers T1589.001 Credentials | T1589.002 Email Addresses | T1589.003 Employee Names"

  - step: 3
    type: marker
    description: "Control validation prompt"
    message: "CONTROL VALIDATION: Review identity exposure via OSINT sources before continuing"

  - step: 4
    type: exec_powershell
    description: "Enumerate local identity artifacts visible to an attacker with local access"
    command: |
      Write-Host "[PAS] Identity artifacts visible post-access:"
      Write-Host "  Local users:"
      Get-LocalUser | Select-Object Name, Enabled, LastLogon | Format-Table -AutoSize
      Write-Host "  Domain: $env:USERDOMAIN"
      Write-Host "  Current user UPN (if domain-joined):"
      try {
          Add-Type -AssemblyName System.DirectoryServices.AccountManagement
          $upn = ([System.DirectoryServices.AccountManagement.UserPrincipal]::Current).UserPrincipalName
          Write-Host "    $upn"
      } catch {
          Write-Host "    Not domain-joined or unable to query"
      }

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check: Is your org email format discoverable via OSINT? (e.g. first.last@domain.com)"

cleanup:
  - step: 1
    type: marker
    description: "No cleanup required"
    message: "T1589 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Script block logging (Event ID 4104): Get-LocalUser and identity enumeration visible"
  - "Process event: powershell.exe running local user enumeration"
  - "CONTROL CHECK: Monitor HaveIBeenPwned or similar for your org domain credential exposure"
  - "CONTROL CHECK: Review LinkedIn for employee name and role enumeration exposure"
  - "CONTROL CHECK: Validate org email format is not trivially guessable from public sources"
  - "Sentinel: AADRiskyUsers and AADUserRiskEvents tables for leaked credential detections"
  - "Entra ID: Enable Identity Protection leaked credentials policy and confirm alerting"
