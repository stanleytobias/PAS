id: T1595.001_scanning_ip_blocks
name: "Active Scanning — Scanning IP Blocks"
mitre_technique: "T1595.001"
mitre_tactic: "reconnaissance"
description: >
  Simulates adversary IP block scanning by generating ICMP and TCP SYN probes across
  a local subnet range. Tests whether SIEM detects high-volume outbound probe activity
  from a single host. All targets are RFC1918 private addresses — no external traffic.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1595/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1595.001 — IP block scanning simulation (RFC1918 only, no external traffic)"

  - step: 2
    type: exec_powershell
    description: "Simulate TCP port sweep across local RFC1918 subnet range"
    command: |
      $subnet = "192.168.1"
      1..20 | ForEach-Object {
          $target = "$subnet.$_"
          try {
              Test-NetConnection -ComputerName $target -Port 445 `
                  -WarningAction SilentlyContinue -InformationLevel Quiet | Out-Null
          } catch {}
          Write-Host "[PAS] Probed: $target:445"
      }

  - step: 3
    type: exec_powershell
    description: "Simulate ICMP ping sweep across local subnet"
    command: |
      $subnet = "192.168.1"
      1..10 | ForEach-Object {
          $target = "$subnet.$_"
          & ping -n 1 -w 100 $target | Out-Null
          Write-Host "[PAS] ICMP probe: $target"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — high-volume ICMP and TCP:445 probes from single host should be visible"

cleanup:
  - step: 1
    type: marker
    description: "No cleanup required"
    message: "T1595.001 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Network event: burst of ICMP echo requests to sequential IPs from single source"
  - "Network event: TCP SYN probes to port 445 across subnet range from powershell.exe"
  - "Process event: powershell.exe running Test-NetConnection in a loop"
  - "Process event: ping.exe spawned repeatedly from powershell.exe"
  - "Sentinel: DeviceNetworkEvents | where InitiatingProcessFileName == 'powershell.exe' and RemotePort == 445 — look for volume spike"
  - "MDE alert: 'Network scan activity' or 'Port scanning behavior detected'"
