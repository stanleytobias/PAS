id: suite_insider_threat_data_theft
name: "Insider Threat / Data Theft"
description: >
  Simulates a malicious insider or compromised privileged user systematically
  collecting and exfiltrating sensitive data. Unlike external threat actor chains,
  this playbook uses fully authorised access — the adversary has legitimate
  permissions to access the data they are stealing. Detection cannot rely on
  access-denied events or lateral movement alerts; it must identify anomalous
  patterns within legitimate behaviour: unusual volume, unusual destinations,
  unusual timing, and policy violations. This suite exercises DLP controls,
  User and Entity Behaviour Analytics (UEBA), and data access monitoring.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1078/

scenarios:
  - step: 1
    technique: "T1083"
    tactic: "discovery"
    scenario_file: "discovery/T1083_file_and_directory_discovery.yml"
    rationale: "Systematically enumerate file shares and directories to locate sensitive data repositories"

  - step: 2
    technique: "T1135"
    tactic: "discovery"
    scenario_file: "discovery/T1135_network_share_discovery.yml"
    rationale: "Enumerate network shares across the environment — map all accessible data sources"

  - step: 3
    technique: "T1213"
    tactic: "collection"
    scenario_file: "collection/T1213_data_from_information_repositories.yml"
    rationale: "Access SharePoint document libraries and internal wikis — collect sensitive business documents"

  - step: 4
    technique: "T1039"
    tactic: "collection"
    scenario_file: "collection/T1039_data_from_network_shared_drive.yml"
    rationale: "Bulk copy files from network shares to local staging directory — mass collection"

  - step: 5
    technique: "T1074.001"
    tactic: "collection"
    scenario_file: "collection/T1074.001_data_staged_local.yml"
    rationale: "Stage collected data in a local directory, compress and archive before exfiltration"

  - step: 6
    technique: "T1560.001"
    tactic: "collection"
    scenario_file: "collection/T1560.001_archive_collected_data_utility.yml"
    rationale: "Archive staged data into encrypted ZIP — reduces transfer size and defeats content inspection"

  - step: 7
    technique: "T1052.001"
    tactic: "exfiltration"
    scenario_file: "exfiltration/T1052.001_exfiltration_over_usb.yml"
    rationale: "Copy archive to USB drive — physical exfiltration bypasses all network DLP controls"

  - step: 8
    technique: "T1567.002"
    tactic: "exfiltration"
    scenario_file: "exfiltration/T1567.002_exfil_to_cloud_storage.yml"
    rationale: "Upload archive to personal cloud storage (Dropbox, personal OneDrive) — network exfiltration path"

  - step: 9
    technique: "T1029"
    tactic: "exfiltration"
    scenario_file: "exfiltration/T1029_scheduled_transfer.yml"
    rationale: "Schedule recurring small uploads to avoid volume-based DLP thresholds — low-and-slow exfil"

  - step: 10
    technique: "T1565.001"
    tactic: "impact"
    scenario_file: "impact/T1565.001_data_manipulation_stored.yml"
    rationale: "Modify records to cover evidence of access or sabotage data for competitive advantage"

analyst_narrative: >
  Insider threat detection requires a different detection mindset from external
  threat detection. The adversary has legitimate credentials and access — there
  are no authentication anomalies, no lateral movement, no exploitation. Every
  individual action is authorised. Detection must rely on volume anomalies
  (copying 10GB of files in one session when the baseline is 100MB), temporal
  anomalies (after-hours access), destination anomalies (uploading to personal
  cloud storage), and policy violations (USB usage where Device Control should
  block it). Steps 7 and 8 are the primary technical detection points — USB
  insertion (Event 6416) and cloud upload volume. Step 9 (scheduled transfer)
  is designed specifically to evade these detections; cumulative session volume
  tracking is required. Step 10 (data manipulation) may never be detected if
  access logs are not reviewed — file integrity monitoring is the control.

detection_chain:
  - "Steps 1-2: recursive dir and net view — low severity, context-dependent"
  - "Steps 3-4: bulk file access from single account >2x baseline — medium severity"
  - "Step 5: large archive creation in user TEMP or non-standard directory — medium severity"
  - "Step 6: encrypted archive (password-protected ZIP) created from staging dir — HIGH SEVERITY"
  - "Step 7: USB insertion + bulk file copy to removable drive — CRITICAL (DLP violation)"
  - "Step 8: upload to personal cloud storage domain — HIGH SEVERITY"
  - "Step 9: recurring scheduled small uploads — detected only by cumulative session volume"
  - "Step 10: config/log file modification outside change window — medium severity"
  - "UEBA correlation: bulk file access + archive creation + USB/cloud upload = data theft chain"

coverage_notes: >
  Tactics covered: Discovery, Collection, Exfiltration, Impact.
  Key detection dependency: MDE Device Control must be configured to audit or
  block USB storage — without it, step 7 is completely invisible.
  Key detection dependency: web proxy must log and alert on uploads to personal
  cloud storage domains (dropbox.com, personal onedrive.live.com).
  Key gap: step 9 (low-and-slow scheduled transfer) requires cumulative session
  volume tracking — per-transfer DLP thresholds will not fire.
  Tuning note: bulk file access alerts have HIGH false-positive rate in environments
  with legitimate batch processing — tune to fire only on interactive user sessions
  accessing >500 files in 10 minutes outside business hours.
