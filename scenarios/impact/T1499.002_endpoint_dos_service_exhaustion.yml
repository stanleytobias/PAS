id: T1499.002_endpoint_dos_service_exhaustion
name: "Endpoint Denial of Service — Service Exhaustion Flood"
mitre_technique: "T1499.002"
mitre_tactic: "impact"
description: >
  Adversaries flood specific network services (HTTP/S, DNS, SMTP) on a target
  endpoint with more requests than the service can handle, causing it to become
  unresponsive to legitimate users. Unlike OS exhaustion (T1499.001), service
  exhaustion targets the application layer. Methods: HTTP connection flood to web
  servers (Slowloris, GET flood), DNS query flood, and TCP SYN flood against
  specific service ports. This simulation generates HTTP connection telemetry
  to the loopback address only — no real service disruption.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1499/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1499.002 — Service Exhaustion Flood simulation (loopback only, bounded)"

  - step: 2
    type: exec_powershell
    description: "Simulate HTTP service flood — loopback only, 10 requests"
    command: |
      Write-Host "[PAS] HTTP service exhaustion flood (loopback — 10 requests only):"
      $connections = [System.Collections.Generic.List[object]]::new()
      1..10 | ForEach-Object {
          try {
              $req = [System.Net.WebRequest]::Create("http://127.0.0.1:80/")
              $req.Timeout = 200
              $req.GetResponse() | Out-Null
          } catch {}
          Write-Host "[PAS] HTTP request $_ to loopback:80"
      }
      Write-Host "[PAS] HTTP flood pattern generated — IIS/web server connection telemetry"
      Write-Host "[PAS] Real attack: thousands of concurrent connections from botnet"

  - step: 3
    type: exec_powershell
    description: "Simulate Slowloris-style connection exhaustion pattern"
    command: |
      Write-Host "[PAS] Slowloris HTTP keep-alive exhaustion pattern:"
      Write-Host "[PAS] Technique: open many connections, send partial HTTP headers slowly"
      Write-Host "[PAS] Effect: exhausts web server thread pool without full requests"
      Write-Host "[PAS] Detection: many concurrent half-open connections from single IP"
      try {
          $tcp = New-Object System.Net.Sockets.TcpClient
          $res = $tcp.BeginConnect("127.0.0.1", 80, $null, $null)
          $ok  = $res.AsyncWaitHandle.WaitOne(300, $false)
          if ($ok) {
              $stream = $tcp.GetStream()
              $partial = [Text.Encoding]::ASCII.GetBytes("GET / HTTP/1.1`r`nHost: 127.0.0.1`r`n")
              $stream.Write($partial, 0, $partial.Length)
              Start-Sleep -Milliseconds 200
              $stream.Close()
          }
          $tcp.Close()
          Write-Host "[PAS] Slowloris partial HTTP request to loopback generated"
      } catch {}

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — high concurrent HTTP connections from single source to web service, IIS connection count spike"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1499.002 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "IIS/web server: connection count spike from single source IP"
  - "Network: high rate of TCP SYN without ACK to service port (SYN flood)"
  - "Sentinel: DeviceNetworkEvents | where RemotePort == 80 | summarize count() by RemoteIP, bin(TimeGenerated,1m) | where count_ > 100"
  - "MDE alert: 'HTTP service exhaustion from local process'"
  - "CONTROL CHECK: IIS connection limits and request throttling — MaxConnections, RequestFiltering"
  - "CONTROL CHECK: Azure DDoS Protection Standard — absorbs volumetric attacks before reaching origin"
  - "CONTROL CHECK: WAF rate limiting rules — block IPs exceeding 100 req/sec"
