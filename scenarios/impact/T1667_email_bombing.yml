id: T1667_email_bombing
name: "Email Bombing"
mitre_technique: "T1667"
mitre_tactic: "impact"
description: >
  Adversaries flood targeted email addresses with a high volume of messages to
  bury legitimate emails, disrupt business operations, and overwhelm incident
  response communication. Email bombing is often used as a distraction during
  a concurrent attack (BEC fraud, unauthorized account changes) — the victim
  cannot find the alert email in thousands of spam messages. Methods: sign-up
  bombing (subscribing victim to thousands of mailing lists), direct SMTP flood,
  and exploiting contact forms. This simulation generates SMTP connection telemetry
  to the loopback address only.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1667/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1667 — Email Bombing simulation (loopback SMTP only)"

  - step: 2
    type: exec_powershell
    description: "Simulate bulk email send loop — loopback SMTP only"
    command: |
      Write-Host "[PAS] Email bombing simulation (loopback SMTP — no real email sent):"
      $smtp = New-Object Net.Mail.SmtpClient("127.0.0.1", 25)
      $smtp.Timeout = 200

      $sent = 0
      1..10 | ForEach-Object {
          try {
              $msg = New-Object Net.Mail.MailMessage
              $msg.From    = "spammer@attacker.local"
              $msg.To.Add("victim@corp.local")
              $msg.Subject = "Subscription Confirmation #$_"
              $msg.Body    = "PAS-T1667-EMAIL-BOMB-$_"
              $smtp.Send($msg)
              $msg.Dispose()
              $sent++
          } catch {}
      }
      Write-Host "[PAS] Email bomb loop: $sent SMTP connection attempts to loopback:25"
      Write-Host "[PAS] Real attack: 1000s of subscriptions per minute"
      Write-Host "[PAS] Distraction: hides BEC fraud notification in inbox flood"

  - step: 3
    type: exec_powershell
    description: "Simulate sign-up bombing pattern — HTTP POST to mailing lists"
    command: |
      Write-Host "[PAS] Sign-up bombing pattern (HTTP POST to loopback):"
      1..5 | ForEach-Object {
          try {
              $req = [System.Net.WebRequest]::Create("http://127.0.0.1/subscribe")
              $req.Method = "POST"
              $req.ContentType = "application/x-www-form-urlencoded"
              $req.Timeout = 200
              $body = [Text.Encoding]::UTF8.GetBytes("email=victim%40corp.local&name=Victim")
              $req.ContentLength = $body.Length
              $s = $req.GetRequestStream(); $s.Write($body,0,$body.Length); $s.Close()
              $req.GetResponse() | Out-Null
          } catch {}
      }
      Write-Host "[PAS] Sign-up bombing HTTP pattern generated"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — rapid SMTP connection burst, Exchange mailbox receiving >100 messages/minute"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1667 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Exchange/M365: mailbox receiving >100 messages per minute from diverse external sources"
  - "Process event: rapid SMTP connection loop from scripting process"
  - "Sentinel: EmailEvents | where RecipientEmailAddress == victim | summarize count() by bin(TimeGenerated,1m) | where count_ > 50"
  - "Defender for Office 365: 'Unusual email volume to recipient' alert"
  - "CONTROL CHECK: Exchange mail flow rules — rate limit inbound from external senders per recipient"
  - "CONTROL CHECK: M365 Advanced Delivery / junk filter — auto-quarantine sign-up confirmation emails during incident"
  - "CONTROL CHECK: Operational response — have an alternate out-of-band communication channel (Teams/Slack) ready"
