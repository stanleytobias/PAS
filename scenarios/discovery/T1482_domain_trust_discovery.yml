id: T1482_domain_trust_discovery
name: "Domain Trust Discovery"
mitre_technique: "T1482"
mitre_tactic: "discovery"
description: >
  Adversaries enumerate Active Directory domain trust relationships to identify
  lateral movement paths into other domains and forests. Domain trusts allow
  users in one domain to access resources in another. An adversary who has
  compromised Domain A can use trust relationships to pivot into Domain B.
  Tools: nltest /domain_trusts, Get-ADTrust, DSEnumerateDomainTrusts Win32 API,
  and BloodHound's trust enumeration. Forest trusts and external trusts are
  particularly valuable as they may span organisational boundaries.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1482/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1482 — Domain Trust Discovery simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate domain trusts via nltest"
    command: |
      Write-Host "[PAS] Domain trust enumeration:"
      Write-Host "[PAS] Method 1: nltest /domain_trusts"
      $nltest = Start-Process nltest.exe -ArgumentList "/domain_trusts" `
          -PassThru -NoNewWindow -Wait -ErrorAction SilentlyContinue
      nltest /domain_trusts 2>&1 | ForEach-Object { Write-Host "  $_" }

  - step: 3
    type: exec_powershell
    description: "Enumerate trusts via LDAP and .NET DirectoryServices"
    command: |
      Write-Host "[PAS] Method 2: LDAP trust enumeration"
      $isDomain = (Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue).PartOfDomain
      if ($isDomain) {
          try {
              $searcher = New-Object System.DirectoryServices.DirectorySearcher
              $searcher.Filter = "(objectClass=trustedDomain)"
              $searcher.PropertiesToLoad.AddRange(@("cn","trustDirection","trustType","trustAttributes"))
              $results = $searcher.FindAll()
              Write-Host "  Trust relationships found: $($results.Count)"
              foreach ($r in $results) {
                  $dir = switch ($r.Properties["trustdirection"][0]) {
                      1 {"Inbound"} 2 {"Outbound"} 3 {"Bidirectional"} default {"Unknown"}
                  }
                  Write-Host "  Trust: $($r.Properties["cn"][0]) [$dir]"
              }
          } catch { Write-Host "  LDAP trust query failed (no DC)" }
      } else {
          Write-Host "[PAS] Not domain-joined — nltest output captured"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — nltest.exe /domain_trusts, LDAP query for trustedDomain objects"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1482 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Process event: nltest.exe with /domain_trusts argument"
  - "LDAP query: objectClass=trustedDomain from workstation context"
  - "Sentinel: DeviceProcessEvents | where FileName == 'nltest.exe' and ProcessCommandLine contains 'domain_trusts'"
  - "Defender for Identity: 'Domain trust enumeration' alert"
  - "CONTROL CHECK: Review and minimise domain trusts — remove any trust that is no longer needed"
  - "CONTROL CHECK: Selective Authentication on external trusts — prevents automatic use of trust across org boundaries"
