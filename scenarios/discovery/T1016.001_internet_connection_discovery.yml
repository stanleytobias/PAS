id: T1016.001_system_network_config_internet_connection
name: "System Network Configuration Discovery — Internet Connection Discovery"
mitre_technique: "T1016.001"
mitre_tactic: "discovery"
description: >
  Adversaries check whether the compromised host has direct internet connectivity
  to determine if outbound C2 channels are viable and what egress restrictions
  exist. Methods: ping 8.8.8.8, curl/Invoke-WebRequest to known-good URLs,
  tracert to internet hosts, and speed testing. Air-gapped or heavily proxied
  environments require different C2 strategies. Internet connectivity confirmation
  is often the first thing implants do after execution.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1016/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1016.001 — Internet Connection Discovery simulation"

  - step: 2
    type: exec_powershell
    description: "Test internet connectivity via ping and DNS resolution"
    command: |
      Write-Host "[PAS] Internet connectivity check:"
      Write-Host "[PAS] Method 1: ping public DNS (8.8.8.8)"
      $ping = Test-Connection 8.8.8.8 -Count 2 -ErrorAction SilentlyContinue
      Write-Host "  Ping 8.8.8.8: $(if ($ping) {'Reachable'} else {'No response'})"

      Write-Host "[PAS] Method 2: DNS resolution of public host"
      try {
          $resolved = [System.Net.Dns]::GetHostAddresses("www.google.com")
          Write-Host "  DNS www.google.com: $($resolved[0].IPAddressToString)"
      } catch { Write-Host "  DNS resolution failed — no internet or DNS blocked" }

      Write-Host "[PAS] Method 3: HTTP request check"
      try {
          $req = [System.Net.WebRequest]::Create("http://www.msftconnecttest.com/connecttest.txt")
          $req.Timeout = 3000
          $resp = $req.GetResponse()
          $reader = New-Object IO.StreamReader($resp.GetResponseStream())
          $body   = $reader.ReadToEnd(); $reader.Close()
          Write-Host "  NCSI check: $(if ($body -eq 'Microsoft Connect Test') {'Internet connected'} else {'Proxy/captive portal'})"
      } catch { Write-Host "  HTTP check failed — no internet connectivity" }

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — ping.exe to public IPs, DNS resolution of public domains, HTTP to connectivity test URLs"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1016.001 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Network event: ICMP ping to 8.8.8.8 or other public IP from unexpected process"
  - "DNS query: public domains (google.com, msftconnecttest.com) from scripting process"
  - "Sentinel: DeviceNetworkEvents | where RemoteIP in ('8.8.8.8','8.8.4.4','1.1.1.1') and InitiatingProcessFileName == 'powershell.exe'"
  - "CONTROL CHECK: Proxy enforcement — all HTTP/S must transit web proxy; direct internet blocked"
  - "CONTROL CHECK: DNS filtering — block resolution of known C2 domains at DNS layer"
