id: T1497.001_virtualization_sandbox_evasion_system_checks
name: "Virtualization/Sandbox Evasion — System Checks"
mitre_technique: "T1497.001"
mitre_tactic: "discovery"
description: >
  Adversaries check for virtualisation and sandbox artefacts to detect analysis
  environments and alter behaviour. System-level checks: VMware/VirtualBox/Hyper-V
  registry keys, known VM MAC address prefixes (00:0C:29 VMware, 08:00:27 VirtualBox),
  CPUID hypervisor bit, low disk size / RAM (sandbox indicator), and presence of
  sandbox-specific processes (vmsrvc.exe, vboxservice.exe, wireshark.exe).
  These checks are standard in commodity malware and APT implants alike.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1497/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1497.001 — Virtualisation/Sandbox System Checks simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate VM artefacts — registry, MAC, hardware"
    command: |
      Write-Host "[PAS] Virtualisation detection checks:"

      # Registry artefacts
      $vmRegKeys = @(
          "HKLM:\SOFTWARE\VMware, Inc.\VMware Tools",
          "HKLM:\SOFTWARE\Oracle\VirtualBox Guest Additions",
          "HKLM:\SOFTWARE\Microsoft\Virtual Machine\Guest\Parameters",
          "HKLM:\HARDWARE\ACPI\DSDT\VBOX__"
      )
      foreach ($k in $vmRegKeys) {
          Write-Host "  Reg check [$k]: $(if (Test-Path $k) {'PRESENT (VM)'} else {'absent'})"
      }

      # MAC address prefix check
      Write-Host "[PAS] MAC address prefix check:"
      Get-WmiObject Win32_NetworkAdapter -ErrorAction SilentlyContinue |
          Where-Object { $_.MACAddress } |
          ForEach-Object {
              $mac    = $_.MACAddress
              $prefix = $mac.Substring(0,8).ToUpper()
              $isVM   = $prefix -in @("00:0C:29","00:50:56","08:00:27","00:15:5D")
              Write-Host "  $mac $(if ($isVM) {'[VM MAC PREFIX DETECTED]'} else {''})"
          }

      # Hardware indicators
      $bios = Get-WmiObject Win32_BIOS -ErrorAction SilentlyContinue
      $vm   = $bios?.Manufacturer -match "VMware|VBOX|Xen|Microsoft"
      Write-Host "[PAS] BIOS Manufacturer: $($bios?.Manufacturer) $(if ($vm) {'[VM]'} else {''})"

  - step: 3
    type: exec_powershell
    description: "Check for sandbox/analysis tool processes"
    command: |
      Write-Host "[PAS] Sandbox process checks:"
      $sandboxProcs = @(
          "vmsrvc","vboxservice","vmwaretray","vmwareuser",
          "wireshark","processhacker","x64dbg","ollydbg",
          "procmon","procexp","autoruns","tcpview","fiddler"
      )
      $running = Get-Process -ErrorAction SilentlyContinue |
          Select-Object -ExpandProperty Name
      foreach ($p in $sandboxProcs) {
          if ($running -contains $p) {
              Write-Host "  [SANDBOX/ANALYSIS TOOL DETECTED] $p"
          }
      }
      Write-Host "[PAS] Resource checks (low RAM/disk = sandbox indicator):"
      $cs  = Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue
      $ram = [Math]::Round($cs.TotalPhysicalMemory/1GB, 1)
      Write-Host "  RAM: $ram GB $(if ($ram -lt 2) {'[LOW - sandbox indicator]'} else {''})"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — VM registry key reads, MAC prefix checks, sandbox process enumeration"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1497.001 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Registry reads: VMware/VirtualBox/Hyper-V keys from scripting process"
  - "WMI query: Win32_NetworkAdapter (MAC check), Win32_BIOS from unexpected process"
  - "Sentinel: DeviceRegistryEvents | where RegistryKey contains 'VMware' or RegistryKey contains 'VirtualBox'"
  - "MDE alert: 'Sandbox/VM evasion check detected'"
  - "CONTROL CHECK: Production systems should pass VM checks — this is a detection signal on bare-metal endpoints"
  - "CONTROL CHECK: Detonation sandbox tuning — configure sandboxes with >=4GB RAM, realistic disk, no analysis tools visible"
