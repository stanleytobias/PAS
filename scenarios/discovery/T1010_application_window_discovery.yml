id: T1010_application_window_discovery
name: "Application Window Discovery"
mitre_technique: "T1010"
mitre_tactic: "discovery"
description: >
  Adversaries enumerate open application windows to understand what software is
  actively running, identify security tools to evade, and discover data sources
  to target. Windows provides EnumWindows and GetWindowText Win32 APIs to list
  all top-level windows and their titles. Malware uses this to detect sandboxes
  (which may have no windows), identify running AV/EDR consoles, and find
  windows containing sensitive data (banking apps, password managers).
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1010/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1010 — Application Window Discovery simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate open windows via Get-Process and EnumWindows"
    command: |
      Write-Host "[PAS] Application window enumeration:"
      Write-Host "[PAS] Method 1: Get-Process with MainWindowTitle"
      Get-Process -ErrorAction SilentlyContinue |
          Where-Object { $_.MainWindowTitle -ne "" } |
          Select-Object ProcessName, Id, MainWindowTitle |
          Format-Table -AutoSize | Out-String | Write-Host

  - step: 3
    type: exec_powershell
    description: "Enumerate windows via Win32 EnumWindows API"
    command: |
      Add-Type @"
      using System;
      using System.Collections.Generic;
      using System.Runtime.InteropServices;
      using System.Text;
      public class PASWindowEnum {
          public delegate bool EnumWindowsProc(IntPtr hWnd, IntPtr lParam);
          [DllImport("user32.dll")] public static extern bool EnumWindows(EnumWindowsProc callback, IntPtr lParam);
          [DllImport("user32.dll")] public static extern int GetWindowText(IntPtr hWnd, StringBuilder text, int maxLen);
          [DllImport("user32.dll")] public static extern bool IsWindowVisible(IntPtr hWnd);
          public static List<string> GetWindowTitles() {
              var titles = new List<string>();
              EnumWindows((hWnd, _) => {
                  if (IsWindowVisible(hWnd)) {
                      var sb = new StringBuilder(256);
                      GetWindowText(hWnd, sb, 256);
                      if (sb.Length > 0) titles.Add(sb.ToString());
                  }
                  return true;
              }, IntPtr.Zero);
              return titles;
          }
      }
"@
      Write-Host "[PAS] Method 2: EnumWindows API"
      $titles = [PASWindowEnum]::GetWindowTitles()
      Write-Host "  Open windows: $($titles.Count)"
      $titles | Select-Object -First 10 | ForEach-Object { Write-Host "  Window: $_" }
      Write-Host "[PAS] Adversary looks for: security tools, password managers, banking apps"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — EnumWindows / GetWindowText API calls from scripting process, window title enumeration"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1010 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "API: EnumWindows called from non-UI process (powershell.exe, cmd.exe)"
  - "Script block logging: Get-Process MainWindowTitle in unexpected context"
  - "Sentinel: DeviceEvents | where ActionType contains 'WindowEnumeration' and InitiatingProcessFileName == 'powershell.exe'"
  - "MDE alert: 'Window enumeration by suspicious process'"
  - "CONTROL CHECK: Screen capture / window enumeration is a strong sandbox-evasion / RAT indicator — correlate with other discovery techniques"
