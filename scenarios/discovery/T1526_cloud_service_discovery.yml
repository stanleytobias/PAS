id: T1526_cloud_service_discovery
name: "Cloud Service Discovery"
mitre_technique: "T1526"
mitre_tactic: "discovery"
description: >
  Adversaries enumerate the cloud services and resources deployed in a cloud
  environment to map the attack surface. In Azure: listing all resource providers,
  enumerating deployed services per subscription and resource group, and identifying
  security services (Defender for Cloud, Sentinel workspaces, Log Analytics).
  Knowing which security services are active informs evasion decisions; knowing
  which services are deployed identifies data sources and lateral movement targets.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1526/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1526 — Cloud Service Discovery simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate cloud services via Azure CLI and REST API"
    command: |
      Write-Host "[PAS] Cloud service discovery:"
      $az = Get-Command az -ErrorAction SilentlyContinue
      if ($az) {
          Write-Host "[PAS] Azure CLI commands that enumerate services:"
          @("az resource list --output table",
            "az provider list --output table",
            "az monitor log-analytics workspace list",
            "az security pricing list",
            "az sentinel alert-rule list") |
              ForEach-Object { Write-Host "  $_" }
      }

      Write-Host "[PAS] REST API resource enumeration (loopback):"
      $endpoints = @(
          "http://127.0.0.1/subscriptions/{sub}/resources?api-version=2021-04-01",
          "http://127.0.0.1/subscriptions/{sub}/providers?api-version=2021-04-01",
          "http://127.0.0.1/subscriptions/{sub}/providers/Microsoft.OperationsManagement/solutions"
      )
      foreach ($ep in $endpoints) {
          try {
              $req = [System.Net.WebRequest]::Create($ep)
              $req.Headers.Add("Authorization","Bearer PAS_TOKEN")
              $req.Timeout = 300
              $req.GetResponse() | Out-Null
          } catch {}
          Write-Host "[PAS] Resource query: $($ep.Split('?')[0].Split('subscriptions')[1])"
      }

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check Azure Activity Log — bulk resource List operations, provider enumeration from unexpected principal"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1526 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Azure Activity Log: bulk resource enumeration (>20 List operations in 1 minute) from service principal"
  - "Sentinel: AzureActivity | where OperationNameValue endswith '/read' | summarize count() by Caller, bin(TimeGenerated,1m) | where count_ > 20"
  - "CONTROL CHECK: Sentinel/Defender for Cloud detection — alert when their own configurations are read by unexpected principals"
  - "CONTROL CHECK: Principle of least privilege — service principals should only read resources in their own resource group, not subscription-wide"
