id: T1201_password_policy_discovery
name: "Password Policy Discovery"
mitre_technique: "T1201"
mitre_tactic: "discovery"
description: >
  Adversaries enumerate the domain and local password policies to tailor brute force
  and password spraying attacks. Key values: minimum password length (determines
  cracking difficulty), lockout threshold (spray budget per account per window),
  lockout observation window (reset interval), and password complexity requirements.
  With a lockout threshold of 5 and a 30-minute window, an adversary can spray
  exactly 4 passwords every 30 minutes per account without triggering lockout.
  Methods: net accounts, net accounts /domain, Get-ADDefaultDomainPasswordPolicy.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1201/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1201 — Password Policy Discovery simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate local and domain password policies"
    command: |
      Write-Host "[PAS] Password policy enumeration:"
      Write-Host "[PAS] Method 1: net accounts (local)"
      net accounts 2>&1 | ForEach-Object { Write-Host "  $_" }

      Write-Host "[PAS] Method 2: net accounts /domain"
      net accounts /domain 2>&1 | Select-Object -First 15 |
          ForEach-Object { Write-Host "  $_" }

  - step: 3
    type: exec_powershell
    description: "Extract fine-grained password policy via LDAP"
    command: |
      Write-Host "[PAS] Fine-grained password policy check:"
      $isDomain = (Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue).PartOfDomain
      if ($isDomain) {
          try {
              $searcher = New-Object System.DirectoryServices.DirectorySearcher
              $searcher.Filter = "(objectClass=msDS-PasswordSettings)"
              $searcher.PropertiesToLoad.AddRange(@("cn","msDS-MinimumPasswordLength",
                  "msDS-LockoutThreshold","msDS-LockoutObservationWindow"))
              $results = $searcher.FindAll()
              if ($results.Count -gt 0) {
                  Write-Host "  Fine-grained policies found: $($results.Count)"
                  $results | ForEach-Object {
                      $name   = $_.Properties["cn"][0]
                      $minLen = $_.Properties["msds-minimumpasswordlength"][0]
                      $thresh = $_.Properties["msds-lockoutthreshold"][0]
                      Write-Host "  Policy: $name | MinLen=$minLen | LockoutThreshold=$thresh"
                  }
              } else {
                  Write-Host "  No fine-grained password policies configured"
              }
          } catch { Write-Host "  LDAP query failed (no DC)" }
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — net.exe with 'accounts' argument, LDAP msDS-PasswordSettings query"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1201 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Process event: net.exe with 'accounts' or 'accounts /domain' argument"
  - "LDAP query: objectClass=msDS-PasswordSettings (fine-grained policy enumeration)"
  - "Sentinel: DeviceProcessEvents | where FileName == 'net.exe' and ProcessCommandLine contains 'accounts'"
  - "MDE alert: 'Password policy enumeration'"
  - "CONTROL CHECK: Lockout threshold should be 5–10; observation window 15–30 min — review net accounts output"
  - "CONTROL CHECK: Fine-grained policies for privileged accounts: longer min length, lower lockout threshold"
  - "CONTROL CHECK: Entra ID Smart Lockout supplements AD lockout for cloud auth paths"
