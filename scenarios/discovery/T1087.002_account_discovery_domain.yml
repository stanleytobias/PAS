id: T1087.002_account_discovery_domain
name: "Account Discovery — Domain Account"
mitre_technique: "T1087.002"
mitre_tactic: "discovery"
description: >
  Adversaries enumerate domain accounts to map the Active Directory environment,
  identify privileged accounts, and discover service accounts for Kerberoasting.
  Methods include net user /domain, LDAP queries via DirectorySearcher,
  PowerShell AD module (Get-ADUser), and BloodHound data collection.
  Enumerating domain admins and high-value accounts is a standard post-compromise
  step before lateral movement and privilege escalation.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1087/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1087.002 — Domain Account Discovery simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate domain accounts via net and LDAP"
    command: |
      Write-Host "[PAS] Domain account enumeration:"
      $isDomain = (Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue).PartOfDomain

      Write-Host "[PAS] Method 1: net user /domain"
      net user /domain 2>&1 | Select-Object -First 15 | ForEach-Object { Write-Host "  $_" }

      Write-Host "[PAS] Method 2: LDAP DirectorySearcher"
      if ($isDomain) {
          try {
              $searcher = New-Object System.DirectoryServices.DirectorySearcher
              $searcher.Filter = "(&(objectCategory=person)(objectClass=user))"
              $searcher.PropertiesToLoad.AddRange(@("sAMAccountName","memberOf","pwdLastSet"))
              $results = $searcher.FindAll()
              Write-Host "  Domain users found: $($results.Count)"
              $results | Select-Object -First 5 | ForEach-Object {
                  Write-Host "  $($_.Properties['samaccountname'][0])"
              }
          } catch { Write-Host "  LDAP query failed (no DC)" }
      }

  - step: 3
    type: exec_powershell
    description: "Enumerate domain admin accounts — high-value discovery"
    command: |
      Write-Host "[PAS] Domain Admins enumeration:"
      net group "Domain Admins" /domain 2>&1 | Select-Object -First 15 |
          ForEach-Object { Write-Host "  $_" }
      Write-Host "[PAS] Enterprise Admins enumeration:"
      net group "Enterprise Admins" /domain 2>&1 | Select-Object -First 10 |
          ForEach-Object { Write-Host "  $_" }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — net.exe /domain, LDAP queries for objectClass=user, Event ID 4661 on DC"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1087.002 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Process event: net.exe with '/domain' flag and 'user' or 'group' arguments"
  - "LDAP query: objectClass=user or objectCategory=person from a workstation — unusual if not IT admin"
  - "Sentinel: DeviceProcessEvents | where FileName == 'net.exe' and ProcessCommandLine contains '/domain'"
  - "Defender for Identity: 'Account enumeration reconnaissance' alert"
  - "CONTROL CHECK: Tiered admin model — DA accounts should only log in from PAWs, not workstations"
  - "CONTROL CHECK: Defender for Identity detects BloodHound LDAP collection patterns"
