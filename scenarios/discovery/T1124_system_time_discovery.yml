id: T1124_system_time_discovery
name: "System Time Discovery"
mitre_technique: "T1124"
mitre_tactic: "discovery"
description: >
  Adversaries query the system clock and time zone to coordinate time-based C2
  operations, verify the system is not in a sandbox (sandboxes often accelerate
  time), understand business hours for timing attacks, and correlate with local
  time for geographic targeting. Methods: net time, w32tm /query /status,
  Get-Date, WMI Win32_LocalTime. Time-based sandbox evasion (T1497.003) is
  a closely related technique.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1124/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1124 — System Time Discovery simulation"

  - step: 2
    type: exec_powershell
    description: "Query system time via multiple methods"
    command: |
      Write-Host "[PAS] System time discovery:"

      Write-Host "[PAS] Method 1: net time"
      net time 2>&1 | ForEach-Object { Write-Host "  $_" }

      Write-Host "[PAS] Method 2: w32tm /query /status"
      $proc = Start-Process w32tm.exe -ArgumentList "/query /status" `
          -PassThru -NoNewWindow -Wait -ErrorAction SilentlyContinue
      w32tm /query /status 2>&1 | Select-Object -First 10 |
          ForEach-Object { Write-Host "  $_" }

      Write-Host "[PAS] Method 3: WMI Win32_LocalTime"
      $lt = Get-WmiObject Win32_LocalTime -ErrorAction SilentlyContinue
      if ($lt) {
          Write-Host "  Local time: $($lt.Year)-$($lt.Month.ToString('00'))-$($lt.Day.ToString('00')) $($lt.Hour.ToString('00')):$($lt.Minute.ToString('00'))"
      }

      Write-Host "[PAS] Method 4: Get-Date (PowerShell)"
      Write-Host "  $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss zzz')"

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — net.exe time, w32tm.exe query, WMI Win32_LocalTime from scripting process"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1124 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Process event: net.exe with 'time' argument, w32tm.exe with '/query' from scripting process"
  - "WMI query: Win32_LocalTime from unexpected process"
  - "Sentinel: DeviceProcessEvents | where FileName in ('net.exe','w32tm.exe') and ProcessCommandLine contains ('time','query')"
  - "MDE alert: 'System time enumeration'"
  - "CONTROL CHECK: Accurate time sync (NTP) is required for Kerberos — adversaries can check time to identify Kerberos-using environments"
