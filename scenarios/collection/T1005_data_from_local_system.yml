id: T1005_data_from_local_system
name: "Data from Local System"
mitre_technique: "T1005"
mitre_tactic: "collection"
description: >
  Adversaries search local system sources — file systems, configuration files, process
  memory, application databases, and registry — to find valuable data prior to
  exfiltration. Targets include: documents (Desktop, Documents, Downloads), browser
  saved passwords, SSH private keys (~/.ssh/id_rsa), certificate stores (.pfx/.p12),
  KeePass/1Password databases, and application config files containing credentials.
  This is one of the most common collection techniques — every post-compromise actor
  searches the local filesystem for value.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1005/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1005 — Data from Local System collection simulation"

  - step: 2
    type: exec_powershell
    description: "Search for high-value file types on local system"
    command: |
      Write-Host "[PAS] High-value local file search:"
      $stagingDir = "$env:TEMP\PAS_T1005_staging"
      New-Item -ItemType Directory $stagingDir -Force | Out-Null

      $targets = @(
          @{ Path=$env:USERPROFILE; Filter="*.kdbx";  Desc="KeePass database" },
          @{ Path=$env:USERPROFILE; Filter="*.p12";   Desc="Certificate with private key" },
          @{ Path=$env:USERPROFILE; Filter="*.pfx";   Desc="Certificate with private key" },
          @{ Path="$env:USERPROFILE\.ssh"; Filter="id_rsa"; Desc="SSH private key" },
          @{ Path=$env:USERPROFILE; Filter="*.pst";   Desc="Outlook email archive" },
          @{ Path=$env:APPDATA;     Filter="*.config"; Desc="Application config" }
      )

      foreach ($t in $targets) {
          if (Test-Path $t.Path) {
              $files = Get-ChildItem $t.Path -Filter $t.Filter -Recurse -Depth 3 `
                  -ErrorAction SilentlyContinue | Select-Object -First 1
              foreach ($f in $files) {
                  Write-Host "  [$($t.Desc)] Found: $($f.FullName)"
              }
          }
      }

  - step: 3
    type: exec_powershell
    description: "Collect browser saved passwords location — Chrome/Edge Login Data"
    command: |
      Write-Host "[PAS] Browser saved password database locations:"
      $loginDbs = @{
          "Chrome" = "$env:LOCALAPPDATA\Google\Chrome\User Data\Default\Login Data"
          "Edge"   = "$env:LOCALAPPDATA\Microsoft\Edge\User Data\Default\Login Data"
      }
      foreach ($browser in $loginDbs.Keys) {
          if (Test-Path $loginDbs[$browser]) {
              Write-Host "  $browser Login Data: $($loginDbs[$browser])"
              Write-Host "  ($([Math]::Round((Get-Item $loginDbs[$browser]).Length/1KB,1)) KB — DPAPI-encrypted SQLite)"
          }
      }

  - step: 4
    type: exec_powershell
    description: "Copy high-value files to staging directory"
    command: |
      Write-Host "[PAS] Staging simulation — copy discovered files:"
      $dummyFile = "$env:TEMP\PAS_T1005_sample_sensitive.docx"
      Set-Content $dummyFile "PAS-T1005-SENSITIVE-DOC"

      $stagingDir = "$env:TEMP\PAS_T1005_staging"
      Copy-Item $dummyFile $stagingDir -Force
      Write-Host "[PAS] $([IO.Path]::GetFileName($dummyFile)) staged to $stagingDir"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — recursive file search across user directories, access to Login Data or .kdbx files"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove staging directory and sample file"
    command: |
      Remove-Item "$env:TEMP\PAS_T1005_staging"              -Recurse -Force -ErrorAction SilentlyContinue
      Remove-Item "$env:TEMP\PAS_T1005_sample_sensitive.docx" -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Local collection artifacts removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1005 cleanup complete"

analyst_checklist:
  - "File event: access to Login Data, .kdbx, .pfx, id_rsa by non-browser/non-app process"
  - "Process event: recursive Get-ChildItem or dir /s /b across user directories"
  - "Sentinel: DeviceFileEvents | where FileName in ('Login Data','id_rsa') and InitiatingProcessFileName == 'powershell.exe'"
  - "Sentinel: DeviceFileEvents | where FileName endswith '.kdbx' and ActionType == 'FileRead'"
  - "MDE alert: 'Sensitive credential file accessed by unexpected process'"
  - "CONTROL CHECK: MDE file access auditing on sensitive paths — Desktop, Documents, .ssh"
  - "CONTROL CHECK: Windows Defender Credential Guard — protects LSASS but not file-based credentials"
  - "CONTROL CHECK: BitLocker full-disk encryption — protects data from offline theft but not from live process access"
