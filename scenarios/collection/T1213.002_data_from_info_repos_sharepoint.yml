id: T1213.002_data_from_info_repositories_sharepoint
name: "Data from Information Repositories — SharePoint"
mitre_technique: "T1213.002"
mitre_tactic: "collection"
description: >
  Adversaries access SharePoint to harvest sensitive documents, spreadsheets, and
  organisational data. With valid M365 credentials or a compromised service principal,
  the Microsoft Graph API or SharePoint REST API can enumerate and download all files
  a user has access to across all SharePoint sites and OneDrive. Bulk downloads via
  the Graph API bypass per-file download prompts and DLP controls that trigger only
  on browser downloads. Detection relies on M365 Unified Audit Log and Defender
  for Cloud Apps anomaly detection.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1213/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1213.002 — SharePoint data collection simulation"

  - step: 2
    type: exec_powershell
    description: "Simulate Graph API SharePoint file enumeration — loopback only"
    command: |
      Write-Host "[PAS] SharePoint/Graph API collection pattern:"
      Write-Host "[PAS] Real: GET /v1.0/sites?search=* then GET /v1.0/sites/{id}/drive/root/children"

      # Simulate Graph API calls to loopback
      $endpoints = @(
          "http://127.0.0.1/v1.0/sites?search=*",
          "http://127.0.0.1/v1.0/me/drive/root/children",
          "http://127.0.0.1/v1.0/drives/{driveId}/root/children"
      )
      foreach ($ep in $endpoints) {
          try {
              $req = [System.Net.WebRequest]::Create($ep)
              $req.Headers.Add("Authorization", "Bearer PAS_FAKE_TOKEN")
              $req.Headers.Add("Accept", "application/json")
              $req.Timeout = 300
              $req.GetResponse() | Out-Null
          } catch {}
          Write-Host "[PAS] Graph API query: $ep"
      }

  - step: 3
    type: exec_powershell
    description: "Check for SharePoint sync client and local cached files"
    command: |
      Write-Host "[PAS] SharePoint sync client check:"
      $onedrivePath = "$env:USERPROFILE\OneDrive - *"
      $syncedSites  = Get-ChildItem "$env:USERPROFILE" -Filter "OneDrive*" -Directory `
          -ErrorAction SilentlyContinue
      foreach ($dir in $syncedSites) {
          $size = (Get-ChildItem $dir.FullName -Recurse -ErrorAction SilentlyContinue |
              Measure-Object -Property Length -Sum).Sum
          Write-Host "  Synced library: $($dir.Name) ($([Math]::Round($size/1MB,1)) MB)"
      }
      Write-Host "[PAS] All synced SharePoint content accessible locally without API calls"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check Sentinel — OfficeActivity FileDownloaded bulk events, Graph API calls to /sites and /drives"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1213.002 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Sentinel: OfficeActivity | where Operation == 'FileDownloaded' | summarize count() by UserId, bin(TimeGenerated,5m) | where count_ > 20"
  - "Sentinel: DeviceNetworkEvents | where RemoteUrl contains 'graph.microsoft.com' and RemoteUrl contains '/drive' and InitiatingProcessFileName == 'powershell.exe'"
  - "Defender for Cloud Apps: 'Mass download' activity policy — alert on >50 files downloaded in session"
  - "CONTROL CHECK: Conditional Access — restrict Graph API access for service principals to approved IP ranges"
  - "CONTROL CHECK: SharePoint site sharing settings — disable 'Anyone with link' for sensitive sites"
  - "CONTROL CHECK: Microsoft Purview DLP — alert on bulk download of sensitive labelled documents"
