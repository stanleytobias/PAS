id: T1213.004_data_from_info_repositories_crm
name: "Data from Information Repositories — Customer Relationship Management Software"
mitre_technique: "T1213.004"
mitre_tactic: "collection"
description: >
  Adversaries access CRM systems (Salesforce, HubSpot, Dynamics 365) to harvest
  customer records, contact lists, deal pipelines, and sensitive business intelligence.
  CRM data is extremely valuable — it contains PII, financial data, and competitive
  intelligence. Access is typically via stolen user credentials or compromised service
  accounts with CRM API access. Bulk exports via the CRM's built-in export functionality
  or REST API can exfiltrate thousands of records in minutes.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1213/004/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1213.004 — CRM Collection: adversary exports customer records from Salesforce/Dynamics via API or bulk export"

  - step: 2
    type: marker
    description: "CRM audit check"
    message: "CONTROL CHECK: Salesforce — enable Event Monitoring, alert on bulk data exports and unusual API query volumes. HubSpot — audit API key usage and export activity."

  - step: 3
    type: marker
    description: "Data export control check"
    message: "CONTROL CHECK: Restrict bulk export capability to specific roles only. CRM data export should require manager approval and be logged with business justification."

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check CRM audit logs — bulk export events, API calls returning >100 records, access outside business hours"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1213.004 cleanup complete — marker-only scenario"

analyst_checklist:
  - "CRM audit: data export event by non-admin user"
  - "CRM audit: API queries returning >100 records in rapid succession from single token"
  - "Defender for Cloud Apps: connect Salesforce — alert on 'Mass download of CRM records'"
  - "CONTROL CHECK: IP allowlisting for CRM API access — restrict to office/VPN IPs"
  - "CONTROL CHECK: Data Loss Prevention — alert on CRM export files transferred to external storage"
