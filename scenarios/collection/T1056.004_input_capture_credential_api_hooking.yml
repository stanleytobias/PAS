id: T1056.004_input_capture_credential_api_hooking
name: "Input Capture — Credential API Hooking"
mitre_technique: "T1056.004"
mitre_tactic: "collection"
description: >
  Adversaries hook Windows API functions that handle credential operations to intercept
  credentials as they pass through the API layer. Unlike keylogging (which captures
  all keystrokes), credential API hooking targets specific functions: SspiCli
  (AcquireCredentialsHandle, InitializeSecurityContext), WinInet authentication
  callbacks, and browser credential APIs. The hook is installed via SetWindowsHookEx
  or inline patching (hot-patching) the target function's first bytes with a JMP
  to the adversary's code. This is the mechanism used by credential-stealing malware
  like ZLoader and Dridex to harvest banking credentials.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1056/004/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1056.004 — Credential API Hooking simulation"

  - step: 2
    type: exec_powershell
    description: "Install WH_CBT hook — intercepts window creation/activation events including credential dialogs"
    command: |
      Add-Type @"
      using System;
      using System.Runtime.InteropServices;
      using System.Diagnostics;

      public class PASApiHookSim {
          public const int WH_CBT = 5;
          private static IntPtr hookHandle = IntPtr.Zero;
          private static HookProc proc = HookCallback;
          public delegate IntPtr HookProc(int code, IntPtr wParam, IntPtr lParam);

          [DllImport("user32.dll")] static extern IntPtr SetWindowsHookEx(
              int idHook, HookProc lpfn, IntPtr hMod, uint dwThreadId);
          [DllImport("user32.dll")] static extern bool UnhookWindowsHookEx(IntPtr hhk);
          [DllImport("kernel32.dll")] static extern IntPtr GetModuleHandle(string lpModuleName);
          [DllImport("user32.dll")] static extern IntPtr CallNextHookEx(
              IntPtr hhk, int nCode, IntPtr wParam, IntPtr lParam);

          public static bool Install() {
              using (var p = Process.GetCurrentProcess())
              using (var m = p.MainModule) {
                  hookHandle = SetWindowsHookEx(WH_CBT, proc,
                      GetModuleHandle(m.ModuleName), 0);
                  return hookHandle != IntPtr.Zero;
              }
          }
          public static void Uninstall() {
              if (hookHandle != IntPtr.Zero) {
                  UnhookWindowsHookEx(hookHandle);
                  hookHandle = IntPtr.Zero;
              }
          }
          private static IntPtr HookCallback(int code, IntPtr wParam, IntPtr lParam) {
              // PAS: hook registered but not intercepting — simulation only
              return CallNextHookEx(hookHandle, code, wParam, lParam);
          }
      }
"@
      $ok = [PASApiHookSim]::Install()
      Write-Host "[PAS] WH_CBT hook installed (WH_CBT=5): $ok"
      Write-Host "[PAS] CBT hook intercepts window creation — used to detect credential dialogs"
      Write-Host "[PAS] Real implant: inspect window class for credential dialog, read contents"
      Start-Sleep -Milliseconds 500
      [PASApiHookSim]::Uninstall()
      Write-Host "[PAS] Hook uninstalled after 500ms"

  - step: 3
    type: exec_powershell
    description: "Simulate SSPI function hook — targets authentication API"
    command: |
      Write-Host "[PAS] SSPI credential API hooking pattern:"
      Write-Host "[PAS] Target functions in secur32.dll / sspicli.dll:"
      @("AcquireCredentialsHandle","InitializeSecurityContext",
        "AcceptSecurityContext","QueryContextAttributes") |
          ForEach-Object { Write-Host "  Hook target: $_" }

      Write-Host "[PAS] Real attack: hot-patch first 5 bytes with JMP to trampoline"
      Write-Host "[PAS] Captures: username + password passed to SSPI before encryption"
      Write-Host "[PAS] Detection: inline hook detection via byte comparison of API function prologues"

      # Generate a load of sspi.dll to create telemetry
      Add-Type -MemberDefinition @"
      [DllImport("secur32.dll")] public static extern int QuerySecurityPackageInfo(
          string pszPackageName, out IntPtr ppPackageInfo);
"@ -Name PASSecur32 -Namespace PAS
      $info = [IntPtr]::Zero
      try { [PAS.PASSecur32]::QuerySecurityPackageInfo("NTLM", [ref]$info) | Out-Null } catch {}
      Write-Host "[PAS] secur32.dll loaded — SSPI API access telemetry generated"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — unexpected DLL injection into credential-handling processes, hook installation on secur32/sspicli"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Ensure hooks are uninstalled"
    command: |
      try { [PASApiHookSim]::Uninstall() } catch {}
      Write-Host "[PAS][Cleanup] API hooks uninstalled"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1056.004 cleanup complete"

analyst_checklist:
  - "API: SetWindowsHookEx with WH_CBT (5) or WH_CALLWNDPROC (4) from non-accessibility process"
  - "Module: unexpected DLL loaded into lsass.exe or browser processes"
  - "Memory: inline hook detected (first bytes of SSPI functions modified — JMP patch)"
  - "Sentinel: DeviceEvents | where ActionType contains 'ApiHook' and InitiatingProcessFileName == 'powershell.exe'"
  - "MDE alert: 'Credential API hooked by suspicious process' — MDE kernel sensor detects inline hooks"
  - "CONTROL CHECK: Credential Guard isolates LSASS — SSPI hooks cannot access Kerberos tickets inside VBS enclave"
  - "CONTROL CHECK: MDE tamper protection prevents known hooking patterns from executing"
  - "CONTROL CHECK: ETW (Event Tracing for Windows) for Microsoft-Windows-Security-Auditing captures SSPI events"
