id: T1074.002_data_staged_remote
name: "Data Staged — Remote Data Staging"
mitre_technique: "T1074.002"
mitre_tactic: "collection"
description: >
  Adversaries consolidate data from multiple compromised hosts onto a single system
  prior to exfiltration. Rather than exfiltrating from each compromised host directly
  (which creates many outbound connections), they stage all data on one relay host and
  exfiltrate once. The relay host is typically one with unrestricted outbound internet
  access. Data is moved using SMB shares, net use, or direct file copy over lateral
  movement channels.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1074/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1074.002 — Remote Data Staging simulation (loopback only)"

  - step: 2
    type: exec_powershell
    description: "Simulate staging data to remote host via SMB — net use copy pattern"
    command: |
      Write-Host "[PAS] Remote staging simulation (to loopback):"
      Write-Host "[PAS] Real attack: copy collected data from multiple hosts to single relay"

      # Connect to loopback IPC$ (simulates connecting to remote staging host)
      net use \\127.0.0.1\IPC$ 2>&1 | Out-Null
      Write-Host "[PAS] SMB connection to staging host: 127.0.0.1"

      # Create local staging data
      $localStage  = "$env:TEMP\PAS_T1074_002_localdata"
      New-Item -ItemType Directory $localStage -Force | Out-Null
      "PAS-T1074.002-COLLECTED-FROM-HOST-A" | Set-Content "$localStage\host_a_data.txt"
      "PAS-T1074.002-COLLECTED-FROM-HOST-B" | Set-Content "$localStage\host_b_data.txt"

      Write-Host "[PAS] Simulating xcopy to remote staging path:"
      Write-Host "[PAS] xcopy $localStage \\\\127.0.0.1\\ADMIN`$\\Temp\\staging\\ /E /Y"

  - step: 3
    type: exec_powershell
    description: "Simulate BITS transfer for remote staging — background/stealthy"
    command: |
      Write-Host "[PAS] BITS remote staging pattern:"
      Write-Host "[PAS] Real: Start-BitsTransfer -Source collected\* -Destination \\\\relay\\staging"
      $bitsJobName = "PAS_T1074_002_Stage"
      bitsadmin /cancel $bitsJobName 2>&1 | Out-Null
      bitsadmin /create $bitsJobName 2>&1 | Out-Null
      Write-Host "[PAS] BITS job created for staging transfer simulation"
      bitsadmin /cancel $bitsJobName 2>&1 | Out-Null
      Write-Host "[PAS] BITS job cancelled (lab safety)"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — lateral SMB file copies to staging host, BITS transfers with file destination paths"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove staging data and connections"
    command: |
      net use \\127.0.0.1\IPC$ /delete 2>&1 | Out-Null
      bitsadmin /cancel "PAS_T1074_002_Stage" 2>&1 | Out-Null
      Remove-Item "$env:TEMP\PAS_T1074_002_localdata" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Remote staging simulation cleaned"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1074.002 cleanup complete"

analyst_checklist:
  - "Network event: lateral SMB (port 445) connections between endpoints — not just to servers"
  - "File event: large bulk file copy over SMB to internal host outside normal file server paths"
  - "Sentinel: DeviceNetworkEvents | where RemotePort == 445 and RemoteIPType == 'Private' and InitiatingProcessFileName == 'powershell.exe'"
  - "Sentinel: DeviceEvents | where ActionType == 'BitsJobCreated' and AdditionalFields contains 'ADMIN$'"
  - "MDE alert: 'Lateral file staging detected'"
  - "CONTROL CHECK: Segment endpoint-to-endpoint SMB — workstations should not be able to access ADMIN$ on other workstations"
  - "CONTROL CHECK: East-west network monitoring — lateral SMB between endpoints is abnormal in most environments"
