id: T1213.006_data_from_info_repositories_databases
name: "Data from Information Repositories — Databases"
mitre_technique: "T1213.006"
mitre_tactic: "collection"
description: >
  Adversaries query databases to extract sensitive structured data — customer records,
  financial data, credentials, PII, and business intelligence. On Windows, common
  targets include local SQL Server, MySQL, SQLite databases, and remote cloud databases
  (Azure SQL, RDS). Adversaries use sqlcmd.exe, PowerShell Invoke-Sqlcmd, or direct
  ADO.NET connections. Detection relies on: SQL query audit logs showing bulk SELECT *
  operations, unusual query sources, and data export volume anomalies.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1213/006/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1213.006 — Database collection simulation"

  - step: 2
    type: exec_powershell
    description: "Check for local SQL Server and databases"
    command: |
      Write-Host "[PAS] Database service enumeration:"
      $dbServices = Get-Service -Name "MSSQL*","MySQL*","PostgreSQL*" -ErrorAction SilentlyContinue
      foreach ($svc in $dbServices) {
          Write-Host "  $($svc.Name): $($svc.Status)"
      }

      # Check for SQLite databases in common locations
      Write-Host "[PAS] SQLite database search:"
      $sqliteDbs = Get-ChildItem $env:USERPROFILE -Filter "*.db" -Recurse `
          -Depth 4 -ErrorAction SilentlyContinue | Select-Object -First 5
      foreach ($db in $sqliteDbs) {
          Write-Host "  SQLite: $($db.FullName) ($($db.Length) bytes)"
      }

  - step: 3
    type: exec_powershell
    description: "Simulate sqlcmd bulk data extraction — SELECT * dump pattern"
    command: |
      Write-Host "[PAS] SQL data extraction simulation:"
      Write-Host "[PAS] Real: sqlcmd -S server -Q 'SELECT * FROM customers' -o customers.csv"

      $sqlcmd = Get-Command sqlcmd -ErrorAction SilentlyContinue
      if ($sqlcmd) {
          $outputFile = "$env:TEMP\PAS_T1213_006_dump.csv"
          Start-Process sqlcmd.exe `
              -ArgumentList "-S 127.0.0.1 -Q `"SELECT @@VERSION`" -o $outputFile" `
              -Wait -NoNewWindow -ErrorAction SilentlyContinue
          Write-Host "[PAS] sqlcmd.exe executed — SQL query process event generated"
          Remove-Item $outputFile -Force -ErrorAction SilentlyContinue
      } else {
          Write-Host "[PAS] sqlcmd not installed — simulating ADO.NET connection:"
          try {
              $conn = New-Object System.Data.SqlClient.SqlConnection(
                  "Server=127.0.0.1,1433;Database=master;Connection Timeout=1")
              $conn.Open()
              $conn.Close()
          } catch {}
          Write-Host "[PAS] SQL connection attempt to 127.0.0.1:1433 generated"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — sqlcmd.exe with bulk SELECT queries, SQL audit log for SELECT * on sensitive tables"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1213.006 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Process event: sqlcmd.exe with bulk query arguments, output redirected to file"
  - "SQL audit: SELECT * on customer/financial tables from non-application account"
  - "Sentinel: DeviceProcessEvents | where FileName == 'sqlcmd.exe' and ProcessCommandLine contains 'SELECT'"
  - "Azure SQL audit: bulk reads from service account outside application deployment hours"
  - "CONTROL CHECK: SQL Server audit must be enabled — without it, bulk queries are invisible"
  - "CONTROL CHECK: Principle of least privilege — application accounts should only SELECT specific columns, not SELECT *"
  - "CONTROL CHECK: Azure SQL TDE and Always Encrypted — data encrypted at rest and in motion limits bulk dump value"
