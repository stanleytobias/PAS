id: T1134.005_access_token_manipulation_sid_history_injection
name: "Access Token Manipulation — SID-History Injection"
mitre_technique: "T1134.005"
mitre_tactic: "privilege_escalation"
description: >
  Adversaries inject a high-privilege SID (typically Domain Admins S-1-5-21-...-512
  or Enterprise Admins S-1-5-21-...-519) into the SID-History attribute of an
  existing AD account. Windows includes all SID-History values in the user's
  access token, granting the account access to any resource the injected SID
  can access — effectively giving a normal user domain admin permissions without
  adding them to the Domain Admins group. This technique requires domain admin
  rights to execute and persists until SID-History is cleared.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1134/005/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1134.005 — SID-History Injection simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate existing SID-History attributes — detect prior injections"
    command: |
      Write-Host "[PAS] SID-History enumeration:"
      $isDomain = (Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue).PartOfDomain
      if ($isDomain) {
          try {
              $searcher = New-Object System.DirectoryServices.DirectorySearcher
              $searcher.Filter = "(&(objectClass=user)(sIDHistory=*))"
              $searcher.PropertiesToLoad.AddRange(@("sAMAccountName","sIDHistory"))
              $results = $searcher.FindAll()
              if ($results.Count -gt 0) {
                  Write-Host "  [RISK] Accounts with SID-History set: $($results.Count)"
                  $results | ForEach-Object {
                      Write-Host "  Account: $($_.Properties['samaccountname'][0]) has SIDHistory"
                  }
              } else {
                  Write-Host "  No accounts with SID-History detected (expected in clean environment)"
              }
          } catch { Write-Host "  LDAP query failed (no DC)" }
      } else {
          Write-Host "[PAS] Not domain-joined — SID-History targets AD environments"
      }

  - step: 3
    type: exec_powershell
    description: "Retrieve Domain Admins SID — injection target"
    command: |
      Write-Host "[PAS] Domain Admins SID retrieval (injection target):"
      $isDomain = (Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue).PartOfDomain
      if ($isDomain) {
          try {
              $da  = New-Object System.Security.Principal.NTAccount("$env:USERDOMAIN\Domain Admins")
              $sid = $da.Translate([System.Security.Principal.SecurityIdentifier])
              Write-Host "  Domain Admins SID: $($sid.Value)"
              Write-Host "  Enterprise Admins SID ends in -519; DA ends in -512"
              Write-Host "[PAS] Real attack: mimikatz sid::patch then sid::add /sam:victim /new:<DA SID>"
          } catch { Write-Host "  SID translation failed (no DC)" }
      }
      Write-Host "[PAS] SID-History injection requires Domain Admin + auditpol modification to hide"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — LDAP sIDHistory attribute modification (Event 4738), Defender for Identity SID-History alert"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1134.005 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Event ID 4738 on DC: user account changed — check if sIDHistory was modified"
  - "LDAP: sIDHistory attribute set on user object — any value is suspicious unless during domain migration"
  - "Sentinel: SecurityEvent | where EventID == 4738 and SubjectUserName != 'SYSTEM'"
  - "Defender for Identity: 'SID-History injection' alert — built-in detection"
  - "CONTROL CHECK: Quarterly audit: Get-ADUser -Filter {SIDHistory -ne '$null'} — any result should be investigated"
  - "CONTROL CHECK: Defender for Identity monitors AD attribute changes in real time on DCs"
  - "CONTROL CHECK: Domain migration complete? Clear all SID-History attributes once migration finishes"
