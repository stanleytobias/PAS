id: T1070.001_clear_windows_event_logs
name: "Indicator Removal — Clear Windows Event Logs"
mitre_technique: "T1070.001"
mitre_tactic: "defense_evasion"
description: >
  Adversaries clear Windows Event Logs to remove evidence of their activity. Clearing
  the Security, System, or Application logs removes authentication events, process
  creation events, and other forensic artifacts. The act of clearing itself generates
  Event ID 1102 (Security log cleared) and 104 (System log cleared) — but only if
  those events are forwarded to a SIEM before the clear occurs.
  This scenario clears a PAS-created test log channel to demonstrate the wevtutil
  telemetry without destroying real forensic evidence, then validates detection.
  Requires elevation.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1070/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1070.001 — Clear Windows Event Logs simulation (elevation required)"

  - step: 2
    type: exec_powershell
    description: "Create and populate a test event log channel for safe clearing"
    command: |
      $logName = "PAS-T1070-TestLog"
      $source  = "PAS"
      New-EventLog -LogName $logName -Source $source -ErrorAction SilentlyContinue
      1..5 | ForEach-Object {
          Write-EventLog -LogName $logName -Source $source `
              -EventId $_ -EntryType Information `
              -Message "PAS T1070.001 test event $_"
      }
      Write-Host "[PAS] Test log '$logName' created with 5 events"

  - step: 3
    type: exec_powershell
    description: "Method 1: Clear log via wevtutil cl — primary adversary method"
    command: |
      Write-Host "[PAS] Method 1: wevtutil cl (clear-log) on test channel:"
      wevtutil cl "PAS-T1070-TestLog" 2>&1
      Write-Host "[PAS] wevtutil clear-log executed — process event generated"

  - step: 4
    type: exec_powershell
    description: "Method 2: Clear log via PowerShell Clear-EventLog"
    command: |
      # Repopulate test log for second clear
      $source = "PAS"
      Write-EventLog -LogName "PAS-T1070-TestLog" -Source $source `
          -EventId 1 -EntryType Information -Message "PAS repopulated" `
          -ErrorAction SilentlyContinue

      Write-Host "[PAS] Method 2: Clear-EventLog cmdlet:"
      Clear-EventLog -LogName "PAS-T1070-TestLog" -ErrorAction SilentlyContinue
      Write-Host "[PAS] Clear-EventLog executed — script block log captures cmdlet"

  - step: 5
    type: exec_powershell
    description: "Simulate the wevtutil cl Security pattern — show telemetry without actual clearing"
    command: |
      Write-Host "[PAS] Simulating real adversary command (NOT EXECUTED — telemetry demonstration):"
      Write-Host "  wevtutil cl Security"
      Write-Host "  wevtutil cl System"
      Write-Host "  wevtutil cl Application"
      Write-Host "  for /F 'tokens=*' %1 in ('wevtutil.exe el') do wevtutil.exe cl '%1'"
      Write-Host "[PAS] The above commands generate Event ID 1102 and 104 in the Security/System log"
      Write-Host "[PAS] These events only help if your SIEM ingests them before clearing"

  - step: 6
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 7
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — wevtutil.exe with 'cl' argument, Clear-EventLog in script block logging"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove test event log channel"
    command: |
      Remove-EventLog -LogName "PAS-T1070-TestLog" -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Test event log removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1070.001 cleanup complete"

analyst_checklist:
  - "Event ID 1102: Security audit log was cleared — generated when Security log is cleared"
  - "Event ID 104: System log cleared — generated in System log when System log is cleared"
  - "Process event: wevtutil.exe with 'cl' or 'clear-log' argument"
  - "Sentinel: DeviceProcessEvents | where FileName == 'wevtutil.exe' and ProcessCommandLine matches regex @'(?i)\\bcl\\b|clear-log'"
  - "Sentinel: SecurityEvent | where EventID == 1102"
  - "Sentinel: SystemEvent | where EventID == 104"
  - "MDE alert: 'Security log cleared' or 'Event log cleared'"
  - "CONTROL CHECK: Real-time forwarding of Security/System logs to SIEM is essential — logs cleared before forwarding are lost forever"
  - "CONTROL CHECK: Alert on wevtutil.exe execution immediately — there is no legitimate reason to run it in production outside change windows"
  - "CONTROL CHECK: Consider immutable log storage (Azure Monitor, Log Analytics) as a secondary collection path"
