id: T1055.011_extra_window_memory_injection
name: "Process Injection — Extra Window Memory Injection"
mitre_technique: "T1055.011"
mitre_tactic: "defense_evasion"
description: >
  Adversaries abuse Extra Window Memory (EWM) — a small region of memory associated
  with every GUI window — to store and execute malicious code. Using SetWindowLongPtr
  to overwrite the WndProc pointer and SendNotifyMessage to trigger execution, an
  adversary can execute code inside a target GUI process without CreateRemoteThread.
  This scenario generates the EWM API telemetry chain against a benign target window.
  Requires elevation.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1055/011/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1055.011 — Extra Window Memory Injection simulation (elevation required)"

  - step: 2
    type: exec_powershell
    description: "Simulate EWM injection API chain — FindWindow, SetWindowLongPtr, SendNotifyMessage"
    command: |
      Add-Type @"
      using System;
      using System.Runtime.InteropServices;
      public class PASEWMInject {
          [DllImport("user32.dll", SetLastError=true)] public static extern IntPtr FindWindow(string cls, string wnd);
          [DllImport("user32.dll", SetLastError=true)] public static extern IntPtr GetWindowLongPtr(IntPtr hWnd, int nIndex);
          [DllImport("user32.dll", SetLastError=true)] public static extern IntPtr SetWindowLongPtr(IntPtr hWnd, int nIndex, IntPtr newLong);
          [DllImport("user32.dll", SetLastError=true)] public static extern bool SendNotifyMessage(IntPtr hWnd, uint msg, IntPtr wParam, IntPtr lParam);
          [DllImport("kernel32.dll")] public static extern IntPtr OpenProcess(uint a, bool b, int pid);
          [DllImport("kernel32.dll")] public static extern IntPtr VirtualAllocEx(IntPtr h, IntPtr a, uint s, uint t, uint p);
          [DllImport("kernel32.dll")] public static extern bool WriteProcessMemory(IntPtr h, IntPtr a, byte[] b, uint s, out int w);
          [DllImport("kernel32.dll")] public static extern bool VirtualFreeEx(IntPtr h, IntPtr a, uint s, uint t);
          [DllImport("kernel32.dll")] public static extern bool CloseHandle(IntPtr h);
          [DllImport("user32.dll")] public static extern uint GetWindowThreadProcessId(IntPtr hWnd, out int lpdwProcessId);
      }
"@
      # Launch target GUI process
      $target = Start-Process notepad.exe -PassThru
      Start-Sleep -Milliseconds 1500
      Write-Host "[PAS] Target: notepad.exe PID $($target.Id)"

      # Find the window handle
      $hWnd = [PASEWMInject]::FindWindow("Notepad", $null)
      if ($hWnd -eq [IntPtr]::Zero) {
          $hWnd = [PASEWMInject]::FindWindow("notepad", $null)
      }
      Write-Host "[PAS] FindWindow(Notepad): hWnd=$hWnd"

      if ($hWnd -ne [IntPtr]::Zero) {
          # Read current WndProc pointer — GWLP_WNDPROC = -4
          $origWndProc = [PASEWMInject]::GetWindowLongPtr($hWnd, -4)
          Write-Host "[PAS] GetWindowLongPtr(GWLP_WNDPROC): original=$origWndProc"

          # Allocate RWX memory in target process
          $hProc = [PASEWMInject]::OpenProcess(0x1F0FFF, $false, $target.Id)
          $addr  = [PASEWMInject]::VirtualAllocEx($hProc, [IntPtr]::Zero, 4096, 0x3000, 0x40)
          Write-Host "[PAS] VirtualAllocEx(RWX) in notepad: $addr"

          $payload = [byte[]](0x90) * 16  # Benign NOP sled
          $written = 0
          [PASEWMInject]::WriteProcessMemory($hProc, $addr, $payload, $payload.Length, [ref]$written) | Out-Null
          Write-Host "[PAS] WriteProcessMemory: $written bytes written"

          # SetWindowLongPtr to overwrite WndProc — telemetry generation only, restore immediately
          # In real attack this would point to injected shellcode
          Write-Host "[PAS] SetWindowLongPtr(GWLP_WNDPROC) would redirect WndProc to injected address"
          Write-Host "[PAS] Skipping actual overwrite to prevent destabilising target window"

          # SendNotifyMessage — triggers WndProc execution
          [PASEWMInject]::SendNotifyMessage($hWnd, 0x0400, [IntPtr]::Zero, [IntPtr]::Zero) | Out-Null
          Write-Host "[PAS] SendNotifyMessage WM_USER sent — triggers WndProc (telemetry generated)"

          [PASEWMInject]::VirtualFreeEx($hProc, $addr, 0, 0x8000) | Out-Null
          [PASEWMInject]::CloseHandle($hProc) | Out-Null
      } else {
          Write-Host "[PAS] Window handle not found — notepad may not have rendered yet"
      }
      $target | Stop-Process -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS] EWM injection API chain complete"

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 5

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — GetWindowLongPtr + VirtualAllocEx(RWX) + WriteProcessMemory targeting GUI process"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Terminate notepad"
    command: |
      Get-Process notepad -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] notepad.exe terminated"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1055.011 cleanup complete"

analyst_checklist:
  - "API: OpenProcess + VirtualAllocEx(RWX) + WriteProcessMemory + SetWindowLongPtr targeting GUI process"
  - "API: SendNotifyMessage from cross-process context — rare outside legitimate UI automation"
  - "MDE: DeviceEvents | where ActionType in ('SetWindowLongPtrApiCall','VirtualAllocExApiCall') and InitiatingProcessFileName == 'powershell.exe'"
  - "Sentinel: DeviceEvents | where ActionType == 'SetWindowLongPtrApiCall' and InitiatingProcessFileName not in ('explorer.exe','dwm.exe')"
  - "CONTROL CHECK: EWM injection targets GUI processes — alert on SetWindowLongPtr calls originating from non-UI processes"
  - "CONTROL CHECK: VirtualAllocEx(RWX) + SendNotifyMessage in the same process pair is a high-confidence EWM indicator"
