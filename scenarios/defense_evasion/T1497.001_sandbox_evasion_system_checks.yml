id: T1497.001_virtualization_sandbox_evasion_system_checks
name: "Virtualization/Sandbox Evasion — System Checks"
mitre_technique: "T1497.001"
mitre_tactic: "defense_evasion"
description: >
  Adversaries detect sandbox and analysis environments by checking for VM-specific
  artifacts: VMware registry keys, VirtualBox drivers, known analysis tool processes,
  small disk size, low CPU count, or MAC address vendor prefixes assigned to hypervisors.
  If a sandbox is detected, malware halts execution to avoid detonation and analysis.
  This scenario exercises all major VM/sandbox detection checks to validate that your
  lab environment would be fingerprinted and that EDR captures the enumeration activity.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1497/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1497.001 — Sandbox Evasion System Checks simulation"

  - step: 2
    type: exec_powershell
    description: "VM artifact enumeration — registry, driver, process checks"
    command: |
      Write-Host "[PAS] T1497.001 — VM/Sandbox detection checks:"
      $score = 0

      # VMware registry key check
      $vmwareKey = "HKLM:\SOFTWARE\VMware, Inc.\VMware Tools"
      if (Test-Path $vmwareKey) {
          Write-Host "  [VM] VMware Tools registry key found"
          $score++
      }

      # VirtualBox registry check
      $vboxKey = "HKLM:\SOFTWARE\Oracle\VirtualBox Guest Additions"
      if (Test-Path $vboxKey) {
          Write-Host "  [VM] VirtualBox Guest Additions found"
          $score++
      }

      # VM-specific processes
      $vmProcs = @("vmtoolsd","vmwaretray","vmwareuser","vboxservice","vboxtray",
                   "wireshark","procmon","procexp","fiddler","x32dbg","x64dbg","ollydbg")
      $running = Get-Process -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name
      $vmProcs | ForEach-Object {
          if ($running -contains $_) {
              Write-Host "  [VM/Analysis] Process detected: $_"
              $score++
          }
      }

      # CPU count check (sandboxes often have 1-2 CPUs)
      $cpus = (Get-CimInstance Win32_ComputerSystem).NumberOfLogicalProcessors
      Write-Host "  CPU count: $cpus $(if ($cpus -le 2) { '← low (sandbox indicator)' })"
      if ($cpus -le 2) { $score++ }

      # RAM check (sandboxes often have <4GB)
      $ramGB = [Math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory/1GB, 1)
      Write-Host "  RAM: ${ramGB}GB $(if ($ramGB -lt 4) { '← low (sandbox indicator)' })"
      if ($ramGB -lt 4) { $score++ }

      # Disk size check
      $diskGB = [Math]::Round((Get-PSDrive C).Used/1GB + (Get-PSDrive C).Free/1GB, 0)
      Write-Host "  Disk: ${diskGB}GB $(if ($diskGB -lt 60) { '← small (sandbox indicator)' })"
      if ($diskGB -lt 60) { $score++ }

      # MAC address vendor check (VMware=00:0C:29, VirtualBox=08:00:27)
      $macs = Get-NetAdapter -ErrorAction SilentlyContinue |
          Where-Object { $_.Status -eq 'Up' } |
          Select-Object -ExpandProperty MacAddress
      $vmMacPrefixes = @("00-0C-29","00-50-56","08-00-27","00-1C-14")
      $macs | ForEach-Object {
          $prefix = $_.Substring(0,8).ToUpper()
          if ($vmMacPrefixes -contains $prefix) {
              Write-Host "  [VM] VM MAC prefix detected: $_"
              $score++
          }
      }

      Write-Host "[PAS] VM indicator score: $score"
      if ($score -gt 2) {
          Write-Host "[PAS] HIGH SCORE: This environment would be detected as a sandbox/VM"
          Write-Host "[PAS] Adversary malware would halt — no detonation in your lab"
      } else {
          Write-Host "[PAS] LOW SCORE: Environment appears physical/undetected"
      }

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — script block logging captures full VM check enumeration; WMI queries for hardware info"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1497.001 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Script block logging (4104): VM registry key checks, process enumeration, WMI hardware queries visible"
  - "MDE: DeviceEvents | where ActionType == 'WmiQuery' — hardware fingerprinting via WMI"
  - "Sentinel: DeviceEvents | where ActionType == 'PowerShellCommand' and AdditionalFields contains 'VMware'"
  - "CONTROL CHECK: If score is HIGH — your lab VM will be fingerprinted by real malware; consider hardening:"
  - "  - Increase vCPU count to 4+"
  - "  - Increase RAM to 8GB+"
  - "  - Use a large disk image (100GB+)"
  - "  - Change VM MAC address to a non-hypervisor vendor prefix"
  - "  - Remove VMware/VirtualBox guest additions"
  - "CONTROL CHECK: Analysis tools (Wireshark, ProcMon) being open during detonation will cause sandbox-aware malware to abort"
