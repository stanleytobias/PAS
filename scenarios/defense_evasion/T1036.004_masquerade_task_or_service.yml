id: T1036.004_masquerade_task_or_service
name: "Masquerading — Masquerade Task or Service"
mitre_technique: "T1036.004"
mitre_tactic: "defense_evasion"
description: >
  Adversaries create scheduled tasks or services with names that mimic legitimate
  Windows components (e.g. 'WindowsUpdateSvc', 'MicrosoftEdgeUpdate') to blend in
  with normal system activity and evade triage. This scenario creates a benign
  scheduled task and service under a spoofed system-looking name, then cleans up.
  Detection relies on scrutinizing new task/service creation events for anomalous
  binary paths under plausible-sounding names.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1036/004/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1036.004 — Masquerade Task or Service simulation (requires elevation for service creation)"

  - step: 2
    type: exec_powershell
    description: "Create a scheduled task with a Windows-looking name pointing to a benign payload"
    command: |
      $taskName   = "MicrosoftEdgeUpdateTaskMachineCore_PAS"
      $taskAction = New-ScheduledTaskAction -Execute "cmd.exe" -Argument "/c echo PAS-T1036.004"
      $taskTrigger = New-ScheduledTaskTrigger -AtStartup
      Register-ScheduledTask -TaskName $taskName -Action $taskAction `
          -Trigger $taskTrigger -RunLevel Highest -Force | Out-Null
      Write-Host "[PAS] Scheduled task created: $taskName"

  - step: 3
    type: exec_powershell
    description: "Create a service with a Windows-looking name pointing to a benign binary"
    command: |
      $svcName = "WinUpdateHelperSvc_PAS"
      $binPath = "$env:SystemRoot\System32\cmd.exe"
      sc.exe create $svcName binPath= "$binPath /c echo PAS-T1036.004-SVC" start= demand | Out-Null
      Write-Host "[PAS] Service created: $svcName (binary: $binPath)"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 5

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — new task and service with Windows-themed names should appear; verify binary path anomaly"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove masquerade scheduled task"
    command: |
      $taskName = "MicrosoftEdgeUpdateTaskMachineCore_PAS"
      if (Get-ScheduledTask -TaskName $taskName -ErrorAction SilentlyContinue) {
          Unregister-ScheduledTask -TaskName $taskName -Confirm:$false
          Write-Host "[PAS][Cleanup] Removed scheduled task: $taskName"
      }

  - step: 2
    type: exec_powershell
    description: "Remove masquerade service"
    command: |
      $svcName = "WinUpdateHelperSvc_PAS"
      sc.exe delete $svcName | Out-Null
      Write-Host "[PAS][Cleanup] Removed service: $svcName"

  - step: 3
    type: marker
    description: "Cleanup complete"
    message: "T1036.004 cleanup complete — task and service removed"

analyst_checklist:
  - "Event ID 4698: Scheduled task created — task name contains 'MicrosoftEdgeUpdate' but binary is cmd.exe"
  - "Event ID 7045: New service installed — service name looks legitimate but binary path is anomalous"
  - "Sentinel: DeviceEvents | where ActionType == 'ScheduledTaskCreated' and AdditionalFields contains 'cmd.exe'"
  - "Sentinel: SecurityEvent | where EventID == 7045 | where ServiceFileName !startswith 'C:\\Windows\\' and ServiceName matches regex 'Update|Svc|Helper'"
  - "MDE alert: 'Suspicious scheduled task' or 'New service with unusual binary path'"
  - "CONTROL CHECK: Do your scheduled task and service creation alerts inspect binary path, not just service name?"
  - "CONTROL CHECK: Baseline legitimate MicrosoftEdgeUpdate task paths — alert on deviations"
