id: T1219.002_remote_access_desktop_software
name: "Remote Access Tools — Remote Desktop Software"
mitre_technique: "T1219.002"
mitre_tactic: "command_and_control"
description: >
  Adversaries install and use legitimate remote desktop software (AnyDesk, TeamViewer,
  ScreenConnect, VNC, Splashtop) as a persistent C2 channel. These tools are widely
  used for legitimate IT support, so their presence may not be immediately suspicious.
  Adversaries favour them because they: use encrypted outbound connections (no inbound
  firewall rules needed), survive reboots if installed as a service, and provide a full
  GUI session rather than just a shell. Detection relies on unexpected installation,
  execution outside business hours, and connections to non-approved RMM infrastructure.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1219/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1219.002 — Remote Desktop Software C2 simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate remote access tools installed or running on this host"
    command: |
      Write-Host "[PAS] Remote access tool inventory:"
      $tools = @(
          "AnyDesk","TeamViewer","ScreenConnect","ConnectWise","VNC","RealVNC",
          "TightVNC","UltraVNC","Splashtop","LogMeIn","GoToAssist","Ammyy Admin",
          "RemotePC","Zoho Assist","RustDesk","Supremo","DWService"
      )

      $installed = Get-ItemProperty `
          "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*",
          "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" `
          -ErrorAction SilentlyContinue |
          Where-Object { $_.DisplayName } |
          Select-Object DisplayName, InstallDate, Publisher

      $running = Get-Process -ErrorAction SilentlyContinue |
          Select-Object Name, Id, Path

      foreach ($tool in $tools) {
          $inst = $installed | Where-Object { $_.DisplayName -like "*$tool*" }
          $run  = $running   | Where-Object { $_.Name -like "*$tool*" }
          if ($inst) { Write-Host "  INSTALLED: $($inst.DisplayName) — verify business justification" }
          if ($run)  { Write-Host "  RUNNING:   $($run.Name) (PID $($run.Id)) — active session?" }
      }

  - step: 3
    type: exec_powershell
    description: "Simulate AnyDesk silent install pattern — adversary installs RAT silently"
    command: |
      Write-Host "[PAS] Silent RAT install simulation:"
      Write-Host "[PAS] Real attack: AnyDesk.exe --install C:\ProgramData\AnyDesk --start-with-win"
      Write-Host "[PAS] Drops to ProgramData (no UAC required), registers as autostart"

      # Create marker for the silent install pattern
      $installDir = "$env:ProgramData\PAS_T1219_002_RemoteAccess"
      New-Item -ItemType Directory $installDir -Force | Out-Null
      Copy-Item "$env:SystemRoot\System32\cmd.exe" "$installDir\PAS_remoteaccess.exe" -Force

      # Register autostart (common persistence for RATs)
      $regPath = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run"
      Set-ItemProperty $regPath -Name "PAS_T1219_002_RemoteAccess" `
          -Value "$installDir\PAS_remoteaccess.exe" -Type String
      Write-Host "[PAS] Silent install simulated: $installDir\PAS_remoteaccess.exe"
      Write-Host "[PAS] Autostart registered: HKCU Run key"

  - step: 4
    type: exec_powershell
    description: "Simulate outbound connection to remote access relay infrastructure"
    command: |
      Write-Host "[PAS] Remote access tool outbound relay connection:"
      Write-Host "[PAS] AnyDesk relays: net.anydesk.com:443 (outbound only — no inbound port)"
      Write-Host "[PAS] TeamViewer: router.teamviewer.com:5938 or 443"
      # Generate connection telemetry to loopback
      foreach ($port in @(443, 5938)) {
          try {
              $tcp  = New-Object System.Net.Sockets.TcpClient
              $conn = $tcp.BeginConnect("127.0.0.1", $port, $null, $null)
              $conn.AsyncWaitHandle.WaitOne(200, $false) | Out-Null
              $tcp.Close()
          } catch {}
      }
      Write-Host "[PAS] Remote access relay connection telemetry generated"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — remote access tool process event, autostart registry entry, outbound to RAT relay domains"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove remote access simulation artifacts"
    command: |
      # Remove autostart registry entry
      Remove-ItemProperty "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run" `
          -Name "PAS_T1219_002_RemoteAccess" -Force -ErrorAction SilentlyContinue

      # Remove install directory
      Remove-Item "$env:ProgramData\PAS_T1219_002_RemoteAccess" `
          -Recurse -Force -ErrorAction SilentlyContinue

      Write-Host "[PAS][Cleanup] Remote access simulation artifacts removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1219.002 cleanup complete"

analyst_checklist:
  - "Process event: anydesk.exe, teamviewer.exe, screenconnect.exe installed or executed outside business hours"
  - "Registry event: new Run key pointing to remote access tool binary in ProgramData or Temp"
  - "Network event: outbound to *.anydesk.com, *.teamviewer.com, *.screenconnect.com from unexpected host"
  - "Sentinel: DeviceProcessEvents | where FileName in ('AnyDesk.exe','TeamViewer.exe','ScreenConnect.exe')"
  - "Sentinel: DeviceRegistryEvents | where RegistryKey contains 'Run' and RegistryValueData contains 'AnyDesk'"
  - "MDE alert: 'Remote monitoring tool installed' or 'Unsanctioned RMM software execution'"
  - "CONTROL CHECK: Maintain approved RAT/RMM allowlist — alert on any tool not on the list"
  - "CONTROL CHECK: Block remote access tool relay domains at proxy for non-IT-support endpoints"
  - "CONTROL CHECK: Software deployment policy — remote access tools should only be deployed via managed channels (Intune), not ad-hoc"
