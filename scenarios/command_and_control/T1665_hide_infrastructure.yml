id: T1665_hide_infrastructure
name: "Hide Infrastructure"
mitre_technique: "T1665"
mitre_tactic: "command_and_control"
description: >
  Adversaries hide their C2 infrastructure to make detection, blocking, and takedown
  harder. Techniques include: routing C2 traffic through CDNs (Cloudflare, Akamai)
  so the C2 IP appears as a legitimate CDN IP; using compromised legitimate servers
  as relay nodes; registering look-alike domains with valid TLS certificates; and
  filtering out security researcher traffic (Shodan, VirusTotal) so the server
  appears benign when scanned. No host-side simulation is possible — detection
  is network and threat-intel driven.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1665/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1665 — Hide Infrastructure: C2 hidden behind CDNs, relay nodes, look-alike domains with valid TLS certs"

  - step: 2
    type: exec_powershell
    description: "Check if C2-suspicious traffic is going through CDN IP ranges"
    command: |
      Write-Host "[PAS] CDN IP range check — C2 hiding behind CDN:"
      Write-Host "[PAS] Real pattern: adversary registers domain on Cloudflare — C2 IP resolves to Cloudflare CDN"
      Write-Host "[PAS] All traffic looks like legitimate Cloudflare traffic at the IP layer"

      # Check recent connections to Cloudflare/Akamai ranges from scripting processes
      $cdnRanges = @("104.16.","104.17.","104.18.","104.19.","104.20.","104.21.","172.64.","172.65.","172.66.")
      $recentConns = Get-NetTCPConnection -State Established -ErrorAction SilentlyContinue |
          Where-Object { $_.OwningProcess -ne 4 }
      foreach ($conn in $recentConns) {
          foreach ($range in $cdnRanges) {
              if ($conn.RemoteAddress -like "$range*") {
                  $proc = Get-Process -Id $conn.OwningProcess -ErrorAction SilentlyContinue
                  if ($proc -and $proc.Name -notmatch 'chrome|msedge|firefox|svchost') {
                      Write-Host "  SUSPICIOUS: $($proc.Name) (PID $($conn.OwningProcess)) -> $($conn.RemoteAddress):$($conn.RemotePort)"
                  }
              }
          }
      }
      Write-Host "[PAS] CDN connection audit complete"

  - step: 3
    type: marker
    description: "Domain fronting awareness check"
    message: "CONTROL CHECK: CDN-hosted C2 domains — threat intel feeds flag domains registered on CDNs with no legitimate content history. Enable Defender Threat Intelligence for newly-registered CDN-fronted domains."

  - step: 4
    type: marker
    description: "TLS certificate transparency check"
    message: "CONTROL CHECK: Certificate Transparency logs (crt.sh) — adversaries obtain valid TLS certs for look-alike domains. Monitor CT logs for certs issued to domains similar to yours (typosquats, subdomain abuse)."

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check Sentinel — non-browser processes connecting to CDN IP ranges, recently-registered domains with TLS certs"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1665 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Network event: non-browser process (powershell.exe, cmd.exe) connecting to Cloudflare/Akamai CDN IPs"
  - "Threat intel: newly-registered domains (<30 days old) with valid TLS certificate and CDN hosting"
  - "Sentinel: DeviceNetworkEvents | where RemoteIPType == 'Public' and InitiatingProcessFileName == 'powershell.exe' and RemoteIP startswith '104.'"
  - "CONTROL CHECK: Domain fronting mitigation — HTTPS inspection proxy validates SNI matches HTTP Host header"
  - "CONTROL CHECK: Subscribe to Certificate Transparency monitoring for your domain namespace"
  - "CONTROL CHECK: Defender Threat Intelligence — newly-registered domain detections fire even for CDN-hosted C2"
