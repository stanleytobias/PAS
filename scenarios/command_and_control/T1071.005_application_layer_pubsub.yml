id: T1071.005_application_layer_pubsub_protocols
name: "Application Layer Protocol — Publish/Subscribe Protocols"
mitre_technique: "T1071.005"
mitre_tactic: "command_and_control"
description: >
  Adversaries use publish/subscribe messaging protocols (MQTT, AMQP, Kafka, WebSocket)
  as C2 channels. These protocols are commonly used by IoT devices, microservices, and
  industrial control systems — making C2 traffic blend in with legitimate operational
  traffic. MQTT in particular operates over port 1883 (unencrypted) or 8883 (TLS)
  and is widely used. An implant subscribes to a topic on the broker and receives
  commands published by the adversary. This scenario generates MQTT and WebSocket
  connection telemetry to loopback.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1071/005/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1071.005 — Pub/Sub Protocol C2 simulation (loopback only)"

  - step: 2
    type: exec_powershell
    description: "Simulate MQTT C2 connection — implant subscribes to command topic"
    command: |
      Write-Host "[PAS] Simulating MQTT C2 channel (ports 1883/8883):"
      foreach ($port in @(1883, 8883)) {
          try {
              $tcp  = New-Object System.Net.Sockets.TcpClient
              $conn = $tcp.BeginConnect("127.0.0.1", $port, $null, $null)
              $conn.AsyncWaitHandle.WaitOne(300, $false) | Out-Null
              $tcp.Close()
          } catch {}
          Write-Host "[PAS] MQTT probe: 127.0.0.1:$port"
      }

      # Simulate MQTT CONNECT packet (binary protocol — generates distinct network signature)
      try {
          $tcp    = New-Object System.Net.Sockets.TcpClient
          $conn   = $tcp.BeginConnect("127.0.0.1", 1883, $null, $null)
          if ($conn.AsyncWaitHandle.WaitOne(300, $false) -and $tcp.Connected) {
              $stream = $tcp.GetStream()
              # Minimal MQTT CONNECT packet
              $mqttConnect = [byte[]](
                  0x10, 0x12, 0x00, 0x04, 0x4D, 0x51, 0x54, 0x54,  # CONNECT + "MQTT"
                  0x04, 0x00, 0x00, 0x3C, 0x00, 0x06,               # Protocol level, flags, keepalive
                  0x50, 0x41, 0x53, 0x5F, 0x43, 0x32)               # Client ID: "PAS_C2"
              $stream.Write($mqttConnect, 0, $mqttConnect.Length)
              Write-Host "[PAS] MQTT CONNECT packet sent to 127.0.0.1:1883"
          }
          $tcp.Close()
      } catch {}

  - step: 3
    type: exec_powershell
    description: "Simulate WebSocket C2 — persistent bidirectional channel over HTTP upgrade"
    command: |
      Write-Host "[PAS] Simulating WebSocket C2 (port 80/443 HTTP Upgrade):"
      # WebSocket upgrade request — distinctive HTTP headers
      try {
          $request = [System.Net.HttpWebRequest]::Create("http://127.0.0.1/ws")
          $request.Headers.Add("Upgrade", "websocket")
          $request.Headers.Add("Connection", "Upgrade")
          $request.Headers.Add("Sec-WebSocket-Key", "PAS+T1071005==")
          $request.Headers.Add("Sec-WebSocket-Version", "13")
          $request.Timeout = 500
          $request.GetResponse() | Out-Null
      } catch {}
      Write-Host "[PAS] WebSocket upgrade request generated — HTTP Upgrade header telemetry"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — port 1883/8883 connections from non-IoT processes, HTTP Upgrade: websocket headers"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1071.005 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Network event: port 1883 (MQTT) or 8883 (MQTT/TLS) connections from scripting processes"
  - "Network event: HTTP connection with 'Upgrade: websocket' header from non-browser process"
  - "Sentinel: DeviceNetworkEvents | where RemotePort in (1883, 8883) and InitiatingProcessFileName == 'powershell.exe'"
  - "Sentinel: DeviceNetworkEvents | where InitiatingProcessFileName == 'powershell.exe' and RemotePort == 80 — inspect for WebSocket upgrade"
  - "CONTROL CHECK: MQTT ports (1883/8883) should be blocked outbound unless IoT/OT devices explicitly require them"
  - "CONTROL CHECK: Proxy must inspect WebSocket traffic — persistent WebSocket connections can carry C2 indefinitely"
