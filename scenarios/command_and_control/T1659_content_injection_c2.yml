id: T1659_content_injection_c2
name: "Content Injection"
mitre_technique: "T1659"
mitre_tactic: "command_and_control"
description: >
  Adversaries with a privileged network position (compromised router, ISP-level MitM,
  BGP hijack) inject malicious content into legitimate HTTP responses, delivering
  additional payloads or maintaining persistent C2 communications without hosting
  infrastructure. Unlike Initial Access use (T1659 is cross-listed), the C2 use
  focuses on delivering commands and receiving responses through manipulated
  legitimate traffic. No host-side simulation is possible — this requires a
  network-layer position. Detection is network and infrastructure-layer driven.
  See also T1659 under Initial Access for the access-phase simulation.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1659/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1659 (C2 context) — Content Injection: adversary with network MitM position injects C2 commands into HTTP responses"

  - step: 2
    type: exec_powershell
    description: "Validate HTTP integrity controls on this host"
    command: |
      Write-Host "[PAS] HTTP content integrity controls check:"

      # Check for HTTPS enforcement — content injection only works on plain HTTP
      $hstsKey = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Internet Settings"
      Write-Host "  Checking proxy/HTTPS settings:"

      # Check if system proxy is set (which would inspect HTTP)
      $proxyEnabled = (Get-ItemProperty $hstsKey -Name ProxyEnable `
          -ErrorAction SilentlyContinue).ProxyEnable
      Write-Host "  System proxy enabled: $($proxyEnabled -eq 1)"
      if ($proxyEnabled -eq 1) {
          $proxyServer = (Get-ItemProperty $hstsKey -Name ProxyServer `
              -ErrorAction SilentlyContinue).ProxyServer
          Write-Host "  Proxy server: $proxyServer"
      }

      # Check DNS-over-HTTPS (prevents DNS injection)
      $dohKey = "HKLM:\SYSTEM\CurrentControlSet\Services\Dnscache\Parameters"
      $doh = (Get-ItemProperty $dohKey -Name EnableAutoDoh `
          -ErrorAction SilentlyContinue).EnableAutoDoh
      Write-Host "  DNS-over-HTTPS enabled: $($doh -eq 2)"

  - step: 3
    type: marker
    description: "HTTPS enforcement check"
    message: "CONTROL CHECK: Content injection only works against plain HTTP. Enforce HTTPS Everywhere — HSTS preloading, CSP headers, and HTTPS-only mode in browsers eliminate the injection surface."

  - step: 4
    type: marker
    description: "Network integrity check"
    message: "CONTROL CHECK: BGP route monitoring (RPKI validation) and certificate transparency monitoring detect the network-level prerequisites for content injection attacks."

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check: HTTPS enforcement posture, DNS-over-HTTPS status, any plain-HTTP internal services"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1659 C2 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Network event: unexpected script tags or iframes in HTTP responses (requires SSL inspection)"
  - "Certificate event: new root certificate added — enables MitM for HTTPS injection"
  - "DNS event: well-known domains resolving to unexpected IPs — DNS injection prerequisite"
  - "Sentinel: DeviceRegistryEvents | where RegistryKey contains 'Root\\Certificates' and ActionType == 'RegistryKeyCreated'"
  - "CONTROL CHECK: Enforce HTTPS on all internal services — eliminates HTTP injection surface"
  - "CONTROL CHECK: RPKI validation on BGP routers — prevents route hijacking prerequisite for injection"
  - "CONTROL CHECK: DNS-over-HTTPS or DNSSEC — prevents DNS poisoning injection prerequisite"
