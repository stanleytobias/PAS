id: T1090.003_proxy_multihop
name: "Proxy — Multi-hop Proxy"
mitre_technique: "T1090.003"
mitre_tactic: "command_and_control"
description: >
  Adversaries chain multiple proxy nodes together so that traffic passes through
  several intermediaries before reaching the true C2 server. Each hop strips one
  layer of routing information — a defender tracing the traffic sees only the
  last hop before their network, not the original source. Real-world implementations
  use Tor (onion routing), chained VPS nodes in different countries, or chained
  SOCKS5 proxies. Tracing through multiple hops requires cooperation from multiple
  service providers across jurisdictions, which is operationally difficult.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1090/003/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1090.003 — Multi-hop Proxy C2 simulation"

  - step: 2
    type: exec_powershell
    description: "Simulate chained SOCKS5 proxy connections — sequential hop telemetry"
    command: |
      Write-Host "[PAS] Multi-hop proxy chain simulation:"
      Write-Host "[PAS] Real pattern: victim -> Hop1 (VPS1) -> Hop2 (VPS2) -> C2 server"
      Write-Host "[PAS] Defender sees only Hop1 IP from victim's perspective"

      $hops = @(
          @{ Name="Hop1"; IP="127.0.0.1"; Port=1080 }
          @{ Name="Hop2"; IP="127.0.0.1"; Port=1081 }
          @{ Name="Hop3"; IP="127.0.0.1"; Port=1082 }
      )

      foreach ($hop in $hops) {
          try {
              $tcp  = New-Object System.Net.Sockets.TcpClient
              $conn = $tcp.BeginConnect($hop.IP, $hop.Port, $null, $null)
              $conn.AsyncWaitHandle.WaitOne(200, $false) | Out-Null
              $tcp.Close()
          } catch {}
          Write-Host "[PAS] Hop attempted: $($hop.Name) -> $($hop.IP):$($hop.Port)"
      }
      Write-Host "[PAS] 3-hop chain traversal telemetry generated"

  - step: 3
    type: exec_powershell
    description: "Simulate Tor-like onion routing pattern — sequential encrypted connections"
    command: |
      Write-Host "[PAS] Tor/onion routing simulation pattern:"
      Write-Host "[PAS] Tor uses port 9050 (SOCKS) or 9150 (Tor Browser)"
      Write-Host "[PAS] Detection: connection to Tor guard node IPs or port 9050/9150"

      # Check if Tor is running (common adversary tool)
      $torProc = Get-Process -Name "tor" -ErrorAction SilentlyContinue
      if ($torProc) {
          Write-Host "[PAS] Tor process FOUND running — C2 over Tor highly likely"
      } else {
          Write-Host "[PAS] Tor not running on this host"
      }

      # Probe Tor SOCKS ports
      foreach ($port in @(9050, 9150)) {
          try {
              $tcp  = New-Object System.Net.Sockets.TcpClient
              $conn = $tcp.BeginConnect("127.0.0.1", $port, $null, $null)
              $conn.AsyncWaitHandle.WaitOne(200, $false) | Out-Null
              if ($tcp.Connected) { Write-Host "[PAS] Tor SOCKS port $port is OPEN" }
              $tcp.Close()
          } catch {}
      }
      Write-Host "[PAS] Tor port probe complete"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — connections to Tor guard node IPs, port 9050/9150 connections, tor.exe process"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1090.003 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Process event: tor.exe running on endpoint"
  - "Network event: connection to port 9050 or 9150 (Tor SOCKS) from any process"
  - "Network event: connection to known Tor guard node IPs (Threat Intel feed)"
  - "Sentinel: DeviceProcessEvents | where FileName == 'tor.exe'"
  - "Sentinel: DeviceNetworkEvents | where RemotePort in (9050, 9150)"
  - "MDE alert: 'Tor network usage detected' or 'Anonymous proxy connection'"
  - "CONTROL CHECK: Block Tor guard node IP ranges at perimeter firewall — Tor Project publishes the full list"
  - "CONTROL CHECK: DNS-layer block of Tor directory authority domains"
  - "CONTROL CHECK: Alert on tor.exe or tor-browser.exe execution via AppLocker/WDAC"
