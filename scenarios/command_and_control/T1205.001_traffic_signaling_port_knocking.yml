id: T1205.001_traffic_signaling_port_knocking
name: "Traffic Signaling — Port Knocking"
mitre_technique: "T1205.001"
mitre_tactic: "command_and_control"
description: >
  Adversaries use port knocking to hide a C2 listener behind a firewall — the port
  is closed until a specific sequence of connection attempts to predefined ports is
  detected, at which point the firewall or daemon opens the target port for the
  source IP. This makes the C2 port invisible to scanners and defeats attempts to
  connect without knowing the knock sequence. Common implementations: knockd daemon
  on Linux C2 servers, custom Windows firewall rule manipulation, or software-defined
  knock sequences in the implant. The Windows host-side simulation exercises the
  knock-sequence connection pattern and the conditional firewall rule opening.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1205/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1205.001 — Port Knocking traffic signaling simulation"

  - step: 2
    type: exec_powershell
    description: "Simulate port knock sequence — sequential connection attempts to closed ports"
    command: |
      Write-Host "[PAS] Port knock sequence simulation:"
      Write-Host "[PAS] Knock sequence: 7000 -> 8000 -> 9000 -> opens port 4444"

      $knockSequence = @(7000, 8000, 9000)
      foreach ($port in $knockSequence) {
          try {
              $tcp  = New-Object System.Net.Sockets.TcpClient
              $conn = $tcp.BeginConnect("127.0.0.1", $port, $null, $null)
              $conn.AsyncWaitHandle.WaitOne(200, $false) | Out-Null
              $tcp.Close()
          } catch {}
          Write-Host "[PAS] Knock: 127.0.0.1:$port (expected REFUSED — port intentionally closed)"
          Start-Sleep -Milliseconds 100
      }
      Write-Host "[PAS] Knock sequence complete — C2 server would now open port 4444 for this source IP"

  - step: 3
    type: exec_powershell
    description: "Simulate conditional firewall rule — opens port after knock, simulating the server-side response"
    command: |
      Write-Host "[PAS] Simulating server-side conditional port open after knock:"

      # Add a firewall rule that would be triggered by the knock sequence
      New-NetFirewallRule `
          -DisplayName "PAS_T1205_001_KnockTriggered" `
          -Direction Inbound `
          -Protocol TCP `
          -LocalPort 4444 `
          -Action Allow `
          -Profile Any `
          -Description "PAS simulation — port opened by knock sequence" `
          -ErrorAction SilentlyContinue | Out-Null

      Write-Host "[PAS] Firewall rule added: allow TCP 4444 inbound (knock-triggered)"
      Write-Host "[PAS] C2 port 4444 now open — adversary connects within time window"

      # Connect to the now-open port
      Start-Sleep -Milliseconds 200
      try {
          $tcp  = New-Object System.Net.Sockets.TcpClient
          $conn = $tcp.BeginConnect("127.0.0.1", 4444, $null, $null)
          $conn.AsyncWaitHandle.WaitOne(300, $false) | Out-Null
          $tcp.Close()
      } catch {}
      Write-Host "[PAS] Connection attempt to 4444 after knock — C2 connection telemetry generated"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — sequential failed connections to consecutive closed ports, followed by successful connection to previously-closed port"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove knock-triggered firewall rule"
    command: |
      Remove-NetFirewallRule -DisplayName "PAS_T1205_001_KnockTriggered" `
          -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Knock-triggered firewall rule removed"
      # Verify removal
      $check = Get-NetFirewallRule -DisplayName "PAS_T1205_001_KnockTriggered" `
          -ErrorAction SilentlyContinue
      if (-not $check) { Write-Host "[PAS][Cleanup] Confirmed: rule removed" }

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1205.001 cleanup complete"

analyst_checklist:
  - "Network event: rapid sequential TCP connection attempts to 3+ closed ports (all REFUSED) followed by successful connection"
  - "Firewall event: new inbound allow rule added dynamically (not via GPO/Intune)"
  - "Sentinel: DeviceNetworkEvents | where ActionType == 'ConnectionFailed' | summarize count() by RemotePort, bin(TimeGenerated,5s) — burst of failed probes"
  - "Sentinel: DeviceFirewallEvents | where ActionType == 'FirewallRuleAdded' and RuleDirection == 'Inbound'"
  - "MDE alert: 'Port knocking sequence detected' or 'Dynamic firewall rule creation'"
  - "CONTROL CHECK: Host-based firewall rules should only be changed via GPO/Intune — alert on manual rule additions"
  - "CONTROL CHECK: NDR should detect the knock pattern — burst of REFUSED connections to sequential ports is a strong signal"
  - "CONTROL CHECK: Windows Firewall change audit — Event ID 2004 (rule added) and 2006 (rule deleted)"
