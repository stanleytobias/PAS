id: T1001.001_data_obfuscation_junk_data
name: "Data Obfuscation — Junk Data"
mitre_technique: "T1001.001"
mitre_tactic: "command_and_control"
description: >
  Adversaries pad C2 traffic with random junk bytes before, after, or between
  meaningful data to defeat content-length based signatures, make pattern matching
  harder, and disguise the true size of commands and responses. The junk data is
  ignored by the C2 framework's parser but confuses signature-based inspection.
  Common patterns: random prefix before Base64 payload, fixed-length padding to
  normalise packet sizes, or junk appended after a delimiter.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1001/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1001.001 — Junk Data C2 obfuscation simulation"

  - step: 2
    type: exec_powershell
    description: "Simulate junk-padded HTTP beacon — random prefix + real data + random suffix"
    command: |
      Write-Host "[PAS] Junk-padded C2 beacon pattern:"
      $rng       = New-Object System.Random
      $realData  = [Convert]::ToBase64String(
          [Text.Encoding]::UTF8.GetBytes("PAS-T1001.001|$env:COMPUTERNAME"))

      # Random prefix and suffix (junk bytes encoded as hex)
      $prefixLen = $rng.Next(16, 48)
      $suffixLen = $rng.Next(16, 48)
      $prefix    = -join (1..$prefixLen | ForEach-Object { $rng.Next(0,255).ToString('x2') })
      $suffix    = -join (1..$suffixLen | ForEach-Object { $rng.Next(0,255).ToString('x2') })

      $padded = "$prefix|$realData|$suffix"
      Write-Host "[PAS] Junk prefix: $($prefix.Substring(0,16))... ($prefixLen chars)"
      Write-Host "[PAS] Real data:   $realData"
      Write-Host "[PAS] Junk suffix: $($suffix.Substring(0,16))... ($suffixLen chars)"
      Write-Host "[PAS] Full padded: $($padded.Substring(0,40))..."

      try {
          Invoke-WebRequest -Uri "http://127.0.0.1/update" -Method POST -Body $padded `
              -TimeoutSec 1 -ErrorAction SilentlyContinue | Out-Null
      } catch {}
      Write-Host "[PAS] Junk-padded beacon sent"

  - step: 3
    type: exec_powershell
    description: "Simulate fixed-length padded beacons — normalise size to defeat size-based detection"
    command: |
      Write-Host "[PAS] Fixed-length padding (normalise to 256 bytes):"
      $targetSize = 256
      $rng        = New-Object System.Random

      1..3 | ForEach-Object {
          $payload = "PAS-T1001.001-FIXED-$_|$env:COMPUTERNAME"
          $payBytes = [Text.Encoding]::UTF8.GetBytes($payload)
          $padBytes = New-Object byte[] ($targetSize - $payBytes.Length)
          $rng.NextBytes($padBytes)
          $full    = [byte[]]($payBytes + $padBytes)
          $encoded = [Convert]::ToBase64String($full)
          Write-Host "[PAS] Beacon $_ : $targetSize bytes fixed (payload=$($payBytes.Length), pad=$($targetSize - $payBytes.Length))"
          try {
              Invoke-WebRequest -Uri "http://127.0.0.1/b" -Method POST `
                  -Body $encoded -TimeoutSec 1 -ErrorAction SilentlyContinue | Out-Null
          } catch {}
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — HTTP POST bodies with consistent fixed length, delimiter-separated sections of differing entropy"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1001.001 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Network event: HTTP POST bodies with consistent fixed length across multiple requests (padding indicator)"
  - "Network event: POST bodies containing pipe or delimiter characters separating high-entropy sections"
  - "Sentinel: DeviceNetworkEvents | where InitiatingProcessFileName == 'powershell.exe' and ActionType == 'ConnectionSuccess'"
  - "CONTROL CHECK: NDR statistical analysis — fixed-length beacons appear as size-histogram spike"
  - "CONTROL CHECK: Content length normalisation defeats size-based evasion — inspect content regardless of size"
