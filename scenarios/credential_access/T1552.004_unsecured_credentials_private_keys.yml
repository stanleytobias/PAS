id: T1552.004_unsecured_credentials_private_keys
name: "Unsecured Credentials — Private Keys"
mitre_technique: "T1552.004"
mitre_tactic: "credential_access"
description: >
  Adversaries search for private key files that can be used for authentication —
  SSH private keys, TLS/SSL certificates with private keys (.pem, .pfx, .p12),
  PGP/GPG private keys, and code-signing certificates. Unencrypted (no passphrase)
  private keys can be used immediately without any cracking. Common locations:
  ~/.ssh/id_rsa, ~/.ssh/id_ed25519, certificate files in user directories, and
  private keys hardcoded in application configuration or source code.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1552/004/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1552.004 — Private Key search simulation"

  - step: 2
    type: exec_powershell
    description: "Search for private key files across user profile and common locations"
    command: |
      Write-Host "[PAS] Private key file search:"
      $keyExtensions = @("*.pem","*.key","*.pfx","*.p12","*.ppk","*.asc",
                         "id_rsa","id_ed25519","id_ecdsa","*.gpg")
      $searchPaths = @($env:USERPROFILE, $env:APPDATA, "$env:USERPROFILE\.ssh")

      $totalFound = 0
      foreach ($ext in $keyExtensions) {
          foreach ($path in $searchPaths) {
              if (Test-Path $path) {
                  $files = Get-ChildItem $path -Filter $ext -Recurse -Depth 4 `
                      -ErrorAction SilentlyContinue | Select-Object -First 2
                  foreach ($f in $files) {
                      Write-Host "  [KEY] $($f.FullName) ($($f.Length) bytes)"
                      # Check if unencrypted (most valuable)
                      $content = Get-Content $f.FullName -Raw -ErrorAction SilentlyContinue
                      if ($content -match "BEGIN.*PRIVATE KEY" -and $content -notmatch "ENCRYPTED") {
                          Write-Host "    [HIGH VALUE] Unencrypted private key!"
                      }
                      $totalFound++
                  }
              }
          }
      }
      Write-Host "[PAS] Private key files found: $totalFound"

  - step: 3
    type: exec_powershell
    description: "Create test private key file — simulates staging for exfiltration"
    command: |
      $stagingDir = "$env:TEMP\PAS_T1552_004_keys"
      New-Item -ItemType Directory $stagingDir -Force | Out-Null
      Set-Content "$stagingDir\id_rsa" @"
-----BEGIN RSA PRIVATE KEY-----
PAS-T1552.004-TEST-KEY-MARKER
MIIEowIBAAKCAQEA0000000000000000000000000000000000000000000000
(PAS simulation — not a real key)
-----END RSA PRIVATE KEY-----
"@
      Write-Host "[PAS] Test private key marker: $stagingDir\id_rsa"
      Write-Host "[PAS] Real adversary: SSH to all discovered SSH targets using stolen key"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — recursive search for id_rsa/.pem/.pfx by powershell.exe, private key files in staging"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove private key staging directory"
    command: |
      Remove-Item "$env:TEMP\PAS_T1552_004_keys" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Private key staging removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1552.004 cleanup complete"

analyst_checklist:
  - "File event: .pem, .pfx, id_rsa, id_ed25519 accessed by powershell.exe or non-SSH process"
  - "Sentinel: DeviceFileEvents | where FileName in ('id_rsa','id_ed25519') and InitiatingProcessFileName != 'ssh.exe'"
  - "Sentinel: DeviceFileEvents | where FileName endswith '.pem' and InitiatingProcessFileName == 'powershell.exe'"
  - "MDE alert: 'Private key file accessed'"
  - "CONTROL CHECK: Always use a strong passphrase on SSH private keys — unencrypted keys are immediately usable"
  - "CONTROL CHECK: Use ssh-agent or Windows OpenSSH agent — private key stays encrypted on disk"
  - "CONTROL CHECK: Certificate-based SSH via AD CS — short-lived certificates replace long-lived private keys"
