id: T1552.001_unsecured_credentials_files
name: "Unsecured Credentials — Credentials in Files"
mitre_technique: "T1552.001"
mitre_tactic: "credential_access"
description: >
  Adversaries search local and network file systems for files containing insecurely
  stored credentials. Common finds: web.config / appsettings.json with database
  connection strings, .env files with API keys, deployment scripts with hardcoded
  passwords, PowerShell scripts with plaintext credentials, and batch files using
  net use with passwords. A simple findstr sweep across the filesystem regularly
  yields high-value credentials in most enterprise environments.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1552/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1552.001 — Credentials in Files search simulation"

  - step: 2
    type: exec_powershell
    description: "Create decoy credential files — simulate findings adversary would discover"
    command: |
      $stagingDir = "$env:TEMP\PAS_T1552_001_stage"
      New-Item -ItemType Directory $stagingDir -Force | Out-Null

      # Create realistic credential-containing file types
      Set-Content "$stagingDir\web.config" @"
<configuration>
  <connectionStrings>
    <add name="DefaultConnection"
         connectionString="Server=sql01;Database=AppDB;User Id=sa;Password=PAS-FAKE-DBPASS-123;"
         providerName="System.Data.SqlClient" />
  </connectionStrings>
</configuration>
"@
      Set-Content "$stagingDir\.env" @"
DB_HOST=sql01.corp.local
DB_USER=svc_appdb
DB_PASS=PAS-FAKE-ENVPASS-456
AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
AWS_SECRET_ACCESS_KEY=PAS-FAKE-AWS-SECRET
"@
      Set-Content "$stagingDir\deploy.ps1" @"
# Deployment script
`$cred = New-Object PSCredential("svc_deploy", (ConvertTo-SecureString "PAS-FAKE-DEPLOYPASS" -AsPlainText -Force))
"@
      Write-Host "[PAS] Decoy credential files created in: $stagingDir"

  - step: 3
    type: exec_powershell
    description: "Simulate credential file search — findstr sweep pattern"
    command: |
      Write-Host "[PAS] Credential file search (findstr pattern):"
      $keywords = @("password","passwd","pwd","secret","connectionstring","api_key","access_key")
      $stagingDir = "$env:TEMP\PAS_T1552_001_stage"

      foreach ($kw in $keywords) {
          $hits = Get-ChildItem $stagingDir -Recurse -ErrorAction SilentlyContinue |
              Select-String $kw -ErrorAction SilentlyContinue
          foreach ($hit in $hits) {
              Write-Host "[PAS] FOUND [$kw]: $($hit.Filename):$($hit.LineNumber)"
          }
      }
      Write-Host "[PAS] Real: findstr /SI /M 'password' *.xml *.config *.json *.ps1 *.bat"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — findstr.exe with password/secret keywords, recursive file search across config paths"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove credential file staging directory"
    command: |
      Remove-Item "$env:TEMP\PAS_T1552_001_stage" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Credential file staging removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1552.001 cleanup complete"

analyst_checklist:
  - "Process event: findstr.exe with 'password', 'secret', or 'connectionstring' keyword arguments"
  - "File event: web.config, .env, or appsettings.json accessed by non-application process"
  - "Sentinel: DeviceProcessEvents | where FileName == 'findstr.exe' and ProcessCommandLine contains 'password'"
  - "Sentinel: DeviceFileEvents | where FileName in ('web.config','.env','appsettings.json') and InitiatingProcessFileName == 'powershell.exe'"
  - "MDE alert: 'Credential search in files'"
  - "CONTROL CHECK: Secrets scanning in CI/CD — prevent credentials from reaching repositories"
  - "CONTROL CHECK: Replace hardcoded credentials with managed identities and Azure Key Vault references"
  - "CONTROL CHECK: Microsoft Purview DLP — scan for credential patterns in file content"
