id: T1552.003_unsecured_credentials_shell_history
name: "Unsecured Credentials — Shell History"
mitre_technique: "T1552.003"
mitre_tactic: "credential_access"
description: >
  Adversaries search command-line history files for credentials that were passed
  as command-line arguments. On Windows, PowerShell history is stored at
  %APPDATA%\Microsoft\Windows\PowerShell\PSReadLine\ConsoleHost_history.txt.
  Command Prompt (cmd.exe) does not persist history by default, but third-party
  tools like AutoRun may. Credentials appear in history when admins use -Password,
  -Credential, or -Key flags with plaintext values, or when they paste passwords
  into command prompts.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1552/003/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1552.003 — Shell History credential search simulation"

  - step: 2
    type: exec_powershell
    description: "Locate and search PowerShell history for credential keywords"
    command: |
      $historyPath = "$env:APPDATA\Microsoft\Windows\PowerShell\PSReadLine\ConsoleHost_history.txt"
      Write-Host "[PAS] PowerShell history path: $historyPath"
      if (Test-Path $historyPath) {
          $size = (Get-Item $historyPath).Length
          Write-Host "[PAS] History file size: $([Math]::Round($size/1KB,1)) KB"
          Write-Host "[PAS] Credential keyword search:"
          $creds = Select-String -Path $historyPath `
              -Pattern "password|passwd|-pass|-cred|secretkey|token|apikey" `
              -CaseSensitive:$false -ErrorAction SilentlyContinue
          if ($creds) {
              Write-Host "  [FINDINGS] $($creds.Count) potential credential line(s) in history"
              $creds | Select-Object -First 3 | ForEach-Object {
                  Write-Host "  Line $($_.LineNumber): $($_.Line.Trim().Substring(0,[Math]::Min(60,$_.Line.Trim().Length)))..."
              }
          } else {
              Write-Host "  No credential keywords found in current history"
          }
      } else {
          Write-Host "[PAS] No PowerShell history file found"
      }

  - step: 3
    type: exec_powershell
    description: "Inject a test credential line into history — simulates insecure admin habit"
    command: |
      $historyPath = "$env:APPDATA\Microsoft\Windows\PowerShell\PSReadLine\ConsoleHost_history.txt"
      # Append a test line that looks like a credential was typed
      Add-Content $historyPath "`n# PAS-T1552.003-TEST-LINE"
      Add-Content $historyPath 'Connect-AzAccount -Credential (New-Object PSCredential "svc_deploy","PAS-FAKE-HIST-PASS" -AsPlainText)'
      Write-Host "[PAS] Test credential history line injected"
      Write-Host "[PAS] Adversary would find this by reading ConsoleHost_history.txt"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — ConsoleHost_history.txt accessed by non-PowerShell process, history search for credential keywords"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove injected test lines from history"
    command: |
      $historyPath = "$env:APPDATA\Microsoft\Windows\PowerShell\PSReadLine\ConsoleHost_history.txt"
      if (Test-Path $historyPath) {
          $lines = Get-Content $historyPath | Where-Object {
              $_ -notmatch "PAS-T1552.003-TEST-LINE|PAS-FAKE-HIST-PASS"
          }
          Set-Content $historyPath $lines
          Write-Host "[PAS][Cleanup] Test credential lines removed from history"
      }

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1552.003 cleanup complete"

analyst_checklist:
  - "File event: ConsoleHost_history.txt accessed by non-PowerShell process (powershell.exe reading another user's history)"
  - "Sentinel: DeviceFileEvents | where FileName == 'ConsoleHost_history.txt' and InitiatingProcessFileName != 'powershell.exe'"
  - "MDE alert: 'Shell history access for credential search'"
  - "CONTROL CHECK: Set-PSReadLineOption -HistorySaveStyle SaveNothing — disable PowerShell history on sensitive servers"
  - "CONTROL CHECK: Never pass plaintext passwords as command-line arguments — use Get-Credential or SecureString"
  - "CONTROL CHECK: PSReadLine HistoryNoDuplicates and SensitiveTerms filtering (PSReadLine 2.2+) can suppress password patterns"
