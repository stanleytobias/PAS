id: T1003.005_os_credential_dumping_cached_domain_credentials
name: "OS Credential Dumping — Cached Domain Credentials"
mitre_technique: "T1003.005"
mitre_tactic: "credential_access"
description: >
  Windows caches the last N domain logons locally (default 10) so users can
  authenticate when the domain controller is unreachable. Cached credentials are
  stored in HKLM\SECURITY\Policy\Secrets\NL$KM and are hashed with MS-Cache2
  (DCC2) — a slow hash designed to resist cracking. With SYSTEM access, an adversary
  can dump these DCC2 hashes and attempt offline cracking with hashcat (-m 2100).
  DCC2 is significantly slower to crack than NTLM, but weak passwords remain
  vulnerable. Detection: same as T1003.004 — registry access on SECURITY hive.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1003/005/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1003.005 — Cached Domain Credentials dump simulation"

  - step: 2
    type: exec_powershell
    description: "Check cached logon count configuration"
    command: |
      Write-Host "[PAS] Cached domain credential policy check:"
      $cachedLogons = (Get-ItemProperty `
          "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" `
          -Name CachedLogonsCount -ErrorAction SilentlyContinue).CachedLogonsCount
      Write-Host "  CachedLogonsCount: $($cachedLogons ?? '10 (default)')"
      if ([int]($cachedLogons ?? 10) -gt 2) {
          Write-Host "  [RISK] >2 cached credentials — more accounts available for offline cracking"
          Write-Host "  Recommendation: set CachedLogonsCount to 1 or 0 for sensitive systems"
      }

  - step: 3
    type: exec_powershell
    description: "Simulate NL$KM access — cached credential encryption key"
    command: |
      Write-Host "[PAS] NL`$KM cached credential key access:"
      Write-Host "[PAS] Location: HKLM\\SECURITY\\Policy\\Secrets\\NL`$KM"
      Write-Host "[PAS] Real dump: secretsdump.py -system SYSTEM -security SECURITY LOCAL -> DCC2 hashes"
      Write-Host "[PAS] Crack: hashcat -m 2100 dcc2_hashes.txt wordlist.txt"
      Write-Host "[PAS] DCC2 format: `$DCC2`$10240#username#hash"

      # Attempt to access the key (access denied is expected, the telemetry is what matters)
      try {
          $key = Get-Item "HKLM:\SECURITY\Policy\Secrets\NL`$KM" -ErrorAction Stop
          Write-Host "[PAS] NL`$KM accessible (unexpected — check security configuration)"
      } catch {
          Write-Host "[PAS] NL`$KM access denied (expected) — access attempt logged"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — HKLM\\SECURITY access, reg save SECURITY hive, DCC2 hash format files in TEMP"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1003.005 cleanup complete — no persistent artefacts"

analyst_checklist:
  - "Process event: reg.exe / secretsdump.py accessing HKLM\\SECURITY — same as T1003.004"
  - "Sentinel: DeviceProcessEvents | where FileName == 'reg.exe' and ProcessCommandLine contains 'SECURITY'"
  - "File event: file containing DCC2 hash format ($DCC2$) in staging directory"
  - "CONTROL CHECK: Set CachedLogonsCount = 1 on servers and sensitive workstations via GPO"
  - "CONTROL CHECK: Strong passwords (16+ chars) make DCC2 cracking infeasible even with GPU clusters"
  - "CONTROL CHECK: CyberArk/LAPS — privileged accounts should use managed credentials, not static domain passwords"
