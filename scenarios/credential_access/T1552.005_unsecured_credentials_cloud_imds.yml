id: T1552.005_unsecured_credentials_cloud_instance_metadata
name: "Unsecured Credentials — Cloud Instance Metadata API"
mitre_technique: "T1552.005"
mitre_tactic: "credential_access"
description: >
  Adversaries query the cloud instance metadata service (IMDS) to obtain temporary
  credentials assigned to the VM's managed identity. On Azure, the endpoint is
  http://169.254.169.254/metadata/identity/oauth2/token. On AWS it is
  http://169.254.169.254/latest/meta-data/iam/security-credentials/. Any process
  running on the VM can query IMDS without authentication — no credentials required.
  If the managed identity has broad permissions (Contributor, Key Vault access),
  the token enables extensive cloud operations.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1552/005/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1552.005 — Cloud Instance Metadata API credential theft simulation"

  - step: 2
    type: exec_powershell
    description: "Query Azure IMDS for managed identity token"
    command: |
      Write-Host "[PAS] Azure IMDS credential query:"
      Write-Host "[PAS] Endpoint: http://169.254.169.254/metadata/identity/oauth2/token"

      try {
          $req = [System.Net.WebRequest]::Create(
              "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/")
          $req.Headers.Add("Metadata", "true")
          $req.Timeout = 1000
          $resp   = $req.GetResponse()
          $reader = New-Object IO.StreamReader($resp.GetResponseStream())
          $json   = $reader.ReadToEnd() | ConvertFrom-Json
          $reader.Close()
          Write-Host "[PAS] IMDS token obtained!"
          Write-Host "[PAS] Token type: $($json.token_type)"
          Write-Host "[PAS] Resource:   $($json.resource)"
          Write-Host "[PAS] Expires:    $(([System.DateTimeOffset]::FromUnixTimeSeconds($json.expires_on)).LocalDateTime)"
          Write-Host "[PAS] This token can call Azure management APIs with the VM's managed identity permissions"
      } catch {
          Write-Host "[PAS] IMDS not accessible (not an Azure VM or no managed identity)"
      }

      Write-Host "[PAS] AWS equivalent: http://169.254.169.254/latest/meta-data/iam/security-credentials/"

  - step: 3
    type: exec_powershell
    description: "Query IMDS for instance metadata — reconnaissance"
    command: |
      Write-Host "[PAS] IMDS instance metadata query (reconnaissance):"
      try {
          $req = [System.Net.WebRequest]::Create(
              "http://169.254.169.254/metadata/instance?api-version=2021-02-01")
          $req.Headers.Add("Metadata", "true")
          $req.Timeout = 1000
          $resp   = $req.GetResponse()
          $reader = New-Object IO.StreamReader($resp.GetResponseStream())
          $meta   = $reader.ReadToEnd() | ConvertFrom-Json
          $reader.Close()
          Write-Host "[PAS] Instance: $($meta.compute.name) in $($meta.compute.location)"
          Write-Host "[PAS] Subscription: $($meta.compute.subscriptionId)"
          Write-Host "[PAS] Resource group: $($meta.compute.resourceGroupName)"
      } catch {
          Write-Host "[PAS] IMDS metadata not accessible"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — HTTP request to 169.254.169.254 by non-Azure-agent process, IMDS token endpoint access"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1552.005 cleanup complete — no persistent artefacts"

analyst_checklist:
  - "Network event: HTTP request to 169.254.169.254 from non-Azure-agent process (waagent, AzureMonitor)"
  - "Sentinel: DeviceNetworkEvents | where RemoteIP == '169.254.169.254' and InitiatingProcessFileName == 'powershell.exe'"
  - "Azure Monitor: IMDS queries from unexpected processes — Azure Instance Metadata Service logs"
  - "CONTROL CHECK: IMDSv2 on AWS (token-required mode) — prevents SSRF-based IMDS credential theft"
  - "CONTROL CHECK: Scope managed identity permissions tightly — least privilege; not Contributor on subscription"
  - "CONTROL CHECK: Azure Policy — deny assignment of Contributor/Owner to managed identities without justification"
