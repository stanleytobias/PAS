id: T1552.002_unsecured_credentials_registry
name: "Unsecured Credentials — Credentials in Registry"
mitre_technique: "T1552.002"
mitre_tactic: "credential_access"
description: >
  Adversaries query the Windows Registry for insecurely stored credentials.
  Common registry credential stores: Windows AutoLogon (DefaultPassword in Winlogon),
  VNC and remote desktop clients (password in HKCU), PuTTY SSH sessions (ProxyPassword),
  SNMP community strings, and credentials stored by third-party software. Many legacy
  applications store credentials in HKCU or HKLM in plaintext or weakly encoded form.
  reg query commands generate process telemetry even when the key access is denied.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1552/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1552.002 — Registry credential search simulation"

  - step: 2
    type: exec_powershell
    description: "Search registry for common credential locations"
    command: |
      Write-Host "[PAS] Registry credential search:"
      $credKeys = @{
          "AutoLogon Username"   = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
          "AutoLogon Password"   = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
          "PuTTY Sessions"       = "HKCU:\Software\SimonTatham\PuTTY\Sessions"
          "WinSCP Credentials"   = "HKCU:\Software\Martin Prikryl\WinSCP 2\Sessions"
          "VNC Password"         = "HKLM:\SOFTWARE\RealVNC\WinVNC4"
          "SNMP Community"       = "HKLM:\SYSTEM\CurrentControlSet\Services\SNMP\Parameters\ValidCommunities"
      }
      foreach ($name in $credKeys.Keys) {
          $key = $credKeys[$name]
          if (Test-Path $key) {
              Write-Host "  FOUND [$name]: $key"
              $props = Get-ItemProperty $key -ErrorAction SilentlyContinue
              if ($props.DefaultPassword) { Write-Host "    DefaultPassword: [SET]" }
              if ($props.DefaultUserName) { Write-Host "    DefaultUserName: $($props.DefaultUserName)" }
          }
      }

  - step: 3
    type: exec_powershell
    description: "Plant a test registry credential entry — simulates adversary discovery"
    command: |
      # Add a test AutoLogon-style credential (plaintext — exactly what adversary looks for)
      $testKey = "HKCU:\Software\PAS\T1552_002_Test"
      New-Item -Path $testKey -Force | Out-Null
      Set-ItemProperty $testKey -Name "Username" -Value "PAS_testuser"
      Set-ItemProperty $testKey -Name "Password" -Value "PAS-Fake-RegistryPass-789"
      Write-Host "[PAS] Test registry credential planted: $testKey"

      # Simulate reg query sweep
      $proc = Start-Process reg.exe -ArgumentList "query HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon /v DefaultPassword" `
          -PassThru -NoNewWindow -Wait -ErrorAction SilentlyContinue
      Write-Host "[PAS] reg query Winlogon DefaultPassword — process event generated"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — reg.exe query of Winlogon/PuTTY/VNC credential keys, PowerShell Get-ItemProperty on credential paths"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove test registry credential"
    command: |
      Remove-Item "HKCU:\Software\PAS\T1552_002_Test" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Test registry credential removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1552.002 cleanup complete"

analyst_checklist:
  - "Process event: reg.exe query on Winlogon, PuTTY Sessions, VNC, or SNMP key paths"
  - "Sentinel: DeviceProcessEvents | where FileName == 'reg.exe' and ProcessCommandLine contains ('DefaultPassword','ProxyPassword','Password')"
  - "Sentinel: DeviceRegistryEvents | where RegistryKey contains 'Winlogon' and RegistryValueName == 'DefaultPassword'"
  - "MDE alert: 'Registry credential access'"
  - "CONTROL CHECK: Remove AutoLogon (DefaultPassword) from all systems — use Windows Hello or smart card"
  - "CONTROL CHECK: PuTTY / WinSCP sessions should use SSH key auth, not stored passwords"
  - "CONTROL CHECK: Audit all registry paths containing 'Password' values quarterly"
