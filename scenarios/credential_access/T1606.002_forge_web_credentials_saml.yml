id: T1606.002_forge_web_credentials_saml_tokens
name: "Forge Web Credentials — SAML Tokens"
mitre_technique: "T1606.002"
mitre_tactic: "credential_access"
description: >
  Adversaries forge SAML tokens (Golden SAML) using a stolen ADFS token-signing
  certificate to authenticate as any user in the federation — including users not
  in the on-premises AD. With the signing certificate, an adversary can generate
  valid SAML assertions with any claims, any lifetime, and any user identity.
  This was used in the SolarWinds campaign against cloud tenants federated to
  on-premises ADFS. Detection requires monitoring for ADFS signing certificate
  changes and anomalous SAML assertion characteristics.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1606/002/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1606.002 — Golden SAML: adversary steals ADFS token-signing cert to forge authentication for any cloud user"

  - step: 2
    type: exec_powershell
    description: "Check for ADFS installation and token-signing certificate"
    command: |
      Write-Host "[PAS] ADFS Golden SAML exposure check:"
      $adfsSvc = Get-Service adfssrv -ErrorAction SilentlyContinue
      Write-Host "  ADFS service: $(if ($adfsSvc) { $adfsSvc.Status } else { 'Not installed' })"

      # Check for ADFS certificate store
      $adfsCerts = Get-ChildItem Cert:\LocalMachine\ADFS -ErrorAction SilentlyContinue
      if ($adfsCerts) {
          Write-Host "  ADFS certificates in store: $($adfsCerts.Count)"
          $adfsCerts | ForEach-Object {
              Write-Host "  Cert: $($_.Subject) Exp=$($_.NotAfter) HasKey=$($_.HasPrivateKey)"
          }
          Write-Host "  [RISK] ADFS token-signing cert with private key is a Golden SAML target"
      } else {
          Write-Host "  ADFS certificate store: not present (ADFS not installed here)"
      }

  - step: 3
    type: marker
    description: "ADFS cert monitoring check"
    message: "CONTROL CHECK: Alert on ADFS token-signing certificate export (certutil -exportpfx from adfssrv account). The certificate should NEVER be exported outside of ADFS certificate rotation procedures."

  - step: 4
    type: marker
    description: "Migration check"
    message: "CONTROL CHECK: Migrate from ADFS to Entra ID Password Hash Sync or Passthrough Authentication — eliminates the Golden SAML attack surface entirely. Microsoft recommends this migration."

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check: ADFS audit logs — token-signing certificate access, certutil.exe execution on ADFS server"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1606.002 cleanup complete — marker-only scenario"

analyst_checklist:
  - "ADFS audit: certificate private key accessed by process other than adfssrv.exe"
  - "Process event: certutil.exe -exportpfx on ADFS server"
  - "Sentinel: SecurityEvent on ADFS server | where EventID == 4104 and ScriptBlock contains 'Export-PfxCertificate'"
  - "Entra ID: SAML tokens with unusual lifetimes or claims not matching normal federation patterns"
  - "CONTROL CHECK: ADFS server is Tier 0 — treat same as Domain Controller; no general user logon"
  - "CONTROL CHECK: Enable ADFS Extranet Lockout; monitor ADFS admin portal access carefully"
  - "CONTROL CHECK: Migrate to Entra ID native auth (PHS/PTA) — removes Golden SAML attack surface"
