id: T1110.003_brute_force_password_spraying
name: "Brute Force — Password Spraying"
mitre_technique: "T1110.003"
mitre_tactic: "credential_access"
description: >
  Adversaries try a single common password against many accounts simultaneously to
  avoid account lockout thresholds. Where guessing iterates passwords against one
  account (triggering lockout), spraying uses one password across all accounts —
  staying below the per-account failure threshold. Cloud environments (Entra ID,
  O365) are particularly targeted because lockout policies are weaker. Detection
  requires looking at the distribution of failures across accounts, not just depth
  per account. This simulation generates the Event ID 4625 spread pattern.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1110/003/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1110.003 — Password Spraying simulation (loopback, wrong passwords only)"

  - step: 2
    type: exec_powershell
    description: "Create test accounts and spray one bad password across all — Event ID 4625 spread"
    command: |
      Write-Host "[PAS] Creating test accounts for spray simulation:"
      $testAccounts = @("PAS_spray_user1","PAS_spray_user2","PAS_spray_user3",
                        "PAS_spray_user4","PAS_spray_user5")
      $realPass = ConvertTo-SecureString "PAS-RealPass-Kx7#9!" -AsPlainText -Force
      foreach ($acct in $testAccounts) {
          New-LocalUser -Name $acct -Password $realPass -PasswordNeverExpires $true `
              -ErrorAction SilentlyContinue | Out-Null
      }
      Write-Host "[PAS] Test accounts created: $($testAccounts.Count)"

      Write-Host "[PAS] Spraying 'Spring2025!' across all accounts:"
      foreach ($acct in $testAccounts) {
          net use \\127.0.0.1\IPC$ /user:$acct "Spring2025!" 2>&1 | Out-Null
          Write-Host "[PAS] Failed: $acct — Event ID 4625 (1 failure per account = below lockout)"
          net use \\127.0.0.1\IPC$ /delete 2>&1 | Out-Null
          Start-Sleep -Milliseconds 300
      }
      Write-Host "[PAS] Spray complete — 5 different accounts, 1 failure each = below lockout threshold"
      Write-Host "[PAS] Detection: same source IP, same password hash in NTLMv2, many different accounts"

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — Event 4625 spread across multiple accounts from same source, low per-account count"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove spray test accounts"
    command: |
      net use \\127.0.0.1\IPC$ /delete 2>&1 | Out-Null
      @("PAS_spray_user1","PAS_spray_user2","PAS_spray_user3",
        "PAS_spray_user4","PAS_spray_user5") | ForEach-Object {
          Remove-LocalUser -Name $_ -ErrorAction SilentlyContinue
      }
      Write-Host "[PAS][Cleanup] Spray test accounts removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1110.003 cleanup complete"

analyst_checklist:
  - "Event ID 4625: failures spread across >=5 different accounts from same source IP within 10 minutes"
  - "Pattern: each account has exactly 1-2 failures — below lockout, but breadth is the signal"
  - "Sentinel: SecurityEvent | where EventID == 4625 | summarize AccountCount=dcount(TargetUserName) by IpAddress, bin(TimeGenerated,10m) | where AccountCount > 5"
  - "Entra ID: Sign-in logs — multiple 'Invalid password' from same IP across different UPNs"
  - "Defender for Identity: 'Password spray attack' built-in alert"
  - "CONTROL CHECK: Entra ID Smart Lockout — IP-based lockout after spray pattern detected"
  - "CONTROL CHECK: Conditional Access — block legacy auth protocols (basic auth) used by spraying tools"
  - "CONTROL CHECK: MFA on all accounts — a sprayed password is useless without the second factor"
