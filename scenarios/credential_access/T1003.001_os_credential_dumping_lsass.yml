id: T1003.001_os_credential_dumping_lsass_memory
name: "OS Credential Dumping — LSASS Memory"
mitre_technique: "T1003.001"
mitre_tactic: "credential_access"
description: >
  Adversaries dump the memory of the LSASS (Local Security Authority Subsystem Service)
  process to extract credential material including NTLM hashes, Kerberos tickets, and
  cleartext passwords. Techniques: MiniDumpWriteDump via comsvcs.dll (built-in),
  Task Manager GUI dump, procdump.exe, and direct process memory reading via
  NtReadVirtualMemory. Mimikatz's sekurlsa::logonpasswords processes the dump.
  LSASS holds credentials for all interactively logged-on users. This is one of
  the most critical credential access techniques to detect and block.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1003/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1003.001 — LSASS Memory dump simulation (metadata access only — no actual dump)"

  - step: 2
    type: exec_powershell
    description: "Generate LSASS access telemetry — open process handle (read-only, no dump)"
    command: |
      Add-Type @"
      using System;
      using System.Runtime.InteropServices;
      public class PASLsassSim {
          [DllImport("kernel32.dll")] public static extern IntPtr OpenProcess(
              uint access, bool inherit, uint pid);
          [DllImport("kernel32.dll")] public static extern bool CloseHandle(IntPtr h);
          public const uint PROCESS_QUERY_INFORMATION = 0x0400;
      }
"@
      $lsass = Get-Process lsass -ErrorAction SilentlyContinue
      Write-Host "[PAS] LSASS PID: $($lsass?.Id)"

      # Open a QUERY_INFORMATION handle only (no PROCESS_VM_READ — no actual dump)
      $handle = [PASLsassSim]::OpenProcess(
          [PASLsassSim]::PROCESS_QUERY_INFORMATION, $false, $lsass.Id)
      if ($handle -ne [IntPtr]::Zero) {
          Write-Host "[PAS] LSASS handle opened (QUERY_INFORMATION) — OpenProcess telemetry generated"
          [PASLsassSim]::CloseHandle($handle) | Out-Null
          Write-Host "[PAS] Handle closed"
      }
      Write-Host "[PAS] Real dump: rundll32 C:\windows\system32\comsvcs.dll MiniDump $($lsass?.Id) lsass.dmp full"

  - step: 3
    type: exec_powershell
    description: "Simulate comsvcs.dll MiniDump call pattern — process and argument telemetry"
    command: |
      Write-Host "[PAS] comsvcs.dll MiniDump process pattern simulation:"
      Write-Host "[PAS] Real: rundll32.exe comsvcs.dll,MiniDump <lsass_pid> C:\Temp\lsass.dmp full"

      # Generate the rundll32 process event without actual dump
      $proc = Start-Process rundll32.exe `
          -ArgumentList "comsvcs.dll,#24" `
          -PassThru -NoNewWindow -ErrorAction SilentlyContinue
      Start-Sleep -Milliseconds 300
      if ($proc -and -not $proc.HasExited) {
          $proc | Stop-Process -Force -ErrorAction SilentlyContinue
      }
      Write-Host "[PAS] rundll32 comsvcs.dll process event generated — MDE should alert"

  - step: 4
    type: exec_powershell
    description: "Write LSASS dump marker file — simulates output artefact"
    command: |
      $dumpMarker = "$env:TEMP\PAS_T1003_001_lsass.dmp"
      Set-Content $dumpMarker "PAS-T1003.001-LSASS-DUMP-MARKER-$(Get-Date -Format o)"
      Write-Host "[PAS] LSASS dump marker: $dumpMarker"
      Write-Host "[PAS] Real .dmp file triggers: 'Suspicious LSASS dump file created' in MDE"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — OpenProcess on LSASS with PROCESS_VM_READ, rundll32 comsvcs.dll arguments, .dmp file in TEMP"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove LSASS dump marker"
    command: |
      Remove-Item "$env:TEMP\PAS_T1003_001_lsass.dmp" -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] LSASS dump marker removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1003.001 cleanup complete"

analyst_checklist:
  - "Process event: rundll32.exe loading comsvcs.dll with MiniDump argument — high fidelity indicator"
  - "Process event: procdump.exe -ma lsass.exe, or Task Manager creating lsass.dmp"
  - "File event: .dmp file created in TEMP by non-system process"
  - "OpenProcess: PROCESS_VM_READ (0x0010) + PROCESS_QUERY_INFORMATION on lsass.exe"
  - "Sentinel: DeviceProcessEvents | where FileName == 'rundll32.exe' and ProcessCommandLine contains 'comsvcs'"
  - "Sentinel: DeviceFileEvents | where FileName endswith '.dmp' and FolderPath contains 'Temp'"
  - "MDE alert: 'LSASS memory read' and 'Credential dumping' — built-in high-severity alerts"
  - "CONTROL CHECK: Enable LSA Protected Process Light (PPL) — prevents non-PPL processes from reading LSASS memory"
  - "CONTROL CHECK: Credential Guard — virtualises LSASS in VBS enclave; credential material inaccessible even with SYSTEM"
  - "CONTROL CHECK: ASR rule: 'Block credential stealing from Windows local security authority subsystem' — enable in Block mode"
