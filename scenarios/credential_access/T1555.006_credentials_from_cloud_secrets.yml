id: T1555.006_credentials_from_cloud_secrets_stores
name: "Credentials from Password Stores — Cloud Secrets Management Stores"
mitre_technique: "T1555.006"
mitre_tactic: "credential_access"
description: >
  Adversaries access cloud-native secrets management services (Azure Key Vault,
  AWS Secrets Manager, GCP Secret Manager, HashiCorp Vault) to retrieve stored
  credentials, API keys, certificates, and connection strings. With a compromised
  service principal or VM managed identity that has Key Vault access, an adversary
  can retrieve all secrets using the REST API or az CLI. The access leaves an
  audit trail in Key Vault diagnostic logs — but only if logging is enabled.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1555/006/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1555.006 — Cloud Secrets: adversary reads all secrets from Azure Key Vault using compromised managed identity"

  - step: 2
    type: exec_powershell
    description: "Check for Azure CLI credentials and Key Vault access on this host"
    command: |
      Write-Host "[PAS] Cloud secrets access posture:"
      $az = Get-Command az -ErrorAction SilentlyContinue
      Write-Host "  Azure CLI installed: $($null -ne $az)"

      # Check for IMDS managed identity (works inside Azure VMs)
      try {
          $req = [System.Net.WebRequest]::Create(
              "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://vault.azure.net")
          $req.Headers.Add("Metadata", "true")
          $req.Timeout = 500
          $resp = $req.GetResponse()
          Write-Host "  [RISK] IMDS token endpoint responsive — managed identity present"
          Write-Host "  Real attack: use token to GET https://vault.azure.net/secrets?api-version=7.3"
      } catch {
          Write-Host "  IMDS: not accessible (not an Azure VM or no managed identity)"
      }

  - step: 3
    type: marker
    description: "Key Vault access control check"
    message: "CONTROL CHECK: Azure Key Vault — enable diagnostic logging. SecretGet and SecretList operations should alert when called by unexpected service principals or at unusual times."

  - step: 4
    type: marker
    description: "Managed identity check"
    message: "CONTROL CHECK: Managed identities should have Key Vault access scoped to specific secrets (not ListSecrets on the entire vault). Audit RBAC assignments quarterly."

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check Azure Monitor — Key Vault AuditEvent logs: SecretGet operations from unexpected service principals"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1555.006 cleanup complete — marker-only scenario"

analyst_checklist:
  - "Azure Monitor: KeyVault AuditEvent | where OperationName == 'SecretGet' and CallerIpAddress not in (approved_ips)"
  - "Azure Monitor: KeyVault AuditEvent | where OperationName == 'SecretList' — bulk enumeration"
  - "Sentinel: AzureDiagnostics | where ResourceType == 'VAULTS' and OperationName == 'SecretGet' | summarize count() by CallerIPAddress, bin(TimeGenerated,5m) | where count_ > 10"
  - "CONTROL CHECK: Key Vault diagnostic logs MUST be enabled and forwarded to Sentinel — without this, access is invisible"
  - "CONTROL CHECK: Use managed identity + RBAC (not access policies) — grant Get on specific secrets, not ListSecrets"
  - "CONTROL CHECK: Private endpoint for Key Vault — prevent access from public internet"
