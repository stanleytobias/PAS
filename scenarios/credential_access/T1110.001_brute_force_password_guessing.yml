id: T1110.001_brute_force_password_guessing
name: "Brute Force — Password Guessing"
mitre_technique: "T1110.001"
mitre_tactic: "credential_access"
description: >
  Adversaries systematically attempt common passwords against accounts to gain
  access. Unlike spraying (one password across many accounts) or stuffing (using
  breach data), guessing iterates many passwords against a single account. On Windows,
  repeated failed logons generate Event ID 4625 (failed logon) and may trigger
  account lockout (Event ID 4740). Adversaries target local accounts, RDP, SMB,
  WinRM, and web authentication endpoints. This simulation generates the Event ID
  4625 burst pattern that detection rules key on.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1110/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1110.001 — Password Guessing simulation (loopback only, intentionally wrong passwords)"

  - step: 2
    type: exec_powershell
    description: "Simulate password guessing via net use — generates Event ID 4625 burst"
    command: |
      Write-Host "[PAS] Password guessing simulation against loopback (wrong passwords only):"
      $target   = "127.0.0.1"
      $username = "PAS_T1110_001_target"
      $badPasswords = @("Password1","Welcome1","Summer2024","Company123","Admin@123")

      # Create the target account first
      New-LocalUser -Name $username -Password (
          ConvertTo-SecureString "PAS-RealPass-Xk9#2!" -AsPlainText -Force) `
          -PasswordNeverExpires $true -ErrorAction SilentlyContinue | Out-Null
      Write-Host "[PAS] Target account created: $username"

      foreach ($pwd in $badPasswords) {
          net use \\$target\IPC$ /user:$username $pwd 2>&1 | Out-Null
          Write-Host "[PAS] Failed attempt: $username / $pwd  — Event ID 4625"
          net use \\$target\IPC$ /delete 2>&1 | Out-Null
          Start-Sleep -Milliseconds 200
      }
      Write-Host "[PAS] Guessing burst complete — $($badPasswords.Count) Event ID 4625 records generated"

  - step: 3
    type: exec_powershell
    description: "Check for lockout — verify Event ID 4740 generated"
    command: |
      $username = "PAS_T1110_001_target"
      $acct = Get-LocalUser -Name $username -ErrorAction SilentlyContinue
      Write-Host "[PAS] Account locked out: $($acct?.IsAccountLocked)"
      Write-Host "[PAS] Check Event ID 4740 (account lockout) in Security log"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — Event ID 4625 burst (>5 failures in 60s for same account), Event ID 4740 lockout"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove test account and clean net use"
    command: |
      net use \\127.0.0.1\IPC$ /delete 2>&1 | Out-Null
      Remove-LocalUser -Name "PAS_T1110_001_target" -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Test account and connections removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1110.001 cleanup complete"

analyst_checklist:
  - "Event ID 4625: failed logon — burst of >5 failures for same account in 60 seconds"
  - "Event ID 4740: account locked out — indicates active guessing attack"
  - "Sentinel: SecurityEvent | where EventID == 4625 | summarize count() by TargetUserName, bin(TimeGenerated,1m) | where count_ > 5"
  - "Sentinel: SecurityEvent | where EventID == 4740 | where TargetUserName !contains '$'"
  - "MDE alert: 'Brute force attack detected' — built-in alert threshold"
  - "CONTROL CHECK: Account lockout policy — lock after 5 failures, 30-minute observation window"
  - "CONTROL CHECK: Azure AD Smart Lockout — cloud-side lockout for Entra ID accounts"
  - "CONTROL CHECK: RDP and WinRM should require Network Level Authentication + MFA; not exposed directly to internet"
