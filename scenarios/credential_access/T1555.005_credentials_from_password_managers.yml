id: T1555.005_credentials_from_password_stores_password_managers
name: "Credentials from Password Stores — Password Managers"
mitre_technique: "T1555.005"
mitre_tactic: "credential_access"
description: >
  Adversaries target third-party password managers (KeePass, 1Password, Bitwarden,
  LastPass) to obtain stored credentials. Attack vectors: copy and offline-crack the
  encrypted database (.kdbx), hook the process memory while the vault is unlocked to
  read plaintext entries, extract the master password via keylogging, or abuse
  KeePass's trigger system to export credentials on open. A single password manager
  database unlock gives access to all stored credentials — extremely high-value target.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1555/005/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1555.005 — Password Manager credential theft simulation"

  - step: 2
    type: exec_powershell
    description: "Locate password manager database files on local system"
    command: |
      Write-Host "[PAS] Password manager database search:"
      $pmPatterns = @(
          @{Name="KeePass";   Filter="*.kdbx";  SearchPath=$env:USERPROFILE},
          @{Name="1Password"; Filter="*.opvault,*.agilekeychain"; SearchPath=$env:USERPROFILE},
          @{Name="Bitwarden"; Filter="*.json";  SearchPath="$env:APPDATA\Bitwarden"},
          @{Name="KeePass XML";Filter="*.kdbx"; SearchPath="$env:LOCALAPPDATA\KeePass"}
      )
      foreach ($pm in $pmPatterns) {
          if (Test-Path $pm.SearchPath) {
              Get-ChildItem $pm.SearchPath -Filter $pm.Filter -Recurse -Depth 4 `
                  -ErrorAction SilentlyContinue | Select-Object -First 2 |
                  ForEach-Object {
                      Write-Host "  [$($pm.Name)] Found: $($_.FullName) ($([Math]::Round($_.Length/1KB,1)) KB)"
                  }
          }
      }

  - step: 3
    type: exec_powershell
    description: "Simulate KeePass database copy to staging — offline crack target"
    command: |
      Write-Host "[PAS] KeePass database theft simulation:"
      $stagingDir = "$env:TEMP\PAS_T1555_005_pm_stage"
      New-Item -ItemType Directory $stagingDir -Force | Out-Null

      # Search for any .kdbx file
      $kdbx = Get-ChildItem $env:USERPROFILE -Filter "*.kdbx" -Recurse -Depth 4 `
          -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($kdbx) {
          Copy-Item $kdbx.FullName "$stagingDir\$($kdbx.Name)" -Force `
              -ErrorAction SilentlyContinue
          Write-Host "[PAS] KeePass DB staged: $($kdbx.Name)"
          Write-Host "[PAS] Real attack: crack master password with hashcat -m 13400"
      } else {
          # Create a marker file representing a stolen .kdbx
          Set-Content "$stagingDir\PAS_passwords.kdbx" "PAS-T1555.005-KDBX-MARKER"
          Write-Host "[PAS] No .kdbx found — marker created to represent theft artefact"
      }

  - step: 4
    type: exec_powershell
    description: "Check for KeePass trigger config — CVE-2023-24055 export trick"
    command: |
      Write-Host "[PAS] KeePass trigger configuration check (CVE-2023-24055):"
      $keepassConfig = "$env:APPDATA\KeePass\KeePass.config.xml"
      if (Test-Path $keepassConfig) {
          $content = Get-Content $keepassConfig -Raw -ErrorAction SilentlyContinue
          if ($content -match "Trigger") {
              Write-Host "  [RISK] KeePass triggers found in config — check for export triggers"
              Write-Host "  CVE-2023-24055: malicious trigger exports all passwords on DB open"
          } else {
              Write-Host "  KeePass config present — no triggers found"
          }
      } else {
          Write-Host "  KeePass not installed or not configured on this host"
      }

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — .kdbx file copied to staging, KeePass.config.xml modified, KeePass process spawning export utilities"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove password manager staging directory"
    command: |
      Remove-Item "$env:TEMP\PAS_T1555_005_pm_stage" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Password manager staging removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1555.005 cleanup complete"

analyst_checklist:
  - "File event: .kdbx or password manager database file copied by non-PM process"
  - "File event: KeePass.config.xml modified outside of KeePass application"
  - "Process event: KeePass.exe spawning cmd.exe or export utilities"
  - "Sentinel: DeviceFileEvents | where FileName endswith '.kdbx' and InitiatingProcessFileName != 'KeePass.exe'"
  - "MDE alert: 'Password manager database accessed by unexpected process'"
  - "CONTROL CHECK: KeePass — enforce master password minimum length 20+ chars; resist offline cracking"
  - "CONTROL CHECK: Enterprise password manager (CyberArk, 1Password Business) — centralised audit log"
  - "CONTROL CHECK: KeePass enforce config protection — prevent trigger injection via policy"
