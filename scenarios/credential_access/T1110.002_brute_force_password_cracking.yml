id: T1110.002_brute_force_password_cracking
name: "Brute Force — Password Cracking"
mitre_technique: "T1110.002"
mitre_tactic: "credential_access"
description: >
  Adversaries recover plaintext passwords from captured credential hashes using
  offline cracking tools (hashcat, John the Ripper). Password cracking is entirely
  offline — it generates no authentication events on target systems. The process:
  dump hashes (T1003), transfer hashes to cracking rig, crack offline, then use
  recovered plaintext credentials. This simulation captures the hash-dumping and
  hash-file staging telemetry that precedes cracking, and checks password policy
  controls that determine cracking difficulty.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1110/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1110.002 — Password Cracking simulation (hash staging pattern only)"

  - step: 2
    type: exec_powershell
    description: "Enumerate local account hashes metadata — what an adversary targets for cracking"
    command: |
      Write-Host "[PAS] Password hash target enumeration:"
      Get-LocalUser -ErrorAction SilentlyContinue |
          Where-Object { $_.Enabled } |
          ForEach-Object {
              Write-Host "  Account: $($_.Name) | Last logon: $($_.LastLogon) | PwdLastSet: $($_.PasswordLastSet)"
          }
      Write-Host "[PAS] Real attack: dump hashes via SAM/LSASS, then crack with hashcat"
      Write-Host "[PAS] hashcat -m 1000 ntlm_hashes.txt rockyou.txt  (NTLM)"
      Write-Host "[PAS] hashcat -m 5600 netntlmv2.txt rockyou.txt     (NetNTLMv2)"

  - step: 3
    type: exec_powershell
    description: "Create a hash staging file — simulates pre-cracking exfil artefact"
    command: |
      $hashFile = "$env:TEMP\PAS_T1110_002_hashes.txt"
      Set-Content $hashFile @"
# PAS T1110.002 — Simulated NTLM hash file (not real hashes)
Administrator:500:aad3b435b51404eeaad3b435b51404ee:31d6cfe0d16ae931b73c59d7e0c089c0:::
Guest:501:aad3b435b51404eeaad3b435b51404ee:31d6cfe0d16ae931b73c59d7e0c089c0:::
svc_backup:1001:aad3b435b51404eeaad3b435b51404ee:fc525c9683e8fe067095ba2ddc971889:::
"@
      Write-Host "[PAS] Hash staging file created: $hashFile"
      Write-Host "[PAS] Detection: NTLM hash format file (.txt) created in TEMP"

  - step: 4
    type: exec_powershell
    description: "Check password policy — determines cracking difficulty"
    command: |
      Write-Host "[PAS] Password policy check (determines cracking resistance):"
      net accounts 2>&1 | Select-String "Length|Age|Lockout" |
          ForEach-Object { Write-Host "  $($_.Line.Trim())" }
      Write-Host "[PAS] Passwords <12 chars with no complexity are crackable in hours with GPU"
      Write-Host "[PAS] Target: >=16 char passphrases; NTLM hash is MD4 — inherently fast to crack"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — NTLM hash format file in TEMP, hash dump tooling (procdump, mimikatz) preceding this"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove hash staging file"
    command: |
      Remove-Item "$env:TEMP\PAS_T1110_002_hashes.txt" -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Hash staging file removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1110.002 cleanup complete"

analyst_checklist:
  - "File event: NTLM/NTHash format file written to TEMP or staging directory"
  - "Process event: hashcat.exe or john.exe execution (uncommon on endpoints)"
  - "Sentinel: DeviceFileEvents | where FileName endswith '.txt' and FolderPath contains 'Temp' | where InitiatingProcessFileName in ('powershell.exe','cmd.exe')"
  - "CONTROL CHECK: Password length minimum 15+ chars — makes NTLM cracking computationally expensive"
  - "CONTROL CHECK: Enable Entra ID Password Protection to block common passwords and variants"
  - "CONTROL CHECK: LAPS — unique local admin passwords; a cracked hash is valid on only one machine"
  - "CONTROL CHECK: Disable NTLM where possible — Kerberos-only environments eliminate NTLM hash value"
