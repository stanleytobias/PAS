id: T1003.006_os_credential_dumping_dcsync
name: "OS Credential Dumping — DCSync"
mitre_technique: "T1003.006"
mitre_tactic: "credential_access"
description: >
  Adversaries with replication rights (Domain Admins, Enterprise Admins, or any
  account granted Replicating Directory Changes / Replicating Directory Changes All)
  use the MS-DRSR (Directory Replication Service Remote Protocol) to request
  credential data from a domain controller as if they were another DC. The
  DsGetNCChanges API call retrieves NTLM hashes and Kerberos keys for any account,
  including KRBTGT — enabling Golden Ticket attacks. Unlike NTDS.dit theft, DCSync
  requires no physical access to the DC. Implemented by mimikatz as lsadump::dcsync.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1003/006/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1003.006 — DCSync simulation (replication RPC probe to loopback)"

  - step: 2
    type: exec_powershell
    description: "Check replication rights on current account — DCSync pre-requisite check"
    command: |
      Write-Host "[PAS] DCSync privilege check:"
      $isDomain = (Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue).PartOfDomain
      if ($isDomain) {
          Write-Host "[PAS] Domain: $env:USERDOMAIN — checking replication rights"
          Write-Host "[PAS] Real check: Get-ADUser -Filter * -Properties 'msDS-AllowedToActOnBehalfOfOtherIdentity'"
          Write-Host "[PAS] Accounts with 'Replicating Directory Changes All' can DCSync"
          Write-Host "[PAS] Legitimate holders: Domain Admins, Enterprise Admins, MSOL_ (AAD Connect)"
      } else {
          Write-Host "[PAS] Not domain-joined — DCSync would target remote DC"
      }

  - step: 3
    type: exec_powershell
    description: "Generate MS-DRSR RPC connection telemetry — loopback probe"
    command: |
      Write-Host "[PAS] MS-DRSR replication RPC probe (loopback):"
      Write-Host "[PAS] Real DCSync: mimikatz lsadump::dcsync /user:krbtgt /domain:corp.local"

      # Generate RPC/LDAP connection telemetry toward loopback DC port
      try {
          $tcp = New-Object System.Net.Sockets.TcpClient
          $res = $tcp.BeginConnect("127.0.0.1", 389, $null, $null)
          $ok  = $res.AsyncWaitHandle.WaitOne(500, $false)
          $tcp.Close()
          Write-Host "[PAS] LDAP port 389 probe to 127.0.0.1: $(if ($ok) {'reachable'} else {'no response'})"
      } catch {}

      # Also probe 135 (RPC endpoint mapper — DCSync uses dynamic RPC)
      try {
          $tcp2 = New-Object System.Net.Sockets.TcpClient
          $res2 = $tcp2.BeginConnect("127.0.0.1", 135, $null, $null)
          $ok2  = $res2.AsyncWaitHandle.WaitOne(500, $false)
          $tcp2.Close()
          Write-Host "[PAS] RPC endpoint mapper 135 probe: $(if ($ok2) {'reachable'} else {'no response'})"
      } catch {}
      Write-Host "[PAS] DsGetNCChanges would follow over dynamic RPC port"

  - step: 4
    type: exec_powershell
    description: "Enumerate accounts with DCSync rights — detection baseline"
    command: |
      Write-Host "[PAS] DCSync rights enumeration (LDAP query — if domain-joined):"
      Write-Host "[PAS] Real: (Get-ACL 'AD:\DC=corp,DC=local').Access | Where {`$_.ObjectType -eq '1131f6aa-...'}"
      Write-Host "[PAS] GUID 1131f6aa-9c07-11d1-f79f-00c04fc2dcd2 = Replicating Directory Changes"
      Write-Host "[PAS] GUID 1131f6ad-9c07-11d1-f79f-00c04fc2dcd2 = Replicating Directory Changes All"
      Write-Host "[PAS] Any non-DC account with these rights can DCSync"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — Event ID 4662 (replication rights used), Defender for Identity DCSync alert"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1003.006 cleanup complete — no persistent artefacts"

analyst_checklist:
  - "Event ID 4662 on DC: operation performed on AD object — Properties include replication GUIDs"
  - "Defender for Identity: 'Remote code execution attempt' / 'DCSync attack (replication of directory services)'"
  - "Sentinel: SecurityEvent | where EventID == 4662 and Properties contains '1131f6ad' — 'Replicating Directory Changes All'"
  - "Network: DsGetNCChanges DRSUAPI RPC call from non-DC IP is definitive DCSync indicator"
  - "CONTROL CHECK: Audit who holds 'Replicating Directory Changes All' on domain root — should be DCs only"
  - "CONTROL CHECK: MSOL_ service account (AAD Connect) has DCSync rights by design — monitor its activity closely"
  - "CONTROL CHECK: Defender for Identity monitors DC-side replication APIs — deploy on all DCs"
