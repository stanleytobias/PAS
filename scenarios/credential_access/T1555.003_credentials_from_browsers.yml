id: T1555.003_credentials_from_password_stores_browsers
name: "Credentials from Password Stores — Credentials from Web Browsers"
mitre_technique: "T1555.003"
mitre_tactic: "credential_access"
description: >
  Adversaries extract saved credentials from web browsers (Chrome, Edge, Firefox).
  Browsers store credentials in encrypted SQLite databases on disk. Chrome and Edge
  use DPAPI (Data Protection API) to encrypt the AES key, which is stored in a
  JSON file called "Local State". Any process running as the same user can call
  CryptUnprotectData to decrypt the key and then decrypt all saved passwords.
  This requires no special privileges — a user-context process can steal all
  browser-saved credentials silently.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1555/003/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1555.003 — Browser credential theft simulation"

  - step: 2
    type: exec_powershell
    description: "Locate browser credential stores and encryption key files"
    command: |
      Write-Host "[PAS] Browser credential store locations:"
      $browserPaths = @{
          "Chrome Login Data"    = "$env:LOCALAPPDATA\Google\Chrome\User Data\Default\Login Data"
          "Chrome Local State"   = "$env:LOCALAPPDATA\Google\Chrome\User Data\Local State"
          "Edge Login Data"      = "$env:LOCALAPPDATA\Microsoft\Edge\User Data\Default\Login Data"
          "Edge Local State"     = "$env:LOCALAPPDATA\Microsoft\Edge\User Data\Local State"
          "Firefox logins.json"  = "$env:APPDATA\Mozilla\Firefox\Profiles"
      }
      foreach ($name in $browserPaths.Keys) {
          $p = $browserPaths[$name]
          if (Test-Path $p) {
              $size = if ((Get-Item $p -Force).PSIsContainer) { "directory" }
                      else { "$([Math]::Round((Get-Item $p).Length/1KB,1)) KB" }
              Write-Host "  FOUND [$size]: $p"
          }
      }

  - step: 3
    type: exec_powershell
    description: "Simulate credential database copy and DPAPI key extraction"
    command: |
      Write-Host "[PAS] Simulating browser credential theft steps:"
      $stagingDir = "$env:TEMP\PAS_T1555_003_browser_stage"
      New-Item -ItemType Directory $stagingDir -Force | Out-Null

      # Copy Login Data DB (file may be locked if browser is running)
      $loginDb = "$env:LOCALAPPDATA\Microsoft\Edge\User Data\Default\Login Data"
      if (Test-Path $loginDb) {
          Copy-Item $loginDb "$stagingDir\LoginData_copy" -Force -ErrorAction SilentlyContinue
          Write-Host "[PAS] Edge Login Data copied to staging"
      }

      # Access Local State to demonstrate key file access
      $localState = "$env:LOCALAPPDATA\Microsoft\Edge\User Data\Local State"
      if (Test-Path $localState) {
          $stateContent = Get-Content $localState -Raw -ErrorAction SilentlyContinue
          $hasEncKey = $stateContent -match 'encrypted_key'
          Write-Host "[PAS] Edge Local State accessed — encrypted_key present: $hasEncKey"
          Write-Host "[PAS] Real attack: CryptUnprotectData on encrypted_key -> AES-256 key -> decrypt Login Data"
      }

      Write-Host "[PAS] DPAPI theft flow: Local State -> CryptUnprotectData -> AES key -> decrypt credentials"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — Login Data file read by non-browser process, Local State accessed by powershell.exe"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove browser staging directory"
    command: |
      Remove-Item "$env:TEMP\PAS_T1555_003_browser_stage" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Browser staging directory removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1555.003 cleanup complete"

analyst_checklist:
  - "File event: 'Login Data' accessed by non-browser process (powershell.exe, python.exe)"
  - "File event: 'Local State' accessed — contains DPAPI-wrapped AES key for credential decryption"
  - "Sentinel: DeviceFileEvents | where FileName == 'Login Data' and InitiatingProcessFileName != 'msedge.exe' and InitiatingProcessFileName != 'chrome.exe'"
  - "Sentinel: DeviceFileEvents | where FileName == 'Local State' and FolderPath contains 'User Data' and InitiatingProcessFileName == 'powershell.exe'"
  - "MDE alert: 'Browser credential store accessed by unexpected process'"
  - "CONTROL CHECK: Use a dedicated password manager (not browser-based) — enterprise managers use stronger encryption"
  - "CONTROL CHECK: Conditional Access sign-in frequency — short-lived tokens limit browser credential value"
