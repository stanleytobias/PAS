id: T1606.001_forge_web_credentials_web_cookies
name: "Forge Web Credentials — Web Cookies"
mitre_technique: "T1606.001"
mitre_tactic: "credential_access"
description: >
  Adversaries steal and replay web session cookies to authenticate to web applications
  without credentials. After capturing cookies (via XSS, network sniffing, or local
  file theft), an adversary injects them into their own browser to assume the victim's
  authenticated session. This is the primary post-AiTM phishing technique — the Evilginx2
  or Modlishka framework captures the session cookie after the victim authenticates,
  bypassing MFA entirely. Stolen M365 session cookies enable access to Teams, SharePoint,
  Exchange, and Azure without triggering any new authentication events.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1606/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1606.001 — Web Cookie forge/replay simulation"

  - step: 2
    type: exec_powershell
    description: "Extract browser session cookies and simulate replay preparation"
    command: |
      Write-Host "[PAS] Web session cookie theft and replay simulation:"
      $stagingDir = "$env:TEMP\PAS_T1606_001_cookies"
      New-Item -ItemType Directory $stagingDir -Force | Out-Null

      # Locate Edge cookies (same as T1185 but focused on session replay)
      $cookiePaths = @(
          "$env:LOCALAPPDATA\Microsoft\Edge\User Data\Default\Network\Cookies",
          "$env:LOCALAPPDATA\Google\Chrome\User Data\Default\Network\Cookies"
      )
      foreach ($p in $cookiePaths) {
          if (Test-Path $p) {
              $browser = if ($p -match "Edge") { "Edge" } else { "Chrome" }
              Copy-Item $p "$stagingDir\${browser}_Cookies" -Force -ErrorAction SilentlyContinue
              Write-Host "[PAS] $browser Cookies staged: $([Math]::Round((Get-Item $p).Length/1KB,1)) KB"
              Write-Host "[PAS] Contains session cookies for all authenticated sites"
          }
      }
      Write-Host "[PAS] Replay: inject stolen cookies via browser DevTools or EditThisCookie extension"

  - step: 3
    type: exec_powershell
    description: "Simulate cookie replay HTTP request with stolen session token"
    command: |
      Write-Host "[PAS] Cookie replay HTTP request pattern (loopback):"
      Write-Host "[PAS] Real: inject AADToken/ESTSAUTH cookies into browser -> authenticated M365 session"
      try {
          $req = [System.Net.WebRequest]::Create("http://127.0.0.1/")
          $req.Headers.Add("Cookie",
              "ESTSAUTH=PAS_FAKE_TOKEN; ESTSAUTHPERSISTENT=PAS_FAKE_PERSISTENT; stsservicecookie=ests")
          $req.Timeout = 300
          $req.GetResponse() | Out-Null
      } catch {}
      Write-Host "[PAS] HTTP request with stolen M365 cookie pattern generated"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check Sentinel — Entra ID sign-in logs: session cookie replay from new IP/device (token replay detection)"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove cookie staging directory"
    command: |
      Remove-Item "$env:TEMP\PAS_T1606_001_cookies" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Cookie staging removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1606.001 cleanup complete"

analyst_checklist:
  - "Entra ID: Sign-in with session token from IP/device that differs from original authentication"
  - "Sentinel: SigninLogs | where AuthenticationRequirement == 'singleFactorAuthentication' and DeviceDetail.isCompliant == false"
  - "Defender for Cloud Apps: 'Activity from infrequent country' using existing session"
  - "Entra ID Identity Protection: 'Anomalous token' risk detection — detects cookie replay"
  - "CONTROL CHECK: Continuous Access Evaluation (CAE) — revokes tokens in near-real-time on IP change"
  - "CONTROL CHECK: Sign-in frequency Conditional Access — force re-authentication every 1-4 hours for sensitive apps"
  - "CONTROL CHECK: Compliant device Conditional Access — session from non-enrolled device requires re-auth"
