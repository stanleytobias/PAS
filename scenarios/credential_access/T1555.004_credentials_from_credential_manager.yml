id: T1555.004_credentials_from_password_stores_credential_manager
name: "Credentials from Password Stores — Windows Credential Manager"
mitre_technique: "T1555.004"
mitre_tactic: "credential_access"
description: >
  Adversaries extract credentials stored in the Windows Credential Manager (WCM),
  which holds web credentials, Windows credentials (NTLM hashes for mapped drives,
  RDP saved passwords), and certificate-based credentials. WCM is accessible via
  cmdkey.exe, the vaultcmd utility, and the CredRead/CredEnumerate Win32 APIs.
  Stored credentials are DPAPI-encrypted and can be decrypted by any process
  running as the same user. Mimikatz's sekurlsa::credman and dpapi::cred modules
  target WCM directly.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1555/004/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1555.004 — Windows Credential Manager theft simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate all stored credentials via cmdkey and vaultcmd"
    command: |
      Write-Host "[PAS] Windows Credential Manager enumeration:"
      Write-Host "[PAS] cmdkey /list output:"
      cmdkey /list 2>&1 | Select-Object -First 20 | ForEach-Object { Write-Host "  $_" }

      Write-Host "[PAS] Vault enumeration (vaultcmd /list):"
      vaultcmd /list 2>&1 | ForEach-Object { Write-Host "  $_" }

  - step: 3
    type: exec_powershell
    description: "Enumerate WCM entries via CredEnumerate API"
    command: |
      Add-Type @"
      using System;
      using System.Runtime.InteropServices;

      public class PASCredEnum {
          [DllImport("advapi32.dll", CharSet=CharSet.Unicode, SetLastError=true)]
          public static extern bool CredEnumerate(
              string filter, int flags, out int count, out IntPtr credentials);
          [DllImport("advapi32.dll")] public static extern void CredFree(IntPtr buffer);

          [StructLayout(LayoutKind.Sequential, CharSet=CharSet.Unicode)]
          public struct CREDENTIAL {
              public int Flags; public int Type;
              public string TargetName; public string Comment;
              public long LastWritten;
              public int CredentialBlobSize; public IntPtr CredentialBlob;
              public int Persist; public int AttributeCount; public IntPtr Attributes;
              public string TargetAlias; public string UserName;
          }
          public static string[] ListTargets() {
              int count; IntPtr ptr;
              var result = new System.Collections.Generic.List<string>();
              if (CredEnumerate(null, 0, out count, out ptr)) {
                  for (int i = 0; i < count; i++) {
                      var credPtr = Marshal.ReadIntPtr(ptr, i * IntPtr.Size);
                      var cred = Marshal.PtrToStructure<CREDENTIAL>(credPtr);
                      result.Add($"{cred.Type}:{cred.TargetName}:{cred.UserName}");
                  }
                  CredFree(ptr);
              }
              return result.ToArray();
          }
      }
"@
      Write-Host "[PAS] Credential Manager entries (CredEnumerate API):"
      [PASCredEnum]::ListTargets() | ForEach-Object { Write-Host "  $_" }
      Write-Host "[PAS] Type 1=Generic, 2=Domain, 3=Certificate"

  - step: 4
    type: exec_powershell
    description: "Add a test credential entry then enumerate — simulate adversary staging"
    command: |
      # Add test credential (will be cleaned up)
      cmdkey /add:PAS_T1555_004_testserver /user:PAS_testuser /pass:PAS-TestPass-123 2>&1 | Out-Null
      Write-Host "[PAS] Test credential added to WCM"
      Write-Host "[PAS] Listing WCM entries including test entry:"
      cmdkey /list 2>&1 | Select-String "PAS_T1555|Target" | ForEach-Object { Write-Host "  $($_.Line)" }

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — cmdkey.exe /list execution, CredEnumerate API calls from unexpected process"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove test credential from Credential Manager"
    command: |
      cmdkey /delete:PAS_T1555_004_testserver 2>&1 | Out-Null
      Write-Host "[PAS][Cleanup] Test credential removed from WCM"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1555.004 cleanup complete"

analyst_checklist:
  - "Process event: cmdkey.exe /list execution by non-admin script"
  - "API: CredEnumerate called by non-credential-manager process"
  - "Process event: vaultcmd.exe /listcreds execution"
  - "Sentinel: DeviceProcessEvents | where FileName == 'cmdkey.exe' and ProcessCommandLine contains '/list'"
  - "MDE alert: 'Credential Manager enumeration'"
  - "CONTROL CHECK: Minimize stored credentials in WCM — remove unused RDP/share credentials"
  - "CONTROL CHECK: Do not store domain credentials in WCM on shared workstations"
