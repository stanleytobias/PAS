id: T1552.006_unsecured_credentials_group_policy_preferences
name: "Unsecured Credentials — Group Policy Preferences"
mitre_technique: "T1552.006"
mitre_tactic: "credential_access"
description: >
  Adversaries search SYSVOL for Group Policy Preference (GPP) XML files containing
  the cpassword attribute — AES-256 encrypted passwords whose decryption key was
  published by Microsoft in MSDN documentation. GPP allowed admins to set local
  account passwords, scheduled task credentials, and service credentials via Group
  Policy. All domain users have read access to SYSVOL. MS14-025 (2014) disabled
  creation of new GPP passwords but existing entries were not automatically removed.
  Many environments still have vulnerable GPP files years after the patch.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1552/006/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1552.006 — Group Policy Preferences cpassword search simulation"

  - step: 2
    type: exec_powershell
    description: "Search SYSVOL for GPP XML files containing cpassword attribute"
    command: |
      Write-Host "[PAS] SYSVOL GPP cpassword search:"
      $isDomain = (Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue).PartOfDomain
      $dc       = $env:LOGONSERVER -replace '\\', ''

      if ($isDomain -and $dc) {
          $sysvol = "\\$dc\SYSVOL"
          Write-Host "[PAS] Searching: $sysvol"
          if (Test-Path $sysvol) {
              $gppFiles = Get-ChildItem $sysvol -Recurse -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -in @("Groups.xml","Services.xml","Scheduledtasks.xml",
                                               "DataSources.xml","Printers.xml") }
              Write-Host "[PAS] GPP XML files found: $($gppFiles.Count)"
              foreach ($f in $gppFiles) {
                  $content = Get-Content $f.FullName -Raw -ErrorAction SilentlyContinue
                  if ($content -match 'cpassword="([^"]+)"') {
                      Write-Host "  [VULNERABLE] $($f.FullName)"
                      Write-Host "  cpassword: $($Matches[1].Substring(0,20))..."
                      Write-Host "  Decrypt: [System.Text.Encoding]::Unicode.GetString([System.Security.Cryptography.AesManaged]..."
                  }
              }
          } else {
              Write-Host "[PAS] SYSVOL not accessible from this host"
          }
      } else {
          Write-Host "[PAS] Not domain-joined — SYSVOL not reachable"
      }

  - step: 3
    type: exec_powershell
    description: "Create a test GPP XML file with cpassword — simulates vulnerable SYSVOL content"
    command: |
      $stagingDir = "$env:TEMP\PAS_T1552_006_gpp"
      New-Item -ItemType Directory $stagingDir -Force | Out-Null
      Set-Content "$stagingDir\Groups.xml" @'
<?xml version="1.0" encoding="utf-8"?>
<Groups clsid="{3125E937-EB16-4b4c-9934-544FC6D24D26}">
  <User clsid="{DF5F1855-51E5-4d24-8B1A-D9BDE98BA1D1}"
        name="PAS_LocalAdmin" image="2" changed="2024-01-01 00:00:00"
        uid="{PAS-GPP-TEST-GUID}">
    <Properties action="U" newName="" fullName=""
                description="PAS GPP Test Account"
                cpassword="PAS_FAKE_CPASSWORD_VXJ3dmVSbjhBVFhORFJXTg=="
                changeLogon="0" noChange="1" neverExpires="1"
                acctDisabled="0" userName="PAS_LocalAdmin"/>
  </User>
</Groups>
'@
      Write-Host "[PAS] Simulated GPP Groups.xml with cpassword: $stagingDir\Groups.xml"
      Write-Host "[PAS] The published AES key decrypts ALL cpassword values — no brute force needed"
      Write-Host "[PAS] Get-GPPPassword (PowerSploit) automates discovery and decryption"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — recursive search of SYSVOL for Groups.xml/Services.xml, cpassword pattern in file access"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove GPP staging directory"
    command: |
      Remove-Item "$env:TEMP\PAS_T1552_006_gpp" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] GPP staging removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1552.006 cleanup complete"

analyst_checklist:
  - "File event: Groups.xml, Services.xml, ScheduledTasks.xml accessed in SYSVOL by non-GPO process"
  - "Process event: Get-GPPPassword or findstr /S /I cpassword SYSVOL searches"
  - "Sentinel: DeviceFileEvents | where FileName in ('Groups.xml','Services.xml') and FolderPath contains 'SYSVOL'"
  - "Sentinel: DeviceProcessEvents | where ProcessCommandLine contains 'cpassword' or ProcessCommandLine contains 'Get-GPPPassword'"
  - "CONTROL CHECK: Search SYSVOL for all cpassword entries and remove immediately: Get-ChildItem -Recurse \\\\domain\\SYSVOL | Select-String 'cpassword'"
  - "CONTROL CHECK: Apply MS14-025 (KB2962486) on all DCs — prevents creation of new GPP passwords"
  - "CONTROL CHECK: Use LAPS instead of GPP local admin passwords — individual, rotating, random passwords"
