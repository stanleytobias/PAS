id: T1110.004_brute_force_credential_stuffing
name: "Brute Force — Credential Stuffing"
mitre_technique: "T1110.004"
mitre_tactic: "credential_access"
description: >
  Adversaries use username/password pairs from public data breaches against
  corporate authentication endpoints, exploiting password reuse. Unlike spraying
  (common passwords) or guessing (iterating passwords), stuffing uses credentials
  that were valid somewhere else. High success rates (~1-3%) make it worthwhile
  at scale. Common targets: Entra ID, M365, VPN portals, and web applications.
  Detection requires identifying logon attempts using known-breached credentials
  and unusual geographic or device patterns.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1110/004/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1110.004 — Credential Stuffing simulation (loopback, simulated breach creds)"

  - step: 2
    type: exec_powershell
    description: "Simulate breach credential list and stuffing attempt pattern"
    command: |
      Write-Host "[PAS] Credential stuffing simulation:"
      Write-Host "[PAS] Real attack: use breach dump pairs against authentication endpoint"

      # Create simulated breach credential pairs (all fictitious, none real)
      $breachCreds = @(
          @{User="jsmith";     Pass="Fluffy2019!"},
          @{User="mwilliams";  Pass="Dallas#88"},
          @{User="alee";       Pass="Soccer2022"},
          @{User="rjohnson";   Pass="Password123"}
      )

      Write-Host "[PAS] Simulated breach credential pairs: $($breachCreds.Count)"
      foreach ($cred in $breachCreds) {
          net use \\127.0.0.1\IPC$ /user:$($cred.User) $($cred.Pass) 2>&1 | Out-Null
          Write-Host "[PAS] Stuffing attempt: $($cred.User) — Event ID 4625 (no such user or wrong pass)"
          net use \\127.0.0.1\IPC$ /delete 2>&1 | Out-Null
          Start-Sleep -Milliseconds 250
      }

  - step: 3
    type: exec_powershell
    description: "Check for breached passwords in environment using Entra ID Password Protection"
    command: |
      Write-Host "[PAS] Breached password detection check:"
      $banListKey = "HKLM:\SOFTWARE\Microsoft\AzureADPasswordProtection"
      if (Test-Path $banListKey) {
          Write-Host "  [GOOD] Entra ID Password Protection agent installed"
          Write-Host "  Blocks banned/breached passwords at domain password change"
      } else {
          Write-Host "  [RISK] Entra ID Password Protection not installed"
          Write-Host "  Users may have passwords matching known breach lists"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — 4625 burst with varying usernames, Entra sign-in failures from new IP/country"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Clean up net use connections"
    command: |
      net use \\127.0.0.1\IPC$ /delete 2>&1 | Out-Null
      Write-Host "[PAS][Cleanup] Connections cleaned"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1110.004 cleanup complete"

analyst_checklist:
  - "Entra ID sign-in log: multiple 'Invalid username or password' from single IP, multiple UPNs"
  - "Entra ID Identity Protection: 'Leaked credentials' risk detection — Entra checks credentials against HaveIBeenPwned"
  - "Sentinel: SigninLogs | where ResultType == '50126' | summarize count() by IPAddress, bin(TimeGenerated,5m) | where count_ > 10"
  - "MDE alert: credential stuffing pattern from external IP"
  - "CONTROL CHECK: Entra ID Password Protection — blocks known-breached passwords at change time"
  - "CONTROL CHECK: Phishing-resistant MFA (FIDO2) — stuffed password cannot authenticate without hardware key"
  - "CONTROL CHECK: Entra ID Identity Protection 'Leaked credentials' policy — auto-block compromised accounts"
