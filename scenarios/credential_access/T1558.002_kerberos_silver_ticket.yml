id: T1558.002_steal_forge_kerberos_tickets_silver_ticket
name: "Steal or Forge Kerberos Tickets — Silver Ticket"
mitre_technique: "T1558.002"
mitre_tactic: "credential_access"
description: >
  Adversaries with the NTLM hash of a service account forge Kerberos service tickets
  (TGS) for that specific service — bypassing the KDC entirely. Unlike Golden Tickets,
  Silver Tickets are forged locally and never touch the domain controller, making
  them harder to detect. Common targets: CIFS (file shares), HTTP (web services),
  MSSQL, HOST (remote admin). Silver Tickets are valid until the service account
  password changes. Detection requires monitoring for service ticket use without
  a corresponding TGT request.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1558/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1558.002 — Silver Ticket simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate service accounts with SPNs — Silver Ticket targets"
    command: |
      Write-Host "[PAS] Service account SPN enumeration (Silver Ticket targets):"
      $isDomain = (Get-WmiObject Win32_ComputerSystem -ErrorAction SilentlyContinue).PartOfDomain
      if ($isDomain) {
          try {
              $searcher = New-Object System.DirectoryServices.DirectorySearcher
              $searcher.Filter = "(&(objectCategory=user)(servicePrincipalName=*))"
              $searcher.PropertiesToLoad.AddRange(@("sAMAccountName","servicePrincipalName","pwdLastSet"))
              $results = $searcher.FindAll()
              Write-Host "  Accounts with SPNs (Kerberoastable): $($results.Count)"
              foreach ($r in $results | Select-Object -First 5) {
                  $acct = $r.Properties["samaccountname"][0]
                  $spn  = $r.Properties["serviceprincipalname"][0]
                  Write-Host "  SPN: $spn -> $acct"
              }
          } catch { Write-Host "  LDAP query failed — simulating pattern only" }
      } else {
          Write-Host "[PAS] Not domain-joined — Silver Ticket targets service accounts on DCs"
          Write-Host "[PAS] Common targets: MSSQLSvc, CIFS, HTTP, HOST"
      }

  - step: 3
    type: exec_powershell
    description: "Simulate Silver Ticket injection — klist purge then service access"
    command: |
      Write-Host "[PAS] Silver Ticket attack pattern:"
      Write-Host "[PAS] Real: mimikatz kerberos::golden /domain:corp /sid:S-1-5-21-... /target:dc01.corp.local"
      Write-Host "       /service:cifs /rc4:<service_hash> /user:Administrator /ptt"
      Write-Host "[PAS] Effect: access \\dc01\C$ without touching DC — no Event 4768"
      Write-Host ""
      klist 2>&1 | Select-Object -First 5 | ForEach-Object { Write-Host "  Ticket: $_" }
      Write-Host "[PAS] Silver Ticket would appear as: cifs/dc01.corp.local"
      Write-Host "[PAS] Detection: Event ID 4627 on target server — no corresponding TGT request on DC"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — Event 4627 (service ticket used) without matching Event 4768 (TGT) on DC"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1558.002 cleanup complete — no persistent artefacts"

analyst_checklist:
  - "Defender for Identity: 'Silver ticket usage detected' — correlates TGT and TGS events"
  - "Event ID 4627/4624 on target server: Kerberos service ticket used with no preceding TGT on DC"
  - "Sentinel: SecurityEvent on DC | where EventID == 4769 | join kind=leftanti (SecurityEvent | where EventID == 4768) on Account"
  - "CONTROL CHECK: Service accounts should use gMSA — password auto-rotates every 30 days; limits Silver Ticket validity"
  - "CONTROL CHECK: Kerberos FAST (Flexible Authentication Secure Tunneling) — hardens TGS validation"
  - "CONTROL CHECK: Privileged Access Workstations for service account management"
