id: T1003.003_os_credential_dumping_ntds
name: "OS Credential Dumping — NTDS"
mitre_technique: "T1003.003"
mitre_tactic: "credential_access"
description: >
  Adversaries copy the Active Directory database (NTDS.dit) from a domain controller
  to extract all domain account hashes. NTDS.dit contains the hashed credentials for
  every AD account. Because it is locked by ntdsa.dll while the OS runs, adversaries
  use Volume Shadow Copy (vssadmin create shadow), ntdsutil's IFM (Install From Media)
  feature, or the Windows Server Backup API to access it. The SYSTEM hive is also
  needed to decrypt the database. This is the ultimate credential dump — every
  domain account hash in a single operation.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1003/003/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1003.003 — NTDS dump simulation (shadow copy and ntdsutil telemetry only)"

  - step: 2
    type: exec_powershell
    description: "Simulate vssadmin shadow copy creation — standard NTDS dump pre-step"
    command: |
      Write-Host "[PAS] VSS shadow copy creation for NTDS access:"
      Write-Host "[PAS] Real attack: vssadmin create shadow /for=C: then copy shadow:\Windows\NTDS\ntds.dit"

      # Generate vssadmin process event
      $proc = Start-Process vssadmin.exe `
          -ArgumentList "list shadows" `
          -PassThru -NoNewWindow -Wait -ErrorAction SilentlyContinue
      Write-Host "[PAS] vssadmin list shadows executed — Event ID 8224 (VSS service started)"

      # Check for existing shadow copies
      $shadows = vssadmin list shadows 2>&1
      $shadowCount = ($shadows | Select-String "Shadow Copy Volume").Count
      Write-Host "[PAS] Existing shadow copies: $shadowCount"
      Write-Host "[PAS] Real dump: vssadmin create shadow /for=C: then copy ntds.dit from shadow"

  - step: 3
    type: exec_powershell
    description: "Simulate ntdsutil IFM mode — cleaner NTDS extraction method"
    command: |
      Write-Host "[PAS] ntdsutil IFM pattern:"
      Write-Host "[PAS] Real: ntdsutil 'ac i ntds' 'ifm' 'create full C:\Temp\IFM' q q"
      Write-Host "[PAS] IFM creates a directory with ntds.dit + SYSTEM hive — ready for secretsdump"

      # Generate ntdsutil process event (without IFM — just the binary execution)
      $proc = Start-Process ntdsutil.exe `
          -ArgumentList "help" `
          -PassThru -NoNewWindow -ErrorAction SilentlyContinue
      Start-Sleep -Milliseconds 500
      if ($proc -and -not $proc.HasExited) {
          $proc | Stop-Process -Force -ErrorAction SilentlyContinue
      }
      Write-Host "[PAS] ntdsutil.exe process event generated"

  - step: 4
    type: exec_powershell
    description: "Check NTDS.dit file location (DC only)"
    command: |
      Write-Host "[PAS] NTDS.dit location check:"
      $ntdsPath = "$env:SystemRoot\NTDS\ntds.dit"
      if (Test-Path $ntdsPath) {
          Write-Host "  [DC] NTDS.dit present: $ntdsPath ($([Math]::Round((Get-Item $ntdsPath).Length/1MB,1)) MB)"
          Write-Host "  [CRITICAL] This host is a DC — NTDS dump would expose ALL domain hashes"
      } else {
          Write-Host "  Not a DC — NTDS.dit not present on this host"
          Write-Host "  [PAS] NTDS dump technique targets domain controllers specifically"
      }

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — vssadmin create shadow on DC, ntdsutil IFM execution, ntds.dit file access outside ntdsa.dll"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Ensure no IFM directories remain"
    command: |
      Get-Process ntdsutil -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Complete — no persistent artefacts from this simulation"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1003.003 cleanup complete"

analyst_checklist:
  - "Process event: vssadmin.exe create shadow on a DC — rare; almost always malicious"
  - "Process event: ntdsutil.exe with 'ifm' or 'create full' arguments on a DC"
  - "File event: ntds.dit accessed or copied by process other than ntdsa.dll (lsass context)"
  - "Sentinel: DeviceProcessEvents | where FileName == 'ntdsutil.exe' and ProcessCommandLine contains 'ifm'"
  - "Sentinel: DeviceProcessEvents | where FileName == 'vssadmin.exe' and ProcessCommandLine contains 'create shadow'"
  - "Defender for Identity: 'Directory services replication request' and 'Suspicious shadow copy activity'"
  - "CONTROL CHECK: Tier 0 DC management — no general admin access; only DC-specific admin accounts"
  - "CONTROL CHECK: Monitor VSS operations on DCs — vssadmin create shadow is extremely rare legitimately"
  - "CONTROL CHECK: DCSync detection (T1003.006) is often more practical than NTDS file theft"
