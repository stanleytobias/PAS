id: T1199_trusted_relationship
name: "Trusted Relationship"
mitre_technique: "T1199"
mitre_tactic: "initial_access"
description: >
  Adversaries compromise or impersonate third-party organizations (MSPs, IT contractors,
  auditors, software vendors) that have trusted network access to the target. The
  adversary uses the third-party's VPN credentials, RMM agent, or direct network tunnel
  to pivot into the victim environment. This is a primary attack vector against
  organizations that rely heavily on managed service providers — a single MSP compromise
  can provide access to hundreds of client environments simultaneously.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1199/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1199 — Trusted Relationship: attacker compromises MSP/vendor with trusted access to your environment"

  - step: 2
    type: exec_powershell
    description: "Enumerate RMM and remote access tools installed by third parties"
    command: |
      Write-Host "[PAS] Third-party remote access tools installed on this host:"
      $rmm = @("N-able","NinjaRMM","ConnectWise","Kaseya","Datto","SolarWinds","Atera",
               "Action1","Syncro","Pulseway","LabTech","Automate","ManageEngine")
      $installed = Get-ItemProperty `
          "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" `
          -ErrorAction SilentlyContinue |
          Where-Object { $_.DisplayName } |
          Select-Object DisplayName, InstallDate, Publisher

      foreach ($tool in $rmm) {
          $found = $installed | Where-Object { $_.DisplayName -like "*$tool*" }
          if ($found) {
              Write-Host "  RMM FOUND: $($found.DisplayName) (Publisher: $($found.Publisher))"
              Write-Host "  CONTROL CHECK: Is this tool still actively used/needed? Audit access rights"
          }
      }

      Write-Host "[PAS] Checking for active RMM agent processes:"
      $rmmProcs = @("nable","ncentral","teamviewer","screenconnect","connectwise",
                    "kaseya","datto","atera","syncro","pulseway","labtech","automate")
      Get-Process -ErrorAction SilentlyContinue | Where-Object {
          $name = $_.Name.ToLower()
          $rmmProcs | Where-Object { $name -like "*$_*" }
      } | ForEach-Object { Write-Host "  RUNNING: $($_.Name) (PID: $($_.Id))" }

  - step: 3
    type: marker
    description: "Third-party access review"
    message: "CONTROL CHECK: Review all active third-party VPN accounts and RMM agents. Remove any that are no longer needed. Require MFA for all third-party access."

  - step: 4
    type: marker
    description: "MSP security assessment"
    message: "CONTROL CHECK: For MSP relationships — require SOC 2 Type 2 audit, assess their security controls, and ensure they have MFA + PAM for accounts accessing your environment"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — logons from third-party accounts, RMM agent activity outside business hours"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1199 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Sentinel: SecurityEvent | where EventID == 4624 and TargetUserName contains 'svc_' or TargetUserName contains '_msp' — service account logons"
  - "Sentinel: DeviceProcessEvents | where FileName in ('screenconnect.exe','connectwise.exe') and TimeGenerated !between (8h and 18h)"
  - "Defender for Identity: Alert on RMM agent process performing lateral movement or discovery commands"
  - "CONTROL CHECK: Third-party accounts must use MFA — no service accounts with static passwords for MSP access"
  - "CONTROL CHECK: Just-in-time access for third parties — enable access on request, disable after session"
  - "CONTROL CHECK: Network segmentation — third-party access should land in a restricted segment, not full network"
  - "CONTROL CHECK: Log all third-party session activity — what commands did the MSP run during their access window?"
