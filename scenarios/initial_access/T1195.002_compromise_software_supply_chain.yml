id: T1195.002_compromise_software_supply_chain
name: "Supply Chain Compromise — Compromise Software Supply Chain"
mitre_technique: "T1195.002"
mitre_tactic: "initial_access"
description: >
  Adversaries compromise the software update or distribution mechanism of a legitimate
  vendor, inserting malicious code that is then distributed to all customers via normal
  update channels. Notable examples: SolarWinds SUNBURST (Orion updates), 3CX (desktop
  client updates), CCleaner, ASUS LiveUpdate. The trojanised software is signed by the
  legitimate vendor, making it extremely difficult to detect statically.
  Detection relies on behavioral anomalies post-installation: unexpected network
  connections, process chains inconsistent with the software's legitimate function,
  and beaconing patterns. This scenario simulates the post-compromise host artifacts
  that a trojanised software update produces.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1195/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1195.002 — Software Supply Chain Compromise simulation (post-install artifacts)"

  - step: 2
    type: exec_powershell
    description: "Simulate trojanised update package installation — drops implant alongside legitimate software"
    command: |
      Write-Host "[PAS] Simulating supply chain compromise artifacts:"
      Write-Host "[PAS] Real example: SolarWinds Orion DLL (SolarWinds.Orion.Core.BusinessLayer.dll)"
      Write-Host "[PAS] contained SUNBURST backdoor shipped via legitimate signed Orion update"

      # Simulate implant drop alongside legitimate software
      $softwareDir = "$env:ProgramFiles\PAS_T1195_002_VendorApp"
      New-Item -ItemType Directory $softwareDir -Force | Out-Null

      # Legitimate-looking DLL with malicious payload (our benign marker)
      $implantDll = "$softwareDir\PAS_VendorApp.Core.BusinessLayer.dll"
      Copy-Item "$env:SystemRoot\System32\cmd.exe" $implantDll -Force
      Write-Host "[PAS] Trojanised DLL dropped: $implantDll"
      Write-Host "[PAS] In real supply chain: DLL is signed by vendor certificate, passes AV scan"

  - step: 3
    type: exec_powershell
    description: "Simulate SUNBURST-style delayed execution and beacon — post-install dormancy pattern"
    command: |
      Write-Host "[PAS] SUNBURST-style dormancy and beacon simulation:"
      Write-Host "[PAS] SUNBURST: slept 12-14 days after install before first beacon"
      Write-Host "[PAS] Detection window: behavior AFTER the delay, not during install"

      # Simulate the beacon pattern — DGA-style hostname resolution
      $beaconDomains = @(
          "$(([System.Net.Dns]::GetHostName()).ToLower() -replace '-','').avsvmcloud.com",
          "PAS-T1195-002-beacon.avsvmcloud.com"
      )
      foreach ($domain in $beaconDomains) {
          Write-Host "[PAS] Simulated C2 beacon domain (loopback DNS query): $domain"
          try {
              [System.Net.Dns]::GetHostAddresses($domain) | Out-Null
          } catch {}
      }
      Write-Host "[PAS] DNS query telemetry generated for DGA-style domains"

  - step: 4
    type: exec_powershell
    description: "Simulate legitimate software making anomalous network connections"
    command: |
      Write-Host "[PAS] Simulating legitimate process making anomalous outbound connection:"
      # In real supply chain: svchost.exe or legitimate vendor process phones home
      # We use loopback to generate the network telemetry safely
      try {
          $tcp  = New-Object System.Net.Sockets.TcpClient
          $conn = $tcp.BeginConnect("127.0.0.1", 443, $null, $null)
          $conn.AsyncWaitHandle.WaitOne(500, $false) | Out-Null
          $tcp.Close()
      } catch {}
      Write-Host "[PAS] HTTPS connection attempt generated from PowerShell (simulates vendor process beacon)"
      Write-Host "[PAS] Real detection: established software making first-ever outbound connection to new domain"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — DNS queries for DGA-pattern domains, outbound HTTPS from unexpected processes, new software directory with DLL loading"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove supply chain simulation artifacts"
    command: |
      Remove-Item "$env:ProgramFiles\PAS_T1195_002_VendorApp" -Recurse -Force `
          -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Supply chain simulation directory removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1195.002 cleanup complete"

analyst_checklist:
  - "Network event: established software process making first-ever outbound connection to new external domain"
  - "DNS event: DGA-pattern domain queries (long random subdomains of legitimate-looking TLDs)"
  - "Process event: legitimate software spawning unexpected child processes (cmd.exe, powershell.exe)"
  - "Sentinel: DnsEvents | where Name matches regex @'^[a-z0-9]{15,}\\.'" 
  - "Sentinel: DeviceNetworkEvents | where InitiatingProcessFileName == 'trusted_vendor.exe' and RemoteUrl !contains 'vendor.com'"
  - "MDE: Threat Analytics — SolarWinds SUNBURST, 3CX supply chain articles with associated IOCs"
  - "CONTROL CHECK: Deploy DNS-layer security (Defender for DNS, Cisco Umbrella) — DGA domains often resolve to NXDOMAIN or sinkhole"
  - "CONTROL CHECK: Monitor first-seen network connections for each installed application — baseline 30 days then alert on new destinations"
  - "CONTROL CHECK: Verify software update integrity via hash comparison before deployment in sensitive environments"
  - "CONTROL CHECK: Privileged access workstations (PAWs) should block internet access for administrative tools — limits SUNBURST-style beaconing"
