id: T1048.001_exfiltration_over_alternative_protocol_symmetric_encrypted
name: "Exfiltration Over Alternative Protocol — Exfiltration Over Symmetric Encrypted Non-C2 Protocol"
mitre_technique: "T1048.001"
mitre_tactic: "exfiltration"
description: >
  Adversaries exfiltrate data over a symmetrically encrypted channel that is separate
  from their C2 channel. This separates collection and exfiltration traffic to reduce
  risk — if the C2 is detected, the exfiltration channel may remain intact. Methods
  include custom RC4/AES-encrypted TCP streams, SFTP (symmetric key-based), and
  encrypted custom protocols on non-standard ports. The encryption prevents DLP
  inspection of content. Detection relies on identifying unexpected encrypted traffic
  to unknown endpoints on unusual ports.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1048/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1048.001 — Symmetric Encrypted Exfiltration simulation (loopback only)"

  - step: 2
    type: exec_powershell
    description: "Simulate AES-encrypted exfiltration over raw TCP to loopback"
    command: |
      $dataPath = "$env:TEMP\PAS_T1048_001_payload.txt"
      "PAS-T1048.001-SYMMETRIC-ENCRYPTED-EXFIL-$(Get-Date -Format o)" |
          Set-Content $dataPath

      # AES-encrypt the payload (simulates symmetric encrypted channel)
      $key  = [byte[]](1..32)   # 256-bit key (hardcoded in real malware)
      $iv   = [byte[]](1..16)   # 128-bit IV

      $aes  = [System.Security.Cryptography.Aes]::Create()
      $aes.Key  = $key
      $aes.IV   = $iv
      $enc  = $aes.CreateEncryptor()

      $plain     = [Text.Encoding]::UTF8.GetBytes((Get-Content $dataPath -Raw))
      $ms        = New-Object IO.MemoryStream
      $cs        = New-Object Security.Cryptography.CryptoStream($ms, $enc, [Security.Cryptography.CryptoStreamMode]::Write)
      $cs.Write($plain, 0, $plain.Length)
      $cs.FlushFinalBlock()
      $encrypted = $ms.ToArray()
      $aes.Dispose()

      Write-Host "[PAS] AES-256 encrypted payload: $($encrypted.Length) bytes"

      # Send over TCP to loopback (simulates non-C2 exfil channel)
      try {
          $tcp    = New-Object System.Net.Sockets.TcpClient
          $result = $tcp.BeginConnect("127.0.0.1", 4444, $null, $null)
          $ok     = $result.AsyncWaitHandle.WaitOne(500, $false)
          if ($ok -and $tcp.Connected) {
              $stream = $tcp.GetStream()
              $stream.Write($encrypted, 0, $encrypted.Length)
              $stream.Close()
              Write-Host "[PAS] Encrypted payload sent to 127.0.0.1:4444"
          } else {
              Write-Host "[PAS] TCP connection to loopback:4444 attempted (no listener — expected)"
          }
          $tcp.Close()
      } catch {}
      Write-Host "[PAS] Symmetric encrypted TCP exfil pattern generated"

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — TCP connection to non-standard port (4444) with high-entropy payload, no TLS handshake"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove exfiltration payload"
    command: |
      Remove-Item "$env:TEMP\PAS_T1048_001_payload.txt" -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Symmetric exfil payload removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1048.001 cleanup complete"

analyst_checklist:
  - "Network event: TCP connection on non-standard port with high-entropy payload (no TLS handshake)"
  - "Network event: outbound to unknown IP on unusual port (4444, 8443, 1337)"
  - "Sentinel: DeviceNetworkEvents | where RemotePort not in (80,443,53,25,587) and ActionType == 'ConnectionSuccess' and InitiatingProcessFileName == 'powershell.exe'"
  - "NDR: entropy analysis on TCP stream — high entropy without TLS handshake indicates custom encryption"
  - "MDE alert: 'Encrypted data exfiltration on non-standard port'"
  - "CONTROL CHECK: Egress firewall — allow-list only required destination ports; block all others"
  - "CONTROL CHECK: NDR with entropy scoring — custom-encrypted streams have near-maximum entropy"
