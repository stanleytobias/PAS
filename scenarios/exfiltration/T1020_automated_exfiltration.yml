id: T1020_automated_exfiltration
name: "Automated Exfiltration"
mitre_technique: "T1020"
mitre_tactic: "exfiltration"
description: >
  Adversaries automate data exfiltration using scripts that continuously or
  periodically collect and transmit data without manual intervention. This may
  involve scripts that monitor directories for new files and immediately transfer
  them, or scheduled jobs that batch-transmit accumulated data at intervals.
  Automation ensures exfiltration continues even after the initial operator
  disconnects. Detection relies on identifying persistent outbound transfer
  processes and scheduled jobs that move data to external endpoints.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1020/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1020 — Automated Exfiltration simulation (loopback only)"

  - step: 2
    type: exec_powershell
    description: "Create staged data and simulate automated transfer loop"
    command: |
      $stageDir = "$env:TEMP\PAS_T1020_stage"
      New-Item -ItemType Directory $stageDir -Force | Out-Null
      1..3 | ForEach-Object {
          "PAS-T1020-AUTO-EXFIL-CHUNK-$_" | Set-Content "$stageDir\data_$_.txt"
      }
      Write-Host "[PAS] Staging directory: $stageDir ($((Get-ChildItem $stageDir).Count) files)"

      Write-Host "[PAS] Automated exfiltration loop (3 iterations, loopback only):"
      foreach ($file in Get-ChildItem $stageDir) {
          $content = [Convert]::ToBase64String(
              [IO.File]::ReadAllBytes($file.FullName))
          try {
              $req = [System.Net.WebRequest]::Create("http://127.0.0.1:8080/upload")
              $req.Method = "POST"
              $req.ContentType = "application/octet-stream"
              $req.Headers.Add("X-Filename", $file.Name)
              $req.Timeout = 500
              $body = [Text.Encoding]::UTF8.GetBytes($content)
              $req.ContentLength = $body.Length
              $s = $req.GetRequestStream()
              $s.Write($body, 0, $body.Length)
              $s.Close()
              $req.GetResponse() | Out-Null
          } catch {}
          Write-Host "[PAS] Auto-transmitted: $($file.Name) ($($content.Length) bytes base64)"
      }
      Write-Host "[PAS] Auto-exfiltration loop complete"

  - step: 3
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 4
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — persistent outbound HTTP POST loop from powershell.exe, repeated transfers at regular intervals"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove staging directory"
    command: |
      Remove-Item "$env:TEMP\PAS_T1020_stage" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Staging directory removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1020 cleanup complete"

analyst_checklist:
  - "Process event: powershell.exe making repeated outbound HTTP POST calls at regular intervals"
  - "Network event: high-frequency outbound connections from single process to same destination"
  - "Sentinel: DeviceNetworkEvents | where ActionType == 'ConnectionSuccess' | summarize count() by InitiatingProcessFileName, RemoteIP, bin(TimeGenerated,5m) | where count_ > 10"
  - "Sentinel: DeviceProcessEvents | where ProcessCommandLine contains 'WebRequest' and ProcessCommandLine contains 'POST'"
  - "MDE alert: 'Automated data exfiltration pattern detected'"
  - "CONTROL CHECK: Egress proxy with DLP inspection — automated POST of base64/binary data should trigger content inspection"
  - "CONTROL CHECK: Data transfer volume baseline — alert on process exceeding normal outbound volume threshold"
  - "CONTROL CHECK: Scheduled task + outbound transfer combination is a high-fidelity exfiltration indicator"
