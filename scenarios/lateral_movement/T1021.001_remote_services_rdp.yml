id: T1021.001_remote_services_rdp
name: "Remote Services — Remote Desktop Protocol"
mitre_technique: "T1021.001"
mitre_tactic: "lateral_movement"
description: >
  Adversaries use stolen credentials to log into remote systems via RDP (port 3389),
  gaining an interactive graphical session. RDP is the most common lateral movement
  method in ransomware and targeted attacks due to its ubiquity and ease of use.
  Detection: Event ID 4624 (logon type 10 = RemoteInteractive) on the destination,
  Event ID 1149 in the TerminalServices-RemoteConnectionManager log, and EventID
  4648 on the source. mstsc.exe execution combined with unusual destination IPs
  is a reliable workstation-side indicator.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1021/001/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1021.001 — RDP lateral movement simulation (loopback)"

  - step: 2
    type: exec_powershell
    description: "Check RDP status and initiate connection to loopback"
    command: |
      Write-Host "[PAS] RDP configuration check:"
      $rdp = Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" `
          -ErrorAction SilentlyContinue
      Write-Host "  RDP enabled on this host: $(if ($rdp.fDenyTSConnections -eq 0) {'Yes'} else {'No'})"

      Write-Host "[PAS] RDP connection attempt to loopback (generates Event 1149):"
      $proc = Start-Process mstsc.exe `
          -ArgumentList "/v:127.0.0.1 /w:800 /h:600" `
          -PassThru -ErrorAction SilentlyContinue
      Start-Sleep -Milliseconds 1000
      if ($proc -and -not $proc.HasExited) {
          $proc | Stop-Process -Force -ErrorAction SilentlyContinue
      }
      Write-Host "[PAS] mstsc.exe /v:127.0.0.1 — RDP connection process event generated"

  - step: 3
    type: exec_powershell
    description: "Simulate RDP cmdline tool pattern — xfreerdp/rdesktop adversary tooling"
    command: |
      Write-Host "[PAS] Adversary RDP tooling pattern:"
      Write-Host "[PAS] Real: xfreerdp /v:target /u:admin /p:password /cert:ignore"
      Write-Host "[PAS] Or: SharpRDP.exe computername=target command='cmd /c whoami'"
      # Check for any RDP clients present
      @("xfreerdp.exe","rdesktop.exe","SharpRDP.exe") | ForEach-Object {
          $found = Get-Command $_ -ErrorAction SilentlyContinue
          if ($found) { Write-Host "  [FOUND] $_ at $($found.Source)" }
      }
      Write-Host "[PAS] RDP lateral movement telemetry generated"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — mstsc.exe execution to non-standard destination, Event 4624 logon type 10, Event 1149"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Kill any remaining mstsc processes"
    command: |
      Get-Process mstsc -ErrorAction SilentlyContinue |
          Stop-Process -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Complete"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1021.001 cleanup complete"

analyst_checklist:
  - "Process event: mstsc.exe from scripting context or non-standard user"
  - "Event ID 4624 logon type 10 (RemoteInteractive) on destination from unexpected source IP"
  - "Event ID 1149 in Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational"
  - "Sentinel: DeviceProcessEvents | where FileName == 'mstsc.exe' and InitiatingProcessFileName in ('powershell.exe','cmd.exe')"
  - "Sentinel: SecurityEvent | where EventID == 4624 and LogonType == 10 and IpAddress not in (allowed_rdp_sources)"
  - "MDE alert: 'Suspicious RDP activity'"
  - "CONTROL CHECK: Restrict RDP access via host firewall to jump server IPs only — no peer-to-peer RDP"
  - "CONTROL CHECK: RDP gateway — all RDP must pass through managed gateway with MFA"
