id: T1534_internal_spearphishing
name: "Internal Spearphishing"
mitre_technique: "T1534"
mitre_tactic: "lateral_movement"
description: >
  Adversaries who have compromised an account send phishing emails from that
  legitimate internal account to other employees to expand their foothold.
  Internal phishing is significantly more effective than external phishing because
  the sender is trusted, appears in the corporate directory, and email security
  tools may not apply the same scrutiny to internal mail. Methods: send malicious
  attachments or links from a compromised mailbox via Outlook, Exchange PowerShell,
  or the Microsoft Graph API. Teams messages can also be used as an internal
  phishing vector.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1534/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1534 — Internal Spearphishing simulation (loopback SMTP only)"

  - step: 2
    type: exec_powershell
    description: "Simulate internal email with malicious attachment via SMTP to loopback"
    command: |
      Write-Host "[PAS] Internal spearphishing simulation:"
      $attachPath = "$env:TEMP\PAS_T1534_invoice.docm"
      Set-Content $attachPath "PAS-T1534-INTERNAL-PHISH-PAYLOAD-MARKER"
      Write-Host "[PAS] Phishing payload created: $attachPath (.docm macro document)"

      # Simulate SMTP send to loopback (no real email sent)
      try {
          $smtp   = New-Object Net.Mail.SmtpClient("127.0.0.1", 25)
          $smtp.Timeout = 500
          $msg    = New-Object Net.Mail.MailMessage
          $msg.From = "compromised.user@corp.local"
          $msg.To.Add("victim@corp.local")
          $msg.Subject = "FW: Urgent Invoice - Action Required"
          $msg.Body    = "Please review the attached invoice and approve by EOD."
          $msg.Attachments.Add(
              New-Object Net.Mail.Attachment($attachPath))
          $smtp.Send($msg)
          $msg.Dispose()
          Write-Host "[PAS] Internal phishing email sent to loopback SMTP"
      } catch {
          Write-Host "[PAS] SMTP to loopback:25 attempted (no listener — expected)"
      }

  - step: 3
    type: exec_powershell
    description: "Simulate Teams internal phishing message via Graph API"
    command: |
      Write-Host "[PAS] Teams internal phishing pattern (Graph API, loopback):"
      Write-Host "[PAS] Real: POST /v1.0/chats/{chatId}/messages with malicious link"
      try {
          $req = [System.Net.WebRequest]::Create(
              "http://127.0.0.1/v1.0/chats/PAS_CHAT_ID/messages")
          $req.Method = "POST"
          $req.ContentType = "application/json"
          $req.Headers.Add("Authorization","Bearer PAS_TOKEN")
          $req.Timeout = 300
          $body = [Text.Encoding]::UTF8.GetBytes(
              '{"body":{"contentType":"html","content":"Click <a href=\"http://attacker.local/payload\">here</a> to reset your password."}}')
          $req.ContentLength = $body.Length
          $s = $req.GetRequestStream(); $s.Write($body,0,$body.Length); $s.Close()
          $req.GetResponse() | Out-Null
      } catch {}
      Write-Host "[PAS] Teams message POST to loopback generated"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — internal email with .docm/.lnk attachment, Graph API chat message with external URL"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove phishing payload"
    command: |
      Remove-Item "$env:TEMP\PAS_T1534_invoice.docm" -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Phishing payload removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1534 cleanup complete"

analyst_checklist:
  - "Email: internal sender with .docm, .xlsm, .lnk, or .iso attachment — internal phishing signature"
  - "Email: high volume of sent items from single mailbox in short window — compromised account phishing"
  - "Sentinel: EmailEvents | where SenderFromDomain == tenant_domain and AttachmentCount > 0 and RecipientCount > 10"
  - "Defender for Office 365: 'Email sent from compromised account' alert"
  - "Teams: Graph API chat messages containing external URLs from unexpected service principals"
  - "CONTROL CHECK: Internal mail DLP — scan internal email for malicious attachments same as external"
  - "CONTROL CHECK: Defender for Office 365 — Safe Attachments / Safe Links applies to internal mail in M365"
  - "CONTROL CHECK: Alert on mailbox send rate anomaly — >50 emails/hour from single account triggers investigation"
