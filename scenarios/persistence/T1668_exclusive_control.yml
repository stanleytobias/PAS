id: T1668_exclusive_control
name: "Exclusive Control"
mitre_technique: "T1668"
mitre_tactic: "persistence"
description: >
  Adversaries who successfully compromise a system may maintain persistence by
  "closing the door" behind them — patching vulnerabilities they used to gain access,
  removing other threat actors' implants, or killing competing malware processes.
  This behaviour is observed in ransomware groups that kill other ransomware before
  deploying their own, botnets that remove competing bots, and nation-state actors
  who patch the vulnerability they exploited to prevent others from using the same
  access path. Exclusive control signals a sophisticated, targeted adversary.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1668/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1668 — Exclusive Control simulation (adversary closes backdoors used by others)"

  - step: 2
    type: exec_powershell
    description: "Simulate competitor malware detection and termination"
    command: |
      Write-Host "[PAS] Exclusive control simulation — scanning for competitor implants:"
      # List of processes commonly killed by ransomware/sophisticated actors
      $competitors = @(
          "TeamViewer","AnyDesk","vnc","radmin","ammyy",
          "malwarebytes","mbam","mbamservice",
          "avast","avg","eset","kaspersky","f-secure"
      )
      $running = Get-Process -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name
      foreach ($c in $competitors) {
          $found = $running | Where-Object { $_ -like "*$c*" }
          if ($found) {
              Write-Host "  Found competitor/tool: $found"
              Write-Host "  [PAS] Real adversary would: Stop-Process -Name $found -Force"
          }
      }
      Write-Host "[PAS] Competitor scan complete"

  - step: 3
    type: exec_powershell
    description: "Simulate patching the initial access vulnerability to prevent reuse"
    command: |
      Write-Host "[PAS] Simulating vulnerability patching after exploitation:"
      Write-Host "[PAS] Real behaviour: adversary patches the vuln they used so others cannot follow"
      Write-Host "[PAS] Examples:"
      Write-Host "  - Exchange ProxyLogon: patch after exploitation to block other actors"
      Write-Host "  - VPN misconfig: correct the config that allowed initial access"
      Write-Host "  - Weak password: change the credential used for initial access"
      Write-Host "[PAS] Detection: unexpected patch or configuration change immediately after compromise"

  - step: 4
    type: exec_powershell
    description: "Simulate removing competitor's persistence artifacts"
    command: |
      Write-Host "[PAS] Scanning for competing persistence artifacts to remove:"
      # Check Run keys for non-PAS entries that look like malware
      $runKey = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run"
      $entries = Get-ItemProperty $runKey -ErrorAction SilentlyContinue |
          Get-Member -MemberType NoteProperty |
          Where-Object { $_.Name -notmatch '^PS' -and $_.Name -notmatch '^PAS_' }
      Write-Host "  Run key entries (not PAS simulation): $($entries.Count)"
      Write-Host "[PAS] Real adversary would delete competing Run key entries"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — process terminations for security tools, unexpected configuration changes post-compromise"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1668 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Process event: batch termination of security tools, AV, or remote access software"
  - "Registry event: mass deletion of Run key entries or scheduled tasks"
  - "Configuration event: firewall rules changed, services stopped, patches applied in unusual sequence"
  - "Sentinel: DeviceProcessEvents | where FileName == 'taskkill.exe' and ProcessCommandLine contains '/F /IM'"
  - "Sentinel: SecurityEvent | where EventID == 4688 and CommandLine contains 'taskkill' | where CommandLine matches regex @'/im\\s+(av|security|defender)'"
  - "MDE alert: 'Security tool process terminated' — built-in Tamper Protection should fire"
  - "CONTROL CHECK: Defender Tamper Protection must be enabled — prevents external process from stopping MDE"
  - "CONTROL CHECK: Process terminations of security tools should generate high-priority alert"
  - "CONTROL CHECK: Unexpected firewall rule changes or patch installations outside change windows are IOCs in post-compromise scenarios"
