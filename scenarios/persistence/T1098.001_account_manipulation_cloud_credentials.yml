id: T1098.001_account_manipulation_cloud_credentials
name: "Account Manipulation — Additional Cloud Credentials"
mitre_technique: "T1098.001"
mitre_tactic: "persistence"
description: >
  Adversaries add adversary-controlled credentials (service principal secrets, API keys,
  certificates) to existing cloud service accounts or applications to maintain persistent
  access even if the original user's password is changed. In Entra ID, this is done by
  adding a new client secret or certificate to an existing application or service principal.
  The adversary can then authenticate as that application using their secret — surviving
  password resets, MFA enforcement, and account lockouts on the user account.
  APT29 used this technique extensively in the SolarWinds campaign (Golden SAML).
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1098/001/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1098.001 — Cloud Credentials: adversary adds client secret/cert to existing Entra ID app/service principal for persistent access"

  - step: 2
    type: exec_powershell
    description: "Check for existing service principal credentials — baseline for anomalous additions"
    command: |
      Write-Host "[PAS] Entra ID / Azure credential persistence check:"
      Write-Host "[PAS] Real attack: Add-AzADApplicationCredential -ApplicationId <id> -EndDate <far-future>"

      # Check for az CLI and relevant modules
      $az    = Get-Command az -ErrorAction SilentlyContinue
      $msGraph = Get-Module Microsoft.Graph -ListAvailable -ErrorAction SilentlyContinue
      Write-Host "  Azure CLI available: $($null -ne $az)"
      Write-Host "  Microsoft.Graph module: $($null -ne $msGraph)"

      Write-Host "[PAS] Detection approach — check for recent service principal credential additions:"
      Write-Host "  Sentinel: AuditLogs | where OperationName == 'Add service principal credentials'"
      Write-Host "  Sentinel: AuditLogs | where OperationName contains 'Add' and TargetResources contains 'credential'"

  - step: 3
    type: marker
    description: "Service principal audit check"
    message: "CONTROL CHECK: Run quarterly audit — list all service principals with credentials (client secrets/certs) and when they were added. Any credential added outside of a deployment pipeline is suspicious."

  - step: 4
    type: marker
    description: "Defender for Cloud Apps check"
    message: "CONTROL CHECK: Entra ID — enable alerts for 'Credentials added to a service principal'. This fires whenever a new secret or certificate is added to any app registration or service principal."

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check Sentinel AuditLogs — OperationName: 'Add service principal credentials', 'Update application – Certificates and secrets management'"

cleanup:
  - step: 1
    type: marker
    description: "No persistent artifacts"
    message: "T1098.001 cleanup complete — no persistent artifacts (marker-only scenario)"

analyst_checklist:
  - "Sentinel: AuditLogs | where OperationName == 'Add service principal credentials' | where InitiatedBy.user.userPrincipalName !contains 'pipeline'"
  - "Sentinel: AuditLogs | where OperationName contains 'Certificate' and Category == 'ApplicationManagement'"
  - "CONTROL CHECK: Alert on ANY new client secret or certificate added to service principals — route to SOC immediately"
  - "CONTROL CHECK: Certificate expiry monitoring — adversary-added certs often have very long validity (10+ years)"
  - "CONTROL CHECK: Workload Identity Federation preferred over client secrets — cannot be stolen and reused externally"
  - "CONTROL CHECK: Conditional Access for Workload Identities — restrict service principals to known IP ranges"
