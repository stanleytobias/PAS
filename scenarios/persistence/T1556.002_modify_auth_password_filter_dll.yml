id: T1556.002_modify_authentication_process_password_filter_dll
name: "Modify Authentication Process — Password Filter DLL"
mitre_technique: "T1556.002"
mitre_tactic: "persistence"
description: >
  Adversaries register a malicious password filter DLL to capture plaintext passwords
  whenever users change their passwords on Windows. Password filters are DLLs loaded
  by lsass.exe via the Notification Packages registry value. They receive the cleartext
  new password during password change operations to enforce complexity policies.
  A malicious filter captures and exfiltrates these credentials. The DLL must export
  InitializeChangeNotify, PasswordFilter, and PasswordChangeNotify.
  This is registered exactly like T1547.008 but the intent and trigger are different:
  it fires on password changes, not just at boot.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1556/002/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1556.002 — Password Filter DLL persistence/credential capture simulation"

  - step: 2
    type: exec_powershell
    description: "Read current Notification Packages — baseline before adding filter"
    command: |
      $lsaKey  = "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa"
      $current = (Get-ItemProperty $lsaKey -Name "Notification Packages" `
          -ErrorAction SilentlyContinue)."Notification Packages"
      Write-Host "[PAS] Current LSA Notification Packages:"
      $current | ForEach-Object { Write-Host "  $_" }
      Write-Host "[PAS] Legitimate value: scecli"
      Write-Host "[PAS] Any additional entry is a potential password filter DLL"

  - step: 3
    type: exec_powershell
    description: "Register malicious password filter DLL"
    command: |
      $filterDll = "$env:SystemRoot\System32\PAS_T1556_002_pwdfilter.dll"
      Copy-Item "$env:SystemRoot\System32\scecli.dll" $filterDll `
          -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS] Password filter DLL placed: $filterDll"

      $lsaKey  = "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa"
      $current = (Get-ItemProperty $lsaKey -Name "Notification Packages")."Notification Packages"
      $updated = ($current ?? @()) + @("PAS_T1556_002_pwdfilter")
      Set-ItemProperty $lsaKey -Name "Notification Packages" -Value $updated -Type MultiString
      Write-Host "[PAS] Password filter registered: PAS_T1556_002_pwdfilter"
      Write-Host "[PAS] Called by lsass.exe with PLAINTEXT new password on every password change"
      Write-Host "[PAS] Real DLL would log/exfiltrate captured credentials"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — Notification Packages registry value modified, new DLL in System32"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Restore Notification Packages and remove filter DLL"
    command: |
      $lsaKey  = "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa"
      $current = (Get-ItemProperty $lsaKey -Name "Notification Packages")."Notification Packages"
      $restored = $current | Where-Object { $_ -ne "PAS_T1556_002_pwdfilter" }
      Set-ItemProperty $lsaKey -Name "Notification Packages" -Value $restored -Type MultiString
      Remove-Item "$env:SystemRoot\System32\PAS_T1556_002_pwdfilter.dll" `
          -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS][Cleanup] Password filter DLL removed"

  - step: 2
    type: marker
    description: "Cleanup complete"
    message: "T1556.002 cleanup complete"

analyst_checklist:
  - "Registry event: Notification Packages value modified — any entry beyond 'scecli' is suspicious"
  - "File event: new DLL placed in System32 alongside Notification Packages change"
  - "Sentinel: DeviceRegistryEvents | where RegistryKey contains 'Lsa' and RegistryValueName == 'Notification Packages'"
  - "MDE alert: 'Password filter DLL registered'"
  - "CONTROL CHECK: Credential Guard isolates LSA — password filter DLLs cannot access protected credentials"
  - "CONTROL CHECK: LSA RunAsPPL further restricts DLL loading into lsass.exe"
  - "CONTROL CHECK: Notification Packages should only contain 'scecli' — audit weekly"
