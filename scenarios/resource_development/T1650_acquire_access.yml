id: T1650_acquire_access
name: "Acquire Access"
mitre_technique: "T1650"
mitre_tactic: "resource-development"
description: >
  Adversaries purchase or otherwise acquire existing access to a target system or
  network from initial access brokers (IABs). IABs sell compromised credentials,
  VPN access, RDP sessions, or persistent footholds. This is a pre-compromise
  external technique. Detection focuses on anomalous authentication patterns
  consistent with purchased access being exercised for the first time.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1650/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1650 — Acquire Access is a pre-compromise adversary-side technique (initial access broker activity)"

  - step: 2
    type: marker
    description: "IAB detection context"
    message: "Adversary purchases VPN credentials, RDP access, or valid domain accounts from IABs on dark web markets"

  - step: 3
    type: exec_powershell
    description: "Enumerate remote access services listening on this host — surfaces the attack surface IABs sell access to"
    command: |
      Write-Host "[PAS] Remote access services listening on this host:"
      Write-Host ""
      $accessPorts = @(22, 23, 80, 443, 3389, 5985, 5986, 8080, 8443)
      Get-NetTCPConnection -State Listen |
          Where-Object { $_.LocalPort -in $accessPorts } |
          Select-Object LocalAddress, LocalPort |
          Sort-Object LocalPort |
          ForEach-Object {
              $svc = switch ($_.LocalPort) {
                  22   { "SSH" }
                  23   { "Telnet" }
                  80   { "HTTP" }
                  443  { "HTTPS" }
                  3389 { "RDP" }
                  5985 { "WinRM HTTP" }
                  5986 { "WinRM HTTPS" }
                  8080 { "HTTP-alt" }
                  8443 { "HTTPS-alt" }
                  default { "Unknown" }
              }
              Write-Host "    $($_.LocalPort)/tcp ($svc) — $($_.LocalAddress)"
          }

      Write-Host ""
      Write-Host "  VPN client software present:"
      $vpnPaths = @(
          "$env:ProgramFiles\Cisco\Cisco AnyConnect Secure Mobility Client",
          "$env:ProgramFiles\Palo Alto Networks\GlobalProtect",
          "$env:ProgramFiles\Fortinet\FortiClient",
          "$env:ProgramFiles\SonicWall\SonicWall NetExtender"
      )
      $vpnFound = $false
      foreach ($p in $vpnPaths) {
          if (Test-Path $p) {
              Write-Host "    PRESENT: $p"
              $vpnFound = $true
          }
      }
      if (-not $vpnFound) { Write-Host "    None detected at common paths" }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 3

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — listening port enumeration and VPN client path checks should be visible"

  - step: 6
    type: marker
    description: "IAB authentication anomaly control check"
    message: "CONTROL CHECK: Are anomalous RDP or VPN logins from new geolocations triggering Conditional Access challenges?"

cleanup:
  - step: 1
    type: marker
    description: "No cleanup required"
    message: "T1650 cleanup complete — no persistent artifacts"

analyst_checklist:
  - "Script block logging (Event ID 4104): Get-NetTCPConnection listening port enumeration and VPN path checks visible"
  - "Process event: powershell.exe enumerating network listening ports"
  - "CONTROL CHECK: Are RDP (3389) and WinRM (5985/5986) accessible externally? Restrict to VPN or jump host only"
  - "CONTROL CHECK: Is Conditional Access configured to challenge logins from new countries or anonymous IPs?"
  - "Sentinel: AADSignInLogs — impossible travel, new country sign-in, or unfamiliar device properties"
  - "Sentinel: DeviceLogonEvents — successful logons from accounts that have never previously authenticated to this host"
  - "MDE: Alert on first-time RDP or WinRM authentication from an IP with no prior history on this host"
