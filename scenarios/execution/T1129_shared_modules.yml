id: T1129_shared_modules
name: "Shared Modules"
mitre_technique: "T1129"
mitre_tactic: "execution"
description: >
  Adversaries load and execute malicious DLLs using Windows module-loading mechanisms
  such as LoadLibrary, rundll32.exe, or regsvr32.exe. rundll32.exe is a commonly
  abused LOLBin for executing DLL exports or JavaScript via a .sct file.
  Key detection signals include rundll32.exe or regsvr32.exe loading DLLs from
  user-writable directories or making network connections.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1129/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1129 — Shared Modules execution artifact generation via rundll32.exe"

  - step: 2
    type: exec_powershell
    description: "Invoke rundll32.exe with a system DLL export — generates LOLBin execution artifact"
    command: |
      Write-Host "[PAS] Invoking rundll32.exe with system DLL export (safe — uses built-in shell32.dll):"
      Start-Process rundll32.exe `
          -ArgumentList "shell32.dll,Control_RunDLL" `
          -Wait -NoNewWindow
      Write-Host "[PAS] rundll32.exe shell32.dll artifact generated"

  - step: 3
    type: exec_powershell
    description: "Write benign DLL-less test and invoke rundll32 with a non-existent export — generates suspicious call pattern"
    command: |
      Write-Host "[PAS] Generating rundll32.exe suspicious invocation artifact:"
      Start-Process rundll32.exe `
          -ArgumentList "`"$env:TEMP\pas_nonexistent.dll`",EntryPoint" `
          -Wait -NoNewWindow -ErrorAction SilentlyContinue
      Write-Host "[PAS] rundll32.exe suspicious DLL invocation artifact generated (will fail — no DLL)"

  - step: 4
    type: exec_powershell
    description: "Invoke regsvr32.exe for DLL registration — common LOLBin abuse vector"
    command: |
      Write-Host "[PAS] Invoking regsvr32.exe with non-existent DLL — generates LOLBin artifact:"
      Start-Process regsvr32.exe `
          -ArgumentList "/s /u `"$env:TEMP\pas_nonexistent.dll`"" `
          -Wait -NoNewWindow -ErrorAction SilentlyContinue
      Write-Host "[PAS] regsvr32.exe invocation artifact generated"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 5

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — rundll32.exe and regsvr32.exe invocations should be visible in process events"

cleanup:
  - step: 1
    type: marker
    description: "No cleanup required"
    message: "T1129 cleanup complete — no persistent artifacts created"

analyst_checklist:
  - "Process event: rundll32.exe executing a DLL from %TEMP% or user-writable path"
  - "Process event: regsvr32.exe with /s flag loading a DLL from %TEMP%"
  - "Process event: rundll32.exe or regsvr32.exe making network connections (squiblydoo variant)"
  - "Sentinel: DeviceProcessEvents | where FileName == 'rundll32.exe' and ProcessCommandLine contains 'Temp'"
  - "Sentinel: DeviceProcessEvents | where FileName == 'regsvr32.exe' and ProcessCommandLine contains 'Temp'"
  - "MDE alert: 'Suspicious rundll32 execution' or 'regsvr32 LOLBin abuse'"
  - "CONTROL CHECK: Are ASR rules enabled to block rundll32.exe and regsvr32.exe from loading unsigned DLLs?"
