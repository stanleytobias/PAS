id: T1059.010_autohotkey_autoit
name: "Command and Scripting Interpreter — AutoHotKey and AutoIT"
mitre_technique: "T1059.010"
mitre_tactic: "execution"
description: >
  Adversaries abuse AutoHotKey (AHK) and AutoIT scripting languages for execution,
  keylogging, credential harvesting, and automating malicious tasks. These tools
  are legitimate automation utilities that can compile scripts into standalone
  executables, making them useful for evasion. Key detection signals include
  AutoHotKey.exe or AutoIt3.exe executing scripts from user-writable paths.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1059/010/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1059.010 — AutoHotKey and AutoIT execution artifact generation"

  - step: 2
    type: exec_powershell
    description: "Check for AutoHotKey and AutoIT installations — surfaces execution capability"
    command: |
      Write-Host "[PAS] AutoHotKey and AutoIT presence on this host:"
      $paths = @(
          "$env:ProgramFiles\AutoHotkey\AutoHotkey.exe",
          "$env:ProgramFiles (x86)\AutoHotkey\AutoHotkey.exe",
          "$env:LOCALAPPDATA\Programs\AutoHotkey\AutoHotkey.exe",
          "$env:ProgramFiles\AutoIt3\AutoIt3.exe",
          "$env:ProgramFiles (x86)\AutoIt3\AutoIt3.exe"
      )
      $found = $false
      foreach ($p in $paths) {
          if (Test-Path $p) {
              Write-Host "  PRESENT: $p"
              $found = $true
          }
      }
      if (-not $found) {
          Write-Host "  Neither AutoHotKey nor AutoIT found at standard install paths"
      }

  - step: 3
    type: exec_powershell
    description: "Write benign AutoHotKey script to TEMP and attempt execution if AHK is present"
    command: |
      $ahkScript = @'
      ; PAS Test AutoHotKey Script — T1059.010
      FileAppend, [PAS] AutoHotKey script executed`n, %A_Temp%\pas_ahk_output.txt
      ExitApp
      '@
      $scriptPath = "$env:TEMP\pas_test.ahk"
      $ahkScript | Set-Content $scriptPath -Encoding ASCII
      Write-Host "[PAS] AutoHotKey script written to: $scriptPath"

      $ahkExe = @(
          "$env:ProgramFiles\AutoHotkey\AutoHotkey.exe",
          "$env:ProgramFiles (x86)\AutoHotkey\AutoHotkey.exe",
          "$env:LOCALAPPDATA\Programs\AutoHotkey\AutoHotkey.exe"
      ) | Where-Object { Test-Path $_ } | Select-Object -First 1

      if ($ahkExe) {
          Start-Process $ahkExe -ArgumentList "`"$scriptPath`"" -Wait -NoNewWindow
          Write-Host "[PAS] AutoHotKey execution artifact generated"
      } else {
          Write-Host "[PAS] AutoHotKey not installed — script written but not executed (file artifact only)"
      }

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 5

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — AutoHotKey.exe executing .ahk script from TEMP should be visible if AHK is installed"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove AutoHotKey test artifacts from TEMP"
    command: |
      Remove-Item "$env:TEMP\pas_test.ahk"       -Force -ErrorAction SilentlyContinue
      Remove-Item "$env:TEMP\pas_ahk_output.txt"  -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS] AutoHotKey test artifacts removed"

analyst_checklist:
  - "Process event: AutoHotkey.exe or AutoIt3.exe executing a script from %TEMP% or Downloads"
  - "File event: .ahk or .au3 script file written to %TEMP% by powershell.exe"
  - "File event: output file created by AHK script in %TEMP%"
  - "Sentinel: DeviceProcessEvents | where FileName in ('AutoHotkey.exe','AutoIt3.exe')"
  - "Sentinel: DeviceFileEvents | where FileName endswith '.ahk' or FileName endswith '.au3'"
  - "MDE alert: 'Suspicious automation script execution' or 'AutoHotKey abuse detected'"
  - "CONTROL CHECK: Are AutoHotKey and AutoIT blocked by AppLocker or WDAC if not required by business?"
