id: T1204.002_malicious_file
name: "User Execution — Malicious File"
mitre_technique: "T1204.002"
mitre_tactic: "execution"
description: >
  Adversaries rely on users opening malicious files delivered via phishing or
  web downloads. File types include Office documents with macros, LNK files,
  ISO/IMG containers, PDF exploits, and executable disguised as documents.
  Detection focuses on file writes to user-accessible paths with suspicious
  extensions, Zone.Identifier marks, and process chains from file openers.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1204/002/

steps:
  - step: 1
    type: marker
    description: "Technique context"
    message: "T1204.002 — Malicious File simulates artifacts from a user opening a malicious attachment"

  - step: 2
    type: exec_powershell
    description: "Write malicious file marker types to TEMP — simulates attachment delivery"
    command: |
      Write-Host "[PAS] Writing simulated malicious file type markers to TEMP:"
      $files = @{
          "pas_macro_doc.docm" = [byte[]]@(80,75,3,4)   # ZIP/Office header
          "pas_payload.lnk"    = [byte[]]@(76,0,0,0)    # LNK header
          "pas_invoice.iso"    = [byte[]]@(1,205,17,0)  # ISO header stub
      }
      foreach ($f in $files.GetEnumerator()) {
          $path = "$env:TEMP\$($f.Key)"
          [System.IO.File]::WriteAllBytes($path, $f.Value)
          "ZoneId=3" | Set-Content "$path`:Zone.Identifier" -Encoding ASCII -ErrorAction SilentlyContinue
          Write-Host "  Written: $path (ZoneId=3 applied)"
      }

  - step: 3
    type: exec_powershell
    description: "Simulate double-click execution chain — process spawn from file opener"
    command: |
      Write-Host "[PAS] Simulating file execution chain (user opens malicious document):"
      $startInfo = New-Object System.Diagnostics.ProcessStartInfo
      $startInfo.FileName         = "cmd.exe"
      $startInfo.Arguments        = "/c echo [PAS] Malicious file execution chain simulated > `"$env:TEMP\pas_file_exec_output.txt`""
      $startInfo.UseShellExecute  = $false
      $startInfo.CreateNoWindow   = $true
      $proc = [System.Diagnostics.Process]::Start($startInfo)
      $proc.WaitForExit()
      Write-Host "[PAS] File execution chain artifact generated"

  - step: 4
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 5

  - step: 5
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — suspicious file types written to TEMP with Zone.Identifier and cmd.exe spawn should be visible"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove all simulated malicious file markers from TEMP"
    command: |
      $files = @("pas_macro_doc.docm","pas_payload.lnk","pas_invoice.iso","pas_file_exec_output.txt")
      foreach ($f in $files) {
          Remove-Item "$env:TEMP\$f"                    -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\$f`:Zone.Identifier"   -Force -ErrorAction SilentlyContinue
      }
      Write-Host "[PAS] Malicious file test artifacts removed"

analyst_checklist:
  - "File event: .docm, .lnk, or .iso written to %TEMP% with Zone.Identifier ZoneId=3"
  - "Process event: cmd.exe spawned as file execution chain from a document opener"
  - "Sentinel: DeviceFileEvents | where FileName endswith '.docm' or FileName endswith '.lnk' or FileName endswith '.iso'"
  - "Sentinel: DeviceProcessEvents | where InitiatingProcessFileName in ('WINWORD.EXE','EXCEL.EXE') and FileName in ('cmd.exe','powershell.exe')"
  - "MDE alert: 'Suspicious file type opened by user' or 'Office macro execution'"
  - "CONTROL CHECK: Are Office macros disabled by policy? Are LNK and ISO files blocked at the email gateway?"
  - "CONTROL CHECK: Is Attack Surface Reduction rule 'Block Office apps from creating child processes' enabled?"
