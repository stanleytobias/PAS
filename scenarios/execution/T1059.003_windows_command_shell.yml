id: T1059.003_windows_command_shell
name: "Command and Scripting Interpreter — Windows Command Shell"
mitre_technique: "T1059.003"
mitre_tactic: "execution"
description: >
  Adversaries abuse cmd.exe for execution, reconnaissance, and persistence tasks.
  Key detection signals include cmd.exe spawned from unusual parents (Office, browsers,
  web servers), command-line chaining with & and |, redirection operators, and
  execution of system commands via cmd /c from non-interactive contexts.
author: stanleytobias
created: "2026-01-01"
platform: windows
references:
  - https://attack.mitre.org/techniques/T1059/003/

steps:
  - step: 1
    type: marker
    description: "Pre-execution context"
    message: "Starting T1059.003 — Windows Command Shell execution artifact generation"

  - step: 2
    type: exec
    description: "cmd /c execution — standard adversary invocation pattern"
    binary: "cmd.exe"
    args: "/c echo [PAS] T1059.003 cmd execution artifact"

  - step: 3
    type: exec
    description: "Chained commands via cmd — reconnaissance pattern"
    binary: "cmd.exe"
    args: "/c whoami && hostname && ipconfig /all > \"%TEMP%\\pas_cmd_recon.txt\""

  - step: 4
    type: exec
    description: "cmd /c with environment variable expansion — common obfuscation technique"
    binary: "cmd.exe"
    args: "/c set PAS_TEST=echo [PAS] env var expansion&& cmd /c %PAS_TEST%"

  - step: 5
    type: sleep
    description: "Allow telemetry to flush"
    seconds: 5

  - step: 6
    type: marker
    description: "Post-execution prompt"
    message: "Check SIEM — cmd.exe with /c flag, chained commands, and output redirection should be visible"

cleanup:
  - step: 1
    type: exec_powershell
    description: "Remove cmd reconnaissance output file"
    command: |
      Remove-Item "$env:TEMP\pas_cmd_recon.txt" -Force -ErrorAction SilentlyContinue
      Write-Host "[PAS] cmd recon artifact removed"

analyst_checklist:
  - "Process event: cmd.exe with /c in CommandLine spawned from powershell.exe"
  - "Process event: cmd.exe running whoami, hostname, or ipconfig"
  - "File event: output redirection to %TEMP% via cmd.exe"
  - "Sentinel: DeviceProcessEvents | where FileName == 'cmd.exe' and ProcessCommandLine contains '/c'"
  - "Sentinel: DeviceProcessEvents | where FileName in ('whoami.exe','hostname.exe','ipconfig.exe') and InitiatingProcessFileName == 'cmd.exe'"
  - "MDE alert: 'Suspicious command shell execution' or system discovery chain"
  - "CONTROL CHECK: Is Windows Command Shell restricted from launching via Office or browser processes via ASR rules?"
